---
name: Reusable Publish File Breakdown Workflow

on:
  workflow_call:
    inputs:
      comment-marker:
        description: "Upsert marker for the file breakdown PR comment"
        required: false
        type: string
        default: "file-breakdown"
      max-rows:
        description: "Maximum per-file rows rendered in the collapsible details"
        required: false
        type: number
        default: 50
      job-name:
        description: "Display name for the file breakdown publish job"
        required: false
        type: string
        default: "Publish file breakdown"
      tooling-ref:
        description: "Git ref to use when checking out lgtm-ci tooling scripts"
        required: false
        type: string
        default: ""
      egress-policy:
        description: "harden-runner egress policy (audit or block)"
        required: false
        type: string
        default: "block"
      allowed-endpoints:
        description: "Allowed endpoints when egress-policy is block"
        required: false
        type: string
        default: ""

      allowed-endpoints-mode:
        description: >-
          replace: non-empty allowed-endpoints overrides egress-preset; append:
          merges preset with allowed-endpoints (deduped, first-seen wins)
        required: false
        type: string
        default: "replace"

      egress-preset:
        description: >-
          Named allowlist when allowed-endpoints is empty and egress-policy is
          block (github-minimal, github-pages, github-tooling, docker, playwright, pypi,
          rubygems, npm-publish, quality, sbom, scorecard)
        required: false
        type: string
        default: "github-minimal"
      runner-image:
        description: "GitHub-hosted runner image label"
        required: false
        type: string
        default: "ubuntu-24.04"
      timeout-minutes:
        description: "Job timeout in minutes"
        required: false
        type: number
        default: 10

jobs:
  publish-file-breakdown:
    name: ${{ inputs.job-name }}
    runs-on: ${{ inputs.runner-image }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: read
      # Post/update file breakdown PR comments via post-pr-comment
      pull-requests: write

    steps:
      - name: Checkout repository
        # Pinned to SHA for supply chain security
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Checkout lgtm-ci tooling
        # yamllint disable-line rule:line-length
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: ${{ inputs.tooling-ref != '' && inputs.tooling-ref || github.workflow_sha }}
          sparse-checkout: |
            .github/actions/checkout-and-harden
          sparse-checkout-cone-mode: true
          persist-credentials: false

      - name: Checkout and harden
        id: egress
        uses: ./.lgtm-ci-tooling/.github/actions/checkout-and-harden
        with:
          tooling-ref: ${{ inputs.tooling-ref }}
          egress-policy: ${{ inputs.egress-policy }}
          egress-preset: ${{ inputs.egress-preset }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}
          allowed-endpoints-mode: ${{ inputs.allowed-endpoints-mode }}
          sparse-checkout-extra: |
            .github/actions/post-pr-comment
            scripts/ci/

      - name: Detect PR number
        id: pr
        shell: bash
        env:
          STEP: pr-number
          GH_TOKEN: ${{ github.token }}
          INPUT_PR_NUMBER: ""
          EVENT_NAME: ${{ github.event_name }}
          EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
          EVENT_ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: bash .lgtm-ci-tooling/scripts/ci/actions/post-pr-comment.sh

      - name: Fetch PR changed files
        if: steps.pr.outputs.number != ''
        shell: bash
        env:
          STEP: fetch
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_FILES_JSON: pr-files.json
        run: bash .lgtm-ci-tooling/scripts/ci/actions/generate-file-breakdown.sh

      - name: Generate file breakdown
        if: steps.pr.outputs.number != ''
        shell: bash
        env:
          STEP: generate
          PR_FILES_JSON: pr-files.json
          MAX_ROWS: ${{ inputs.max-rows }}
          COMMENT_OUTPUT: file-breakdown.md
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
        run: bash .lgtm-ci-tooling/scripts/ci/actions/generate-file-breakdown.sh

      - name: Publish file breakdown
        if: steps.pr.outputs.number != ''
        uses: ./.lgtm-ci-tooling/.github/actions/post-pr-comment
        with:
          file: file-breakdown.md
          marker: ${{ inputs.comment-marker }}
          pr-number: ${{ steps.pr.outputs.number }}
