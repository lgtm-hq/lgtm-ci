---
name: Reusable Validate Action Pinning

on:
  workflow_call:
    inputs:
      fail-on-error:
        description: "Fail if non-pinned actions are found"
        required: false
        type: boolean
        default: true
      allow-list:
        description: "Comma-separated action prefixes exempt from SHA pinning"
        required: false
        type: string
        default: ""
      scan-paths:
        description: "Space-separated paths to scan"
        required: false
        type: string
        default: ".github/workflows .github/actions"
      tooling-ref:
        description: "Git ref to use when checking out lgtm-ci tooling scripts"
        required: false
        type: string
        default: ""

      egress-policy:
        description: "harden-runner egress policy (audit or block)"
        required: false
        type: string
        default: "audit"
      allowed-endpoints:
        description: "Allowed endpoints when egress-policy is block"
        required: false
        type: string
        default: ""

jobs:
  action-pinning:
    name: Validate Action Pinning
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: ${{ inputs.egress-policy }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Checkout lgtm-ci tooling
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: ${{ inputs.tooling-ref != '' && inputs.tooling-ref || github.workflow_sha }}
          sparse-checkout: |
            .github/actions/
            scripts/ci/
          persist-credentials: false

      - name: Validate action pinning
        uses: ./.lgtm-ci-tooling/.github/actions/validate-action-pinning
        with:
          enforce: ${{ inputs.fail-on-error }}
          allow-org-versions: ${{ inputs.allow-list }}
          scan-paths: ${{ inputs.scan-paths }}
