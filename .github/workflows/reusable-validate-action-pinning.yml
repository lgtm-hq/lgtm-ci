---
name: Reusable Validate Action Pinning

on:
  workflow_call:
    inputs:
      fail-on-error:
        description: "Fail if non-pinned actions are found"
        required: false
        type: boolean
        default: true
      allow-tag-exceptions:
        description: >-
          Comma-separated full action names allowed to use tag refs when no SHA
          is available (narrow escape hatch; SHA + version comment is required
          otherwise)
        required: false
        type: string
        default: ""
      scan-paths:
        description: "Space-separated paths to scan"
        required: false
        type: string
        default: ".github/workflows .github/actions"
      verify-tags:
        description: >-
          Verify Renovate version comments resolve to the pinned SHA via GitHub
          API. Defaults to true so a lying `sha # vX.Y.Z` comment fails
          validation. Offline/air-gapped or token-restricted callers can set
          this to false to opt out of API tag resolution.
        required: false
        type: boolean
        default: true
      audit-transitive:
        description: >-
          Warn when pinned composite actions reference nested actions by mutable tag
        required: false
        type: boolean
        default: false
      tooling-ref:
        description: "Git ref to use when checking out lgtm-ci tooling scripts"
        required: false
        type: string
        default: ""

      egress-policy:
        description: "harden-runner egress policy (audit or block)"
        required: false
        type: string
        default: "block"
      allowed-endpoints:
        description: "Allowed endpoints when egress-policy is block"
        required: false
        type: string
        default: |
          github.com:443
          api.github.com:443
          codeload.github.com:443
          objects.githubusercontent.com:443
          raw.githubusercontent.com:443
          uploads.github.com:443
          pipelines.actions.githubusercontent.com:443
      allowed-endpoints-mode:
        description: >-
          replace: non-empty allowed-endpoints overrides egress-preset; append:
          merges preset with allowed-endpoints (deduped, first-seen wins)
        required: false
        type: string
        default: "replace"

      egress-preset:
        description: >-
          Named allowlist when allowed-endpoints is empty and egress-policy is
          block (github-minimal, github-pages, github-tooling, docker, playwright, pypi,
          rubygems, npm-publish, quality, sbom, scorecard)
        required: false
        type: string
        default: "github-tooling"

      runner-image:
        description: "GitHub-hosted runner image label"
        required: false
        type: string
        default: "ubuntu-24.04"

      timeout-minutes:
        description: "Job timeout in minutes"
        required: false
        type: number
        default: 10

jobs:
  action-pinning:
    name: Validate Action Pinning
    runs-on: ${{ inputs.runner-image }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Checkout lgtm-ci tooling
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: ${{ inputs.tooling-ref != '' && inputs.tooling-ref || github.workflow_sha }}
          sparse-checkout: |
            .github/actions/checkout-and-harden
          sparse-checkout-cone-mode: true
          persist-credentials: false

      - name: Checkout and harden
        id: egress
        uses: ./.lgtm-ci-tooling/.github/actions/checkout-and-harden
        with:
          tooling-ref: ${{ inputs.tooling-ref }}
          egress-policy: ${{ inputs.egress-policy }}
          egress-preset: ${{ inputs.egress-preset }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}
          allowed-endpoints-mode: ${{ inputs.allowed-endpoints-mode }}
          sparse-checkout-extra: |
            .github/actions/
            scripts/ci/

      - name: Harden runner
        # Pinned to SHA for supply chain security
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: ${{ inputs.egress-policy }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}

      - name: Validate action pinning
        uses: ./.lgtm-ci-tooling/.github/actions/validate-action-pinning
        with:
          enforce: ${{ inputs.fail-on-error }}
          allow-tag-exceptions: ${{ inputs.allow-tag-exceptions }}
          scan-paths: ${{ inputs.scan-paths }}
          verify-tags: ${{ inputs.verify-tags }}
          audit-transitive: ${{ inputs.audit-transitive }}
