---
name: Reusable PyPI Publishing Workflow

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version for building"
        required: false
        type: string
        default: "3.12"
      validate:
        description: "Run twine check before publishing"
        required: false
        type: boolean
        default: true
      test-pypi:
        description: "Publish to TestPyPI instead of PyPI"
        required: false
        type: boolean
        default: false
      update-homebrew:
        description: "Update Homebrew formula after publishing"
        required: false
        type: boolean
        default: false
      homebrew-tap:
        description: "Homebrew tap repository (owner/repo)"
        required: false
        type: string
        default: ""
      homebrew-formula:
        description: "Homebrew formula name"
        required: false
        type: string
        default: ""
      dry-run:
        description: "Build only, do not publish"
        required: false
        type: boolean
        default: false
      verify-tag-version:
        description: "Verify git tag matches pyproject.toml version"
        required: false
        type: boolean
        default: true
      ensure-tag-on-default-branch:
        description: "Verify tagged commit is on the default branch"
        required: false
        type: boolean
        default: true
      default-branch:
        description: "Default branch name for tag-on-default-branch check"
        required: false
        type: string
        default: "main"
      working-directory:
        description: "Working directory containing the package"
        required: false
        type: string
        default: "."
      tooling-ref:
        description: "Git ref to use when checking out lgtm-ci tooling scripts"
        required: false
        type: string
        default: ""
      egress-policy:
        description: "harden-runner egress policy (audit or block)"
        required: false
        type: string
        default: "audit"
      allowed-endpoints:
        description: "Allowed endpoints when egress-policy is block"
        required: false
        type: string
        default: ""
      job-name:
        description: "GitHub check name for the publish job"
        required: false
        type: string
        default: "Publish to PyPI"

    outputs:
      published:
        description: "Whether the package was published"
        value: ${{ jobs.publish.outputs.published }}
      version:
        description: "Published package version"
        value: ${{ jobs.publish.outputs.version }}
      package-name:
        description: "Published package name"
        value: ${{ jobs.publish.outputs.package-name }}

jobs:
  publish:
    name: ${{ inputs.job-name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write

    outputs:
      published: ${{ steps.pypi.outputs.published }}
      version: ${{ steps.pypi.outputs.version }}
      package-name: ${{ steps.pypi.outputs.package-name }}

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: ${{ inputs.egress-policy }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Checkout lgtm-ci tooling
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: ${{ inputs.tooling-ref != '' && inputs.tooling-ref || github.workflow_sha }}
          sparse-checkout: |
            .github/actions/
            scripts/ci/
          persist-credentials: false

      - name: Publish to PyPI
        id: pypi
        uses: ./.lgtm-ci-tooling/.github/actions/publish-pypi
        with:
          validate: ${{ inputs.validate }}
          test-pypi: ${{ inputs.test-pypi }}
          dry-run: ${{ inputs.dry-run }}
          verify-tag-version: ${{ inputs.verify-tag-version }}
          ensure-tag-on-default-branch: ${{ inputs.ensure-tag-on-default-branch }}
          default-branch: ${{ inputs.default-branch }}
          working-directory: ${{ inputs.working-directory }}

      - name: Attest build provenance
        if: inputs.dry-run == false
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ${{ inputs.working-directory }}/dist/*

  update-homebrew:
    name: Update Homebrew Formula
    needs: publish
    if: >-
      inputs.update-homebrew && inputs.dry-run == false &&
      needs.publish.outputs.published == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: ${{ inputs.egress-policy }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Checkout lgtm-ci tooling
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: ${{ inputs.tooling-ref != '' && inputs.tooling-ref || github.workflow_sha }}
          sparse-checkout: |
            .github/actions/
            scripts/ci/
          persist-credentials: false
      - name: Update Homebrew formula
        uses: ./.lgtm-ci-tooling/.github/actions/update-homebrew
        with:
          tap-repository: ${{ inputs.homebrew-tap }}
          formula: ${{ inputs.homebrew-formula }}
          package-name: ${{ needs.publish.outputs.package-name }}
          version: ${{ needs.publish.outputs.version }}
          wait-for-availability: "true"
          test-pypi: ${{ inputs.test-pypi }}
