---
name: Reusable E2E Matrix Test Workflow

on:
  workflow_call:
    inputs:
      node-version:
        description: "Node.js version to use"
        required: false
        type: string
        default: "20"
      test-suites:
        description: 'Comma-separated test suites to run (e.g., "smoke,visual,a11y")'
        required: false
        type: string
        default: "smoke"
      browsers:
        description: 'Comma-separated browsers to test (e.g., "chromium,firefox")'
        required: false
        type: string
        default: "chromium"
      tag-prefix:
        description: 'Tag prefix for filtering (e.g., "@" for @smoke, @visual)'
        required: false
        type: string
        default: "@"
      shards:
        description: "Number of shards per suite (0 to disable sharding)"
        required: false
        type: number
        default: 1
      reporter:
        description: "Reporter to use: json, html, blob"
        required: false
        type: string
        default: "html"
      upload-report:
        description: "Upload test reports as artifacts"
        required: false
        type: boolean
        default: true
      publish-results:
        description: "Publish merged results to GitHub Pages"
        required: false
        type: boolean
        default: false
      working-directory:
        description: "Working directory for running tests"
        required: false
        type: string
        default: "."
      timeout-minutes:
        description: "Timeout for each test job in minutes"
        required: false
        type: number
        default: 30

      tooling-ref:
        description: "Git ref to use when checking out lgtm-ci tooling scripts"
        required: false
        type: string
        default: ""
      egress-policy:
        description: "harden-runner egress policy (audit or block)"
        required: false
        type: string
        default: "block"
      allowed-endpoints:
        description: "Allowed endpoints when egress-policy is block"
        required: false
        type: string
        default: |
          github.com:443
          api.github.com:443
          codeload.github.com:443
          objects.githubusercontent.com:443
          raw.githubusercontent.com:443
          pipelines.actions.githubusercontent.com:443
          registry.npmjs.org:443
          bun.sh:443
          cdn.playwright.dev:443
          playwright.azureedge.net:443
          playwright-akamai.azureedge.net:443
          archive.ubuntu.com:80
          security.ubuntu.com:80
      allowed-endpoints-mode:
        description: >-
          replace: non-empty allowed-endpoints overrides egress-preset; append:
          merges preset with allowed-endpoints (deduped, first-seen wins)
        required: false
        type: string
        default: "replace"

      egress-preset:
        description: >-
          Named allowlist when allowed-endpoints is empty and egress-policy is
          block (github-minimal, github-pages, github-tooling, docker,
          playwright, pypi, rubygems, npm-publish, quality, sbom, scorecard)
        required: false
        type: string
        default: "playwright"
      publish-egress-preset:
        description: >-
          Named allowlist for the publish job when allowed-endpoints is empty and
          egress-policy is block (use github-pages for GitHub Pages OIDC deploy)
        required: false
        type: string
        default: "github-pages"
      publish-allowed-endpoints:
        description: >-
          Allowed endpoints for the publish job when egress-policy is block
          (replaces publish-egress-preset when non-empty)
        required: false
        type: string
        default: ""
      runner-image:
        description: "GitHub-hosted runner image label"
        required: false
        type: string
        default: "ubuntu-24.04"

    outputs:
      total-passed:
        description: "Total tests passed across all matrix jobs"
        value: ${{ jobs.merge.outputs.total-passed }}
      total-failed:
        description: "Total tests failed across all matrix jobs"
        value: ${{ jobs.merge.outputs.total-failed }}
      report-url:
        description: "URL to merged test report"
        value: ${{ jobs.publish.outputs.pages-url }}

jobs:
  # Generate matrix from inputs
  setup:
    name: Setup Matrix
    runs-on: ${{ inputs.runner-image }}
    # Independent short cap: the caller's timeout-minutes bounds the main
    # test job; this coordinator leg keeps its own fixed cap.
    timeout-minutes: 10
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}

    steps:
      - name: Checkout repository
        # Pinned to SHA for supply chain security
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Checkout for scripts
        # Pinned to SHA for supply chain security
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          sparse-checkout: scripts/ci

      - name: Checkout lgtm-ci tooling
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: ${{ inputs.tooling-ref != '' && inputs.tooling-ref || github.workflow_sha }}
          sparse-checkout: |
            .github/actions/checkout-and-harden
          sparse-checkout-cone-mode: true
          persist-credentials: false

      - name: Checkout and harden
        id: egress
        uses: ./.lgtm-ci-tooling/.github/actions/checkout-and-harden
        with:
          tooling-ref: ${{ inputs.tooling-ref }}
          egress-policy: ${{ inputs.egress-policy }}
          egress-preset: github-tooling
          allowed-endpoints: ""
          allowed-endpoints-mode: ${{ inputs.allowed-endpoints-mode }}
          sparse-checkout-extra: |
            .github/actions/
            scripts/ci/

      - name: Harden runner
        # Pinned to SHA for supply chain security
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: ${{ inputs.egress-policy }}
          allowed-endpoints: |
            github.com:443
            api.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            raw.githubusercontent.com:443
            uploads.github.com:443
            pipelines.actions.githubusercontent.com:443
      - name: Generate matrix
        id: matrix
        shell: bash
        env:
          STEP: e2e-matrix
          SUITES: ${{ inputs.test-suites }}
          BROWSERS: ${{ inputs.browsers }}
          SHARDS: ${{ inputs.shards }}
        run: .lgtm-ci-tooling/scripts/ci/actions/generate-matrix.sh

  test:
    # Static name per issue #168; GitHub appends matrix (suite/browser) to each leg.
    name: E2E tests
    needs: setup
    runs-on: ${{ inputs.runner-image }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
      - name: Checkout repository
        # Pinned to SHA for supply chain security
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Checkout lgtm-ci tooling
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: ${{ inputs.tooling-ref != '' && inputs.tooling-ref || github.workflow_sha }}
          sparse-checkout: |
            .github/actions/checkout-and-harden
          sparse-checkout-cone-mode: true
          persist-credentials: false

      - name: Checkout and harden
        id: egress
        uses: ./.lgtm-ci-tooling/.github/actions/checkout-and-harden
        with:
          tooling-ref: ${{ inputs.tooling-ref }}
          egress-policy: ${{ inputs.egress-policy }}
          egress-preset: ${{ inputs.egress-preset }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}
          allowed-endpoints-mode: ${{ inputs.allowed-endpoints-mode }}
          sparse-checkout-extra: |
            .github/actions/
            scripts/ci/

      - name: Harden runner
        # Pinned to SHA for supply chain security
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: ${{ inputs.egress-policy }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}
      - name: Cache Playwright browsers
        # Pinned to SHA for supply chain security
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ matrix.browser }}-${{ hashFiles('**/bun.lock',
            '**/package-lock.json') }}
          restore-keys: |
            playwright-${{ matrix.browser }}-

      - name: Build shard config
        id: shard
        shell: bash
        env:
          STEP: shard-config
          TOTAL_SHARDS: ${{ matrix.total_shards }}
          SHARD: ${{ matrix.shard }}
        run: .lgtm-ci-tooling/scripts/ci/actions/generate-matrix.sh

      - name: Run Playwright
        id: test
        uses: ./.lgtm-ci-tooling/.github/actions/run-playwright
        with:
          node-version: ${{ inputs.node-version }}
          browser: ${{ matrix.browser }}
          reporter: ${{ inputs.reporter }}
          shard: ${{ steps.shard.outputs.config }}
          extra-args: --grep ${{ inputs.tag-prefix }}${{ matrix.suite }}
          working-directory: ${{ inputs.working-directory }}

      - name: Upload report
        if: inputs.upload-report && always()
        # Pinned to SHA for supply chain security
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-${{ matrix.suite }}-${{ matrix.browser }}-${{ matrix.shard }}
          path: |
            ${{ inputs.working-directory }}/playwright-report/
            ${{ inputs.working-directory }}/playwright-results.json
            ${{ inputs.working-directory }}/blob-report/
          retention-days: 30
          if-no-files-found: ignore

  merge:
    name: Merge Reports
    needs: test
    if: always() && inputs.upload-report
    runs-on: ${{ inputs.runner-image }}
    # Independent short cap: the caller's timeout-minutes bounds the main
    # test job; this coordinator leg keeps its own fixed cap.
    timeout-minutes: 10
    permissions:
      contents: read

    outputs:
      total-passed: ${{ steps.merge.outputs.total-passed }}
      total-failed: ${{ steps.merge.outputs.total-failed }}

    steps:
      - name: Checkout repository
        # Pinned to SHA for supply chain security
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Checkout lgtm-ci tooling
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: ${{ inputs.tooling-ref != '' && inputs.tooling-ref || github.workflow_sha }}
          sparse-checkout: |
            .github/actions/checkout-and-harden
          sparse-checkout-cone-mode: true
          persist-credentials: false

      - name: Checkout and harden
        id: egress
        uses: ./.lgtm-ci-tooling/.github/actions/checkout-and-harden
        with:
          tooling-ref: ${{ inputs.tooling-ref }}
          egress-policy: ${{ inputs.egress-policy }}
          egress-preset: github-tooling
          allowed-endpoints: ""
          allowed-endpoints-mode: ${{ inputs.allowed-endpoints-mode }}
          sparse-checkout-extra: |
            .github/actions/
            scripts/ci/

      - name: Harden runner
        # Pinned to SHA for supply chain security
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: ${{ inputs.egress-policy }}
          allowed-endpoints: |
            github.com:443
            api.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            raw.githubusercontent.com:443
            uploads.github.com:443
            pipelines.actions.githubusercontent.com:443
      - name: Download all reports
        # Pinned to SHA for supply chain security
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: playwright-*
          path: playwright-reports
          merge-multiple: true

      - name: Merge reports
        id: merge
        uses: ./.lgtm-ci-tooling/.github/actions/merge-playwright-reports
        with:
          input-dir: playwright-reports
          output-dir: merged-report
          # Map 'blob' reporter to 'html' for merging (blob is intermediate format)
          report-format: ${{ inputs.reporter == 'blob' && 'html' || inputs.reporter }}

      - name: Upload merged report
        # Pinned to SHA for supply chain security
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-merged-report
          path: merged-report
          retention-days: 30
          if-no-files-found: ignore

  publish:
    name: Publish Results
    needs: merge
    if: inputs.publish-results && !cancelled()
    runs-on: ${{ inputs.runner-image }}
    # Independent short cap: the caller's timeout-minutes bounds the main
    # test job; this coordinator leg keeps its own fixed cap.
    timeout-minutes: 10
    concurrency:
      group: pages-${{ github.repository }}-${{ github.ref }}
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.publish.outputs.pages-url }}
    permissions:
      contents: read
      pages: write
      id-token: write
      actions: write # delete stale same-run Pages artifacts on rerun (#415)

    outputs:
      pages-url: ${{ steps.publish.outputs.pages-url }}

    steps:
      - name: Checkout repository
        # Pinned to SHA for supply chain security
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Checkout lgtm-ci tooling
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: ${{ inputs.tooling-ref != '' && inputs.tooling-ref || github.workflow_sha }}
          sparse-checkout: |
            .github/actions/checkout-and-harden
          sparse-checkout-cone-mode: true
          persist-credentials: false

      - name: Checkout and harden
        id: egress
        uses: ./.lgtm-ci-tooling/.github/actions/checkout-and-harden
        with:
          tooling-ref: ${{ inputs.tooling-ref }}
          egress-policy: ${{ inputs.egress-policy }}
          egress-preset: ${{ inputs.publish-egress-preset }}
          allowed-endpoints: ${{ inputs.publish-allowed-endpoints }}
          allowed-endpoints-mode: ${{ inputs.allowed-endpoints-mode }}
          sparse-checkout-extra: |
            .github/actions/
            scripts/ci/

      - name: Harden runner
        # Pinned to SHA for supply chain security
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: ${{ inputs.egress-policy }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}
      - name: Download merged report
        # Pinned to SHA for supply chain security
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: playwright-merged-report
          path: merged-report

      - name: Publish to GitHub Pages
        id: publish
        uses: ./.lgtm-ci-tooling/.github/actions/publish-test-results
        with:
          results-path: merged-report
          target-dir: playwright
