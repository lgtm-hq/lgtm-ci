---
name: Reusable Dependency Review

on:
  workflow_call:
    inputs:
      fail-on-severity:
        description: "Lowest vulnerability severity that fails the workflow"
        required: false
        type: string
        default: "high"
      deny-licenses:
        description: "Comma-separated SPDX license identifiers to deny"
        required: false
        type: string
        default: ""
      allow-licenses:
        description: "Comma-separated SPDX license identifiers to allow"
        required: false
        type: string
        default: ""

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Dependency review
        uses: actions/dependency-review-action@595b5aeba73380359d98a5e087f648dbb0edce1b # v4.7.3
        with:
          fail-on-severity: ${{ inputs.fail-on-severity }}
          deny-licenses: ${{ inputs.deny-licenses }}
          allow-licenses: ${{ inputs.allow-licenses }}
