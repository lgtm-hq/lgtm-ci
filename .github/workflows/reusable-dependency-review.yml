---
name: Reusable Dependency Review

on:
  workflow_call:
    inputs:
      fail-on-severity:
        description: "Lowest vulnerability severity that fails the workflow"
        required: false
        type: string
        default: "high"
      deny-licenses:
        description: "Comma-separated SPDX license identifiers to deny"
        required: false
        type: string
        default: ""
      allow-licenses:
        description: "Comma-separated SPDX license identifiers to allow"
        required: false
        type: string
        default: ""
      allow-dependencies-licenses:
        description: >-
          Comma-separated PURLs exempted from license checks regardless of
          allow-licenses/deny-licenses (e.g. lgtm-ci composite actions that
          report Unknown license in the actions ecosystem — see
          docs/workflow-contract.md#dependency-review for canonical PURLs).
        required: false
        type: string
        default: ""

      tooling-ref:
        description: >-
          Optional — pins egress composites only (no scripts/ci checkout).
          Defaults to caller workflow SHA.
        required: false
        type: string
        default: ""

      egress-policy:
        description: "harden-runner egress policy (audit or block)"
        required: false
        type: string
        default: "block"
      allowed-endpoints:
        description: "Allowed endpoints when egress-policy is block"
        required: false
        type: string
        default: |
          github.com:443
          api.github.com:443
          codeload.github.com:443
          objects.githubusercontent.com:443
          raw.githubusercontent.com:443
          uploads.github.com:443
          pipelines.actions.githubusercontent.com:443
      allowed-endpoints-mode:
        description: >-
          replace: non-empty allowed-endpoints overrides egress-preset; append:
          merges preset with allowed-endpoints (deduped, first-seen wins)
        required: false
        type: string
        default: "replace"

      egress-preset:
        description: >-
          Named allowlist when allowed-endpoints is empty and egress-policy is
          block (github-minimal, github-pages, github-tooling, docker, playwright, pypi,
          rubygems, npm-publish, quality, sbom, scorecard)
        required: false
        type: string
        default: "github-tooling"
      job-name:
        description: "GitHub check name (runs on pull_request and merge_group events)"
        required: false
        type: string
        default: "Dependency Review"

      timeout-minutes:
        description: "Job timeout in minutes"
        required: false
        type: number
        default: 10

jobs:
  dependency-review:
    name: ${{ inputs.job-name }}
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Harden runner
        # Pinned to SHA for supply chain security
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: ${{ inputs.egress-policy }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Checkout lgtm-ci tooling
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: ${{ inputs.tooling-ref != '' && inputs.tooling-ref || github.workflow_sha }}
          sparse-checkout: |
            .github/actions/checkout-and-harden
          sparse-checkout-cone-mode: true
          persist-credentials: false
      - name: Checkout and harden
        id: egress
        uses: ./.lgtm-ci-tooling/.github/actions/checkout-and-harden
        with:
          tooling-ref: ${{ inputs.tooling-ref }}
          egress-policy: ${{ inputs.egress-policy }}
          egress-preset: ${{ inputs.egress-preset }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}
          allowed-endpoints-mode: ${{ inputs.allowed-endpoints-mode }}
      - name: Dependency review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: ${{ inputs.fail-on-severity }}
          deny-licenses: ${{ inputs.deny-licenses }}
          allow-licenses: ${{ inputs.allow-licenses }}
          allow-dependencies-licenses: ${{ inputs.allow-dependencies-licenses }}
