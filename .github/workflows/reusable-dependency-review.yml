---
name: Reusable Dependency Review

on:
  workflow_call:
    inputs:
      fail-on-severity:
        description: "Lowest vulnerability severity that fails the workflow"
        required: false
        type: string
        default: "high"
      deny-licenses:
        description: "Comma-separated SPDX license identifiers to deny"
        required: false
        type: string
        default: ""
      allow-licenses:
        description: "Comma-separated SPDX license identifiers to allow"
        required: false
        type: string
        default: ""

      egress-policy:
        description: "harden-runner egress policy (audit or block)"
        required: false
        type: string
        default: "audit"
      allowed-endpoints:
        description: "Allowed endpoints when egress-policy is block"
        required: false
        type: string
        default: ""
      job-name:
        description: "GitHub check name (only runs on pull_request events)"
        required: false
        type: string
        default: "Dependency Review"

jobs:
  dependency-review:
    name: ${{ inputs.job-name }}
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: ${{ inputs.egress-policy }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Dependency review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: ${{ inputs.fail-on-severity }}
          deny-licenses: ${{ inputs.deny-licenses }}
          allow-licenses: ${{ inputs.allow-licenses }}
