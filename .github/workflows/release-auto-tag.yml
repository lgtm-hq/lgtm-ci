---
name: "Release: Auto Tag"

on:
  push:
    branches: [main]
    paths:
      - "CHANGELOG.md"
  workflow_dispatch:
    inputs:
      version:
        description: "The version to tag (e.g., 1.2.3)"
        required: true
        type: string

concurrency:
  group: release-auto-tag-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  auto-tag:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0 # v2.12.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Create GitHub App installation token
        id: app-token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Guard release commit
        id: guard
        shell: bash
        run: scripts/ci/release/guard-release-commit.sh

      - name: Extract version from commit
        # yamllint disable-line rule:line-length
        if: steps.guard.outputs.is-release-commit == 'true' || github.event_name == 'workflow_dispatch'
        id: version
        shell: bash
        env:
          COMMIT_MESSAGE: >-
            ${{ github.event_name == 'workflow_dispatch'
                && format('chore(release): version {0}', inputs.version)
                || '' }}
        run: scripts/ci/release/extract-version-from-commit.sh

      - name: Configure git with app token
        # yamllint disable-line rule:line-length
        if: steps.version.outputs.found == 'true'
        shell: bash
        run: |
          git remote set-url origin \
            "https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/${{ github.repository }}.git"

      - name: Create release tag
        if: steps.version.outputs.found == 'true'
        id: tag
        uses: ./.github/actions/create-release-tag
        with:
          version: ${{ steps.version.outputs.version }}
          tag-prefix: v
          push: "true"

      - name: Create GitHub release
        if: steps.version.outputs.found == 'true'
        id: github-release
        uses: ./.github/actions/create-github-release
        with:
          tag: ${{ steps.tag.outputs.tag-name }}

      - name: Update floating tag
        if: steps.version.outputs.found == 'true'
        shell: bash
        env:
          TAG: ${{ steps.tag.outputs.tag-name }}
          TAG_PREFIX: v
          PUSH: "true"
        run: scripts/ci/release/update-floating-tag.sh

      - name: Release summary
        if: steps.version.outputs.found == 'true'
        shell: bash
        env:
          SUMMARY_TYPE: release
          VERSION: ${{ steps.version.outputs.version }}
          TAG_NAME: ${{ steps.tag.outputs.tag-name }}
          RELEASE_URL: ${{ steps.github-release.outputs.release-url }}
        run: scripts/ci/release/write-release-summary.sh

      - name: Skip summary
        if: steps.guard.outputs.is-release-commit != 'true' && github.event_name != 'workflow_dispatch'
        shell: bash
        run: |
          {
            echo "## Auto Tag Summary"
            echo ""
            echo "Skipped: last commit is not a release commit"
          } >> "$GITHUB_STEP_SUMMARY"
