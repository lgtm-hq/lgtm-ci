---
name: "Release: Auto Tag"

"on":
  push:
    branches: [main]
    paths:
      - "CHANGELOG.md"
  workflow_dispatch:
    inputs:
      version:
        description: "The version to tag (e.g., 1.2.3)"
        required: true
        type: string

concurrency:
  group: release-auto-tag-${{ github.repository }}
  cancel-in-progress: false

jobs:
  auto-tag:
    # yamllint disable-line rule:line-length
    uses: ./.github/workflows/reusable-release-auto-tag.yml
    with:
      version: ${{ github.event_name == 'workflow_dispatch' && inputs.version || '' }}
    secrets:
      RELEASE_APP_ID: ${{ secrets.RELEASE_APP_ID }}
      RELEASE_APP_PRIVATE_KEY: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
    permissions:
      contents: write
