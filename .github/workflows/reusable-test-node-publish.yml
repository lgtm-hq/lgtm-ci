# SPDX-License-Identifier: MIT
---
name: Reusable Node.js Test Publish Workflow

on:
  workflow_call:
    inputs:
      working-directory:
        description: "Working directory for published results"
        required: false
        type: string
        default: "."
      coverage-percent:
        description: "Coverage percentage for badge generation"
        required: false
        type: string
        default: "0"
      upload-coverage:
        description: "Whether coverage artifacts were uploaded by the test workflow"
        required: false
        type: boolean
        default: true
      tooling-ref:
        description: "Git ref to use when checking out lgtm-ci tooling scripts"
        required: false
        type: string
        default: ""
      egress-policy:
        description: "harden-runner egress policy (audit or block)"
        required: false
        type: string
        default: "block"
      allowed-endpoints:
        description: "Allowed endpoints when egress-policy is block"
        required: false
        type: string
        default: ""

      allowed-endpoints-mode:
        description: >-
          replace: non-empty allowed-endpoints overrides egress-preset; append:
          merges preset with allowed-endpoints (deduped, first-seen wins)
        required: false
        type: string
        default: "replace"

      egress-preset:
        description: >-
          Named allowlist when allowed-endpoints is empty and egress-policy is
          block (github-minimal, github-pages, github-tooling, docker, playwright, pypi,
          rubygems, npm-publish, quality, sbom, scorecard)
        required: false
        type: string
        default: "github-pages"
      job-name:
        description: "GitHub check name for the publish job"
        required: false
        type: string
        default: "Publish Results"
      runner-image:
        description: "GitHub-hosted runner image label"
        required: false
        type: string
        default: "ubuntu-24.04"
      timeout-minutes:
        description: "Job timeout in minutes"
        required: false
        type: number
        default: 30

# Shared Pages concurrency serializes deploys per repository/ref.
# WARNING: Do not invoke this workflow alongside reusable-test-python-publish
# on the same event unless subtrees are combined in one publish job or each job
# uses publish-test-results merge-existing-site: true (Model A fallback, #225).
# Without merge, each deploy replaces the entire site and the last queued job
# wins. Monorepos needing a site plus multiple report subtrees on one Pages
# origin should prefer reusable-deploy-site-with-reports (Model B, #226).
# See docs/pages-publishing.md.
concurrency:
  group: pages-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: ${{ inputs.job-name }}
    runs-on: ${{ inputs.runner-image }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    environment:
      name: github-pages
      url: ${{ steps.publish.outputs.pages-url }}
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Checkout lgtm-ci tooling
        # yamllint disable-line rule:line-length
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: ${{ inputs.tooling-ref != '' && inputs.tooling-ref || github.workflow_sha }}
          sparse-checkout: |
            .github/actions/
            scripts/ci/
          sparse-checkout-cone-mode: true
          persist-credentials: false

      - name: Resolve egress allowlist
        id: egress
        uses: ./.lgtm-ci-tooling/.github/actions/resolve-egress-allowlist
        with:
          egress-policy: ${{ inputs.egress-policy }}
          egress-preset: ${{ inputs.egress-preset }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}
          allowed-endpoints-mode: ${{ inputs.allowed-endpoints-mode }}
      - name: Harden runner
        # yamllint disable-line rule:line-length
        uses: ./.lgtm-ci-tooling/.github/actions/harden-runner
        with:
          egress-policy: ${{ inputs.egress-policy }}
          allowed-endpoints: ${{ steps.egress.outputs['allowed-endpoints'] }}
          disable-sudo: false
          disable-telemetry: false

      - name: Download coverage
        if: inputs.upload-coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: node-coverage-*
          path: node-coverage-artifacts
          merge-multiple: false

      - name: Merge coverage report
        if: inputs.upload-coverage
        shell: bash
        env:
          ARTIFACTS_DIR: node-coverage-artifacts
          OUTPUT_DIR: coverage-report
          WORKING_DIRECTORY: ${{ inputs.working-directory }}
        run: bash .lgtm-ci-tooling/scripts/ci/actions/merge-node-coverage.sh

      - name: Generate badge
        if: inputs.upload-coverage
        uses: ./.lgtm-ci-tooling/.github/actions/generate-coverage-badge
        with:
          coverage-percent: ${{ inputs.coverage-percent }}
          format: svg
          output-path: >-
            ${{ inputs.working-directory == '.' && 'coverage-report/badge.svg' ||
            format('coverage-report/{0}/badge.svg', inputs.working-directory) }}

      - name: Publish to GitHub Pages
        if: inputs.upload-coverage
        id: publish
        uses: ./.lgtm-ci-tooling/.github/actions/publish-test-results
        with:
          results-path: >-
            ${{ inputs.working-directory == '.' && 'coverage-report' ||
            format('coverage-report/{0}', inputs.working-directory) }}
          coverage-path: >-
            ${{ inputs.working-directory == '.' && 'coverage-report' ||
            format('coverage-report/{0}', inputs.working-directory) }}
          badge-path: >-
            ${{ inputs.working-directory == '.' && 'coverage-report' ||
            format('coverage-report/{0}', inputs.working-directory) }}
          target-dir: vitest
