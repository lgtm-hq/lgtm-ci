---
name: Reusable Coverage Workflow

on:
  workflow_call:
    inputs:
      coverage-files:
        description: "Glob pattern or comma-separated list of coverage files"
        required: false
        type: string
        default: ""
      format:
        description: "Coverage format: auto, istanbul, coverage-py, lcov"
        required: false
        type: string
        default: "auto"
      threshold:
        description: "Minimum coverage percentage to pass"
        required: false
        type: number
        default: 0
      generate-badge:
        description: "Generate coverage badge"
        required: false
        type: boolean
        default: true
      publish-pages:
        description: "Publish coverage to GitHub Pages"
        required: false
        type: boolean
        default: false
      working-directory:
        description: "Working directory"
        required: false
        type: string
        default: "."

      tooling-ref:
        description: "Git ref to use when checking out lgtm-ci tooling scripts"
        required: false
        type: string
        default: ""
      egress-policy:
        description: "harden-runner egress policy (audit or block)"
        required: false
        type: string
        default: "block"
      allowed-endpoints:
        description: "Allowed endpoints when egress-policy is block"
        required: false
        type: string
        default: ""

      allowed-endpoints-mode:
        description: >-
          replace: non-empty allowed-endpoints overrides egress-preset; append:
          merges preset with allowed-endpoints (deduped, first-seen wins)
        required: false
        type: string
        default: "replace"

      egress-preset:
        description: >-
          Named allowlist when allowed-endpoints is empty and egress-policy is
          block (github-minimal, github-pages, github-tooling, docker, playwright, pypi,
          rubygems, npm-publish, quality, sbom, scorecard)
        required: false
        type: string
        default: "github-tooling"
      job-name:
        description: "GitHub check name for the coverage job"
        required: false
        type: string
        default: "Coverage"
      post-pr-comment:
        description: "Post a PR comment with coverage summary"
        required: false
        type: boolean
        default: false
      comment-marker:
        description: "PR comment marker for coverage reports"
        required: false
        type: string
        default: "coverage-report"
      comment-title:
        description: "PR comment title for coverage reports"
        required: false
        type: string
        default: "Coverage Report"

    outputs:
      coverage-percent:
        description: "Overall coverage percentage"
        value: ${{ jobs.coverage.outputs.coverage-percent }}
      badge-url:
        description: "URL to coverage badge"
        value: ${{ jobs.coverage.outputs.badge-url }}
      pages-url:
        description: "GitHub Pages URL"
        value: ${{ jobs.publish.outputs.pages-url }}
      passed:
        description: "Whether coverage meets threshold"
        value: ${{ jobs.coverage.outputs.passed }}

jobs:
  coverage:
    name: ${{ inputs.job-name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    outputs:
      coverage-percent: ${{ steps.collect.outputs.coverage-percent }}
      badge-url: ${{ steps.badge.outputs.badge-url }}
      passed: ${{ steps.threshold.outputs.passed }}

    steps:
      - name: Checkout repository
        # Pinned to SHA for supply chain security
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Checkout lgtm-ci tooling
        # yamllint disable-line rule:line-length
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: ${{ inputs.tooling-ref != '' && inputs.tooling-ref || github.workflow_sha }}
          sparse-checkout: |
            .github/actions/
          sparse-checkout-cone-mode: true
          persist-credentials: false

      - name: Resolve egress allowlist
        id: egress
        uses: ./.lgtm-ci-tooling/.github/actions/resolve-egress-allowlist
        with:
          egress-policy: ${{ inputs.egress-policy }}
          egress-preset: ${{ inputs.egress-preset }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}
          allowed-endpoints-mode: ${{ inputs.allowed-endpoints-mode }}
      - name: Harden runner
        # yamllint disable-line rule:line-length
        uses: ./.lgtm-ci-tooling/.github/actions/harden-runner
        with:
          egress-policy: ${{ inputs.egress-policy }}
          allowed-endpoints: ${{ steps.egress.outputs['allowed-endpoints'] }}
      - name: Download coverage artifacts
        # Pinned to SHA for supply chain security
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: "*-coverage"
          path: coverage-artifacts
          merge-multiple: true

      - name: Collect coverage
        id: collect
        uses: ./.lgtm-ci-tooling/.github/actions/collect-coverage
        with:
          coverage-files: ${{ inputs.coverage-files }}
          input-format: ${{ inputs.format }}
          output-format: json
          working-directory: ${{ inputs.working-directory }}

      - name: Check coverage threshold
        id: threshold
        uses: ./.lgtm-ci-tooling/.github/actions/check-coverage-threshold
        with:
          coverage-percent: ${{ steps.collect.outputs.coverage-percent }}
          threshold: ${{ inputs.threshold }}

      - name: Generate badge
        id: badge
        if: inputs.generate-badge
        uses: ./.lgtm-ci-tooling/.github/actions/generate-coverage-badge
        with:
          coverage-percent: ${{ steps.collect.outputs.coverage-percent }}
          format: svg
          output-path: coverage/badge.svg
          working-directory: ${{ inputs.working-directory }}

      - name: Upload coverage report
        # Pinned to SHA for supply chain security
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: |
            ${{ inputs.working-directory }}/${{ steps.collect.outputs.merged-coverage-file }}
            ${{ inputs.working-directory }}/coverage/
          retention-days: 30
          if-no-files-found: ignore

  publish:
    name: Publish Coverage
    needs: coverage
    if: inputs.publish-pages
    runs-on: ubuntu-latest
    concurrency:
      group: pages-${{ github.repository }}-${{ github.ref }}
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.publish.outputs.pages-url }}
    permissions:
      contents: read
      pages: write
      id-token: write

    outputs:
      pages-url: ${{ steps.publish.outputs.pages-url }}

    steps:
      - name: Checkout repository
        # Pinned to SHA for supply chain security
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Checkout lgtm-ci tooling
        # yamllint disable-line rule:line-length
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: ${{ inputs.tooling-ref != '' && inputs.tooling-ref || github.workflow_sha }}
          sparse-checkout: |
            .github/actions/
          sparse-checkout-cone-mode: true
          persist-credentials: false

      - name: Resolve egress allowlist
        id: egress
        uses: ./.lgtm-ci-tooling/.github/actions/resolve-egress-allowlist
        with:
          egress-policy: ${{ inputs.egress-policy }}
          egress-preset: github-pages
          allowed-endpoints: ${{ inputs.allowed-endpoints }}
          allowed-endpoints-mode: ${{ inputs.allowed-endpoints-mode }}
      - name: Harden runner
        # yamllint disable-line rule:line-length
        uses: ./.lgtm-ci-tooling/.github/actions/harden-runner
        with:
          egress-policy: ${{ inputs.egress-policy }}
          allowed-endpoints: ${{ steps.egress.outputs['allowed-endpoints'] }}
      - name: Download coverage report
        # Pinned to SHA for supply chain security
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-report
          path: coverage-report

      - name: Publish to GitHub Pages
        id: publish
        uses: ./.lgtm-ci-tooling/.github/actions/publish-test-results
        with:
          coverage-path: >-
            ${{ inputs.working-directory == '.' && 'coverage-report' ||
            format('coverage-report/{0}', inputs.working-directory) }}
          badge-path: >-
            ${{ inputs.working-directory == '.' && 'coverage-report/coverage' ||
            format('coverage-report/{0}/coverage', inputs.working-directory) }}
          target-dir: coverage

  comment-pr:
    name: Coverage PR Comment
    needs: coverage
    if: >-
      always()
      && inputs.post-pr-comment
      && github.event_name == 'pull_request'
      && github.event.pull_request.head.repo.fork == false
      && needs.coverage.outputs.coverage-percent != ''
    uses: ./.github/workflows/reusable-coverage-pr-comment.yml
    permissions:
      contents: read
      pull-requests: write
    with:
      coverage-percent: ${{ needs.coverage.outputs.coverage-percent }}
      threshold: ${{ inputs.threshold }}
      comment-title: ${{ inputs.comment-title }}
      comment-marker: ${{ inputs.comment-marker }}
      passed: ${{ needs.coverage.outputs.passed }}
      tooling-ref: ${{ inputs.tooling-ref }}
