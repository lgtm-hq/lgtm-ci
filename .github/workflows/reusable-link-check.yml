---
name: Reusable Link Check

on:
  workflow_call:
    inputs:
      paths:
        description: "Comma-separated files or directories to scan"
        required: false
        type: string
        default: "."
      file-extensions:
        description: "File extensions to scan, comma-separated"
        required: false
        type: string
        default: "md,html"
      exclude-patterns:
        description: "Comma-separated path or URL patterns to exclude"
        required: false
        type: string
        default: ""
      check-external:
        description: "Check external HTTP(S) links"
        required: false
        type: boolean
        default: true
      timeout:
        description: "HTTP timeout in seconds"
        required: false
        type: string
        default: "10"
      fail-on-error:
        description: "Fail workflow if broken links are found"
        required: false
        type: boolean
        default: true
      comment-on-pr:
        description: "Post a PR comment with broken link report"
        required: false
        type: boolean
        default: false
      working-directory:
        description: "Working directory for link checking"
        required: false
        type: string
        default: "."
      tooling-ref:
        description: "Git ref to use when checking out lgtm-ci tooling scripts"
        required: false
        type: string
        default: ""

      egress-policy:
        description: "harden-runner egress policy (audit or block)"
        required: false
        type: string
        default: "audit"
      allowed-endpoints:
        description: "Allowed endpoints when egress-policy is block"
        required: false
        type: string
        default: ""
      job-name:
        description: "GitHub check name for the link check job"
        required: false
        type: string
        default: "Link Check"
      comment-marker:
        description: "PR comment marker for link check reports"
        required: false
        type: string
        default: "lychee-report"

jobs:
  link-check:
    name: ${{ inputs.job-name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: ${{ inputs.egress-policy }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Checkout lgtm-ci tooling
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: ${{ inputs.tooling-ref != '' && inputs.tooling-ref || github.workflow_sha }}
          sparse-checkout: scripts/ci/
          sparse-checkout-cone-mode: true
          persist-credentials: false

      - name: Build Lychee arguments
        id: args
        shell: bash
        env:
          PATHS: ${{ inputs.paths }}
          FILE_EXTENSIONS: ${{ inputs.file-extensions }}
          EXCLUDE_PATTERNS: ${{ inputs.exclude-patterns }}
          CHECK_EXTERNAL: ${{ inputs.check-external }}
          TIMEOUT: ${{ inputs.timeout }}
          WORKING_DIRECTORY: ${{ inputs.working-directory }}
        run: bash .lgtm-ci-tooling/scripts/ci/actions/build-lychee-args.sh

      - name: Check links
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: ${{ steps.args.outputs.args }}
          token: ${{ github.token }}
          fail: ${{ inputs.fail-on-error }}

      - name: Upload link report
        if: >-
          always()
          && inputs.comment-on-pr
          && hashFiles('lychee-report.md') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lychee-report
          path: lychee-report.md
          retention-days: 1
          if-no-files-found: ignore

  comment-pr:
    name: ${{ inputs.job-name }} Comment
    needs: link-check
    if: >-
      always()
      && inputs.comment-on-pr
      && github.event_name == 'pull_request'
      && github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: ${{ inputs.egress-policy }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}
      - name: Checkout lgtm-ci tooling
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: ${{ inputs.tooling-ref != '' && inputs.tooling-ref || github.workflow_sha }}
          sparse-checkout: scripts/ci/
          sparse-checkout-cone-mode: true
          persist-credentials: false

      - name: Download link report
        id: download
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: lychee-report
          path: .

      - name: Warn on missing report
        if: steps.download.outcome != 'success'
        shell: bash
        run: echo "::warning::lychee-report artifact not found — link check may not have produced output"

      - name: Read comment from file
        id: read
        if: steps.download.outcome == 'success' && hashFiles('lychee-report.md') != ''
        shell: bash
        env:
          STEP: read-file
          COMMENT_FILE: lychee-report.md
        run: bash .lgtm-ci-tooling/scripts/ci/actions/post-pr-comment.sh

      - name: Post PR comment
        if: steps.download.outcome == 'success' && steps.read.outputs.file_provided == 'true'
        shell: bash
        env:
          STEP: post
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_PULL_REQUEST_HEAD_REPO_FULL_NAME: ${{ github.event.pull_request.head.repo.full_name }}
          MARKER: ${{ inputs.comment-marker }}
          MODE: upsert
          DELETE_ON_EMPTY: "false"
          FILE_PROVIDED: ${{ steps.read.outputs.file_provided }}
          BODY_FROM_FILE: ${{ steps.read.outputs.body }}
          BODY_FROM_INPUT: ""
        run: bash .lgtm-ci-tooling/scripts/ci/actions/post-pr-comment.sh
