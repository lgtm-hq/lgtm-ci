---
name: Reusable Link Check

on:
  workflow_call:
    inputs:
      paths:
        description: "Comma-separated files or directories to scan"
        required: false
        type: string
        default: "."
      file-extensions:
        description: "File extensions to scan, comma-separated"
        required: false
        type: string
        default: "md,html"
      exclude-patterns:
        description: "Comma-separated path or URL patterns to exclude"
        required: false
        type: string
        default: ""
      check-external:
        description: >-
          Check external HTTP(S) links. With egress-policy block, set
          allowed-endpoints for target sites (egress-preset github-tooling is
          GitHub-only).
        required: false
        type: boolean
        default: true
      timeout:
        description: "HTTP timeout in seconds"
        required: false
        type: string
        default: "10"
      fail-on-error:
        description: "Fail workflow if broken links are found"
        required: false
        type: boolean
        default: true
      comment-on-pr:
        description: "Post a PR comment with broken link report"
        required: false
        type: boolean
        default: false
      working-directory:
        description: "Working directory for link checking"
        required: false
        type: string
        default: "."
      tooling-ref:
        description: "Git ref to use when checking out lgtm-ci tooling scripts"
        required: false
        type: string
        default: ""

      egress-policy:
        description: "harden-runner egress policy (audit or block)"
        required: false
        type: string
        default: "block"
      allowed-endpoints:
        description: "Allowed endpoints when egress-policy is block"
        required: false
        type: string
        default: ""

      allowed-endpoints-mode:
        description: >-
          replace: non-empty allowed-endpoints overrides egress-preset; append:
          merges preset with allowed-endpoints (deduped, first-seen wins)
        required: false
        type: string
        default: "replace"

      egress-preset:
        description: >-
          Named allowlist when allowed-endpoints is empty and egress-policy is
          block (github-minimal, github-pages, github-tooling, docker, playwright, pypi,
          rubygems, npm-publish, quality, sbom, scorecard)
        required: false
        type: string
        default: "github-tooling"
      job-name:
        description: "GitHub check name for the link check job"
        required: false
        type: string
        default: "Link Check"
      comment-marker:
        description: "PR comment marker for link check reports"
        required: false
        type: string
        default: "lychee-report"

jobs:
  link-check:
    name: ${{ inputs.job-name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Checkout lgtm-ci tooling
        # yamllint disable-line rule:line-length
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: ${{ inputs.tooling-ref != '' && inputs.tooling-ref || github.workflow_sha }}
          sparse-checkout: |
            .github/actions/harden-runner
            .github/actions/resolve-egress-allowlist
            scripts/ci/
          sparse-checkout-cone-mode: true
          persist-credentials: false

      - name: Resolve egress allowlist
        id: egress
        uses: ./.lgtm-ci-tooling/.github/actions/resolve-egress-allowlist
        with:
          egress-policy: ${{ inputs.egress-policy }}
          egress-preset: ${{ inputs.egress-preset }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}
          allowed-endpoints-mode: ${{ inputs.allowed-endpoints-mode }}
      - name: Harden runner
        # yamllint disable-line rule:line-length
        uses: ./.lgtm-ci-tooling/.github/actions/harden-runner
        with:
          egress-policy: ${{ inputs.egress-policy }}
          allowed-endpoints: ${{ steps.egress.outputs['allowed-endpoints'] }}

      - name: Build Lychee arguments
        id: args
        shell: bash
        env:
          PATHS: ${{ inputs.paths }}
          FILE_EXTENSIONS: ${{ inputs.file-extensions }}
          EXCLUDE_PATTERNS: ${{ inputs.exclude-patterns }}
          CHECK_EXTERNAL: ${{ inputs.check-external }}
          TIMEOUT: ${{ inputs.timeout }}
          WORKING_DIRECTORY: ${{ inputs.working-directory }}
        run: bash .lgtm-ci-tooling/scripts/ci/actions/build-lychee-args.sh

      - name: Check links
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: ${{ steps.args.outputs.args }}
          token: ${{ github.token }}
          fail: ${{ inputs.fail-on-error }}

      - name: Upload link report
        if: >-
          always()
          && inputs.comment-on-pr
          && hashFiles('lychee-report.md') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lychee-report
          path: lychee-report.md
          retention-days: 1
          if-no-files-found: ignore

  comment-pr:
    name: ${{ inputs.job-name }} Comment
    needs: link-check
    if: >-
      always()
      && inputs.comment-on-pr
      && github.event_name == 'pull_request'
      && github.event.pull_request.head.repo.fork == false
    uses: ./.github/workflows/reusable-artifact-pr-comment.yml
    permissions:
      contents: read
      pull-requests: write
    with:
      artifact-name: lychee-report
      comment-file: lychee-report.md
      marker: ${{ inputs.comment-marker }}
      job-name: ${{ inputs.job-name }} Comment
      missing-artifact-warning: >-
        lychee-report artifact not found — link check may not have produced output
      tooling-ref: ${{ inputs.tooling-ref }}
