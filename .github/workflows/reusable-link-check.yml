---
name: Reusable Link Check

on:
  workflow_call:
    inputs:
      paths:
        description: "Comma-separated files or directories to scan"
        required: false
        type: string
        default: "."
      file-extensions:
        description: "File extensions to scan, comma-separated"
        required: false
        type: string
        default: "md,html"
      exclude-patterns:
        description: "Comma-separated path or URL patterns to exclude"
        required: false
        type: string
        default: ""
      check-external:
        description: >-
          Check external HTTP(S) links. With egress-policy block, set
          allowed-endpoints for target sites (egress-preset github-tooling is
          GitHub-only).
        required: false
        type: boolean
        default: true
      timeout:
        description: "HTTP timeout in seconds"
        required: false
        type: string
        default: "10"
      fail-on-error:
        description: "Fail workflow if broken links are found"
        required: false
        type: boolean
        default: true
      publish-link-check-report:
        description: "Publish broken-link report on the pull request"
        required: false
        type: boolean
        default: false
      working-directory:
        description: "Working directory for link checking"
        required: false
        type: string
        default: "."
      tooling-ref:
        description: "Git ref to use when checking out lgtm-ci tooling scripts"
        required: false
        type: string
        default: ""

      egress-policy:
        description: "harden-runner egress policy (audit or block)"
        required: false
        type: string
        default: "block"
      allowed-endpoints:
        description: "Allowed endpoints when egress-policy is block"
        required: false
        type: string
        default: |
          github.com:443
          api.github.com:443
          codeload.github.com:443
          objects.githubusercontent.com:443
          raw.githubusercontent.com:443
          uploads.github.com:443
          pipelines.actions.githubusercontent.com:443
      allowed-endpoints-mode:
        description: >-
          replace: non-empty allowed-endpoints overrides egress-preset; append:
          merges preset with allowed-endpoints (deduped, first-seen wins)
        required: false
        type: string
        default: "replace"

      egress-preset:
        description: >-
          Named allowlist when allowed-endpoints is empty and egress-policy is
          block (github-minimal, github-pages, github-tooling, docker, playwright, pypi,
          rubygems, npm-publish, quality, sbom, scorecard)
        required: false
        type: string
        default: "github-tooling"
      job-name:
        description: "GitHub check name for the link check job"
        required: false
        type: string
        default: "Link Check"
      comment-marker:
        description: "Upsert marker for the link-check report comment"
        required: false
        type: string
        default: "lychee-report"

      runner-image:
        description: "GitHub-hosted runner image label"
        required: false
        type: string
        default: "ubuntu-24.04"

      timeout-minutes:
        description: "Job timeout in minutes"
        required: false
        type: number
        default: 15

jobs:
  link-check:
    name: ${{ inputs.job-name }}
    runs-on: ${{ inputs.runner-image }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Checkout lgtm-ci tooling
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: ${{ inputs.tooling-ref != '' && inputs.tooling-ref || github.workflow_sha }}
          sparse-checkout: |
            .github/actions/checkout-and-harden
          sparse-checkout-cone-mode: true
          persist-credentials: false

      - name: Checkout and harden
        id: egress
        uses: ./.lgtm-ci-tooling/.github/actions/checkout-and-harden
        with:
          tooling-ref: ${{ inputs.tooling-ref }}
          egress-policy: ${{ inputs.egress-policy }}
          egress-preset: ${{ inputs.egress-preset }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}
          allowed-endpoints-mode: ${{ inputs.allowed-endpoints-mode }}
          sparse-checkout-extra: |
            scripts/ci/

      - name: Harden runner
        # Pinned to SHA for supply chain security
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: ${{ inputs.egress-policy }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}

      - name: Build Lychee arguments
        id: args
        shell: bash
        env:
          PATHS: ${{ inputs.paths }}
          FILE_EXTENSIONS: ${{ inputs.file-extensions }}
          EXCLUDE_PATTERNS: ${{ inputs.exclude-patterns }}
          CHECK_EXTERNAL: ${{ inputs.check-external }}
          TIMEOUT: ${{ inputs.timeout }}
          WORKING_DIRECTORY: ${{ inputs.working-directory }}
        run: bash .lgtm-ci-tooling/scripts/ci/actions/build-lychee-args.sh

      - name: Check links
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2.9.0
        with:
          args: ${{ steps.args.outputs.args }}
          token: ${{ github.token }}
          fail: ${{ inputs.fail-on-error }}

      - name: Upload link report
        if: >-
          always()
          && inputs.publish-link-check-report
          && hashFiles('lychee-report.md') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lychee-report
          path: lychee-report.md
          retention-days: 1
          if-no-files-found: ignore

  publish-link-check-report:
    name: Publish link-check report
    needs: link-check
    if: >-
      always()
      && inputs.publish-link-check-report
      && github.event_name == 'pull_request'
      && github.event.pull_request.head.repo.fork == false
    uses: ./.github/workflows/reusable-publish-artifact-report.yml
    permissions:
      contents: read
      pull-requests: write
    with:
      artifact-name: lychee-report
      report-file: lychee-report.md
      marker: ${{ inputs.comment-marker }}
      job-name: Publish link-check report
      missing-artifact-warning: >-
        lychee-report artifact not found — link check may not have produced output
      tooling-ref: ${{ inputs.tooling-ref }}
