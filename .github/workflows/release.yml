---
name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    uses: ./.github/workflows/reusable-release.yml
    with:
      max-bump: minor
      floating-tag: true
    permissions:
      contents: write
