---
name: Reusable PR Auto Assign

# Automatically assigns a random CODEOWNER to new pull requests.
# Ensures every PR has an assignee for accountability.

"on":
  workflow_call:
    inputs:
      codeowners-path:
        description: "Path to CODEOWNERS file"
        required: false
        type: string
        default: ".github/CODEOWNERS"

permissions:
  contents: read
  pull-requests: write

jobs:
  assign:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden Runner
        # Pinned to SHA for supply chain security
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0 # v2.12.0
        with:
          egress-policy: audit

      - name: Checkout
        # Pinned to SHA for supply chain security
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          sparse-checkout: |
            ${{ inputs.codeowners-path }}
            scripts/ci/actions/assign-codeowner.sh
          sparse-checkout-cone-mode: false

      - name: Assign random CODEOWNER
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          CODEOWNERS_PATH: ${{ inputs.codeowners-path }}
        shell: bash
        run: ${{ github.workspace }}/scripts/ci/actions/assign-codeowner.sh
