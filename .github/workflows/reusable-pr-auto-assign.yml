---
name: Reusable PR Auto Assign

# Automatically assigns a random CODEOWNER to new pull requests.
# Ensures every PR has an assignee for accountability.

"on":
  workflow_call:
    inputs:
      codeowners-path:
        description: "Path to CODEOWNERS file"
        required: false
        type: string
        default: ".github/CODEOWNERS"

permissions:
  contents: read
  pull-requests: write

jobs:
  assign:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden Runner
        # Pinned to SHA for supply chain security
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Checkout
        # Pinned to SHA for supply chain security
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          sparse-checkout: |
            ${{ inputs.codeowners-path }}
            scripts/ci/actions/assign-codeowner.sh
          sparse-checkout-cone-mode: false

      - name: Assign random CODEOWNER
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_AUTHOR_TYPE: ${{ github.event.pull_request.user.type }}
          CODEOWNERS_PATH: ${{ inputs.codeowners-path }}
        shell: bash
        run: ${{ github.workspace }}/scripts/ci/actions/assign-codeowner.sh
