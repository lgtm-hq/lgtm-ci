---
name: Reusable Validation Script

on:
  workflow_call:
    inputs:
      script:
        description: "Repo-relative validation script to execute"
        required: true
        type: string
      name:
        description: "Deprecated alias for job-name"
        required: false
        type: string
        default: ""
      job-name:
        description: "Display name for the validation check"
        required: false
        type: string
        default: "Validation"
      working-directory:
        description: "Working directory for resolving the script path"
        required: false
        type: string
        default: "."
      setup-commands:
        description: "Commands to run before the validation script"
        required: false
        type: string
        default: ""
      publish-validation-report:
        description: "Publish validation failure report on the pull request"
        required: false
        type: boolean
        default: false
      comment-marker:
        description: "Upsert marker for the validation report comment"
        required: false
        type: string
        default: "validation-report"
      tooling-ref:
        description: "Git ref to use when checking out lgtm-ci tooling scripts"
        required: false
        type: string
        default: ""

      egress-policy:
        description: "harden-runner egress policy (audit or block)"
        required: false
        type: string
        default: "block"
      allowed-endpoints:
        description: "Allowed endpoints when egress-policy is block"
        required: false
        type: string
        default: ""

      allowed-endpoints-mode:
        description: >-
          replace: non-empty allowed-endpoints overrides egress-preset; append:
          merges preset with allowed-endpoints (deduped, first-seen wins)
        required: false
        type: string
        default: "replace"

      egress-preset:
        description: >-
          Named allowlist when allowed-endpoints is empty and egress-policy is
          block (github-minimal, github-pages, github-tooling, docker, playwright, pypi,
          rubygems, npm-publish, quality, sbom, scorecard)
        required: false
        type: string
        default: "github-tooling"

      runner-image:
        description: "GitHub-hosted runner image label"
        required: false
        type: string
        default: "ubuntu-24.04"

      timeout-minutes:
        description: "Job timeout in minutes"
        required: false
        type: number
        default: 15

    outputs:
      exit-code:
        description: "Exit code from the validation script"
        value: ${{ jobs.validate.outputs.exit-code }}
      status:
        description: "Validation status: passed or failed"
        value: ${{ jobs.validate.outputs.status }}

jobs:
  validate:
    name: >-
      ${{ inputs.job-name != '' && inputs.job-name ||
      (inputs.name != '' && inputs.name || 'Validation') }}
    runs-on: ${{ inputs.runner-image }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: read
    outputs:
      exit-code: ${{ steps.validate.outputs.exit-code }}
      status: ${{ steps.validate.outputs.status }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Checkout lgtm-ci tooling
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: ${{ inputs.tooling-ref != '' && inputs.tooling-ref || github.workflow_sha }}
          sparse-checkout: |
            .github/actions/checkout-and-harden
          sparse-checkout-cone-mode: true
          persist-credentials: false

      - name: Checkout and harden
        id: egress
        uses: ./.lgtm-ci-tooling/.github/actions/checkout-and-harden
        with:
          tooling-ref: ${{ inputs.tooling-ref }}
          egress-policy: ${{ inputs.egress-policy }}
          egress-preset: ${{ inputs.egress-preset }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}
          allowed-endpoints-mode: ${{ inputs.allowed-endpoints-mode }}
          sparse-checkout-extra: |
            scripts/ci/

      - name: Run setup commands
        if: inputs.setup-commands != ''
        shell: bash
        env:
          COMMAND: ${{ inputs.setup-commands }}
          WORKING_DIRECTORY: ${{ inputs.working-directory }}
        run: bash .lgtm-ci-tooling/scripts/ci/actions/run-command.sh

      - name: Run validation script
        id: validate
        shell: bash
        env:
          SCRIPT_PATH: ${{ inputs.script }}
          # yamllint disable-line rule:line-length
          VALIDATION_NAME: ${{ inputs.job-name != '' && inputs.job-name || (inputs.name != '' && inputs.name || 'Validation') }}
          WORKING_DIRECTORY: ${{ inputs.working-directory }}
          COMMENT_OUTPUT: validation-report.md
          OUTPUT_FILE: validation-output.txt
        run: bash .lgtm-ci-tooling/scripts/ci/actions/run-validate-script.sh

      - name: Upload validation report
        if: steps.validate.outputs.exit-code != '0'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: validation-report
          path: validation-report.md
          retention-days: 1
          if-no-files-found: ignore

      - name: Fail on validation errors
        if: steps.validate.outputs.exit-code != '0'
        shell: bash
        env:
          EXIT_CODE: ${{ steps.validate.outputs.exit-code }}
        run: bash .lgtm-ci-tooling/scripts/ci/actions/fail-with-exit-code.sh

  publish-validation-report:
    name: Publish validation report
    needs: validate
    if: >-
      always()
      && inputs.publish-validation-report
      && needs.validate.outputs.status == 'failed'
      && github.event_name == 'pull_request'
      && github.event.pull_request.head.repo.fork == false
    uses: ./.github/workflows/reusable-publish-artifact-report.yml
    permissions:
      contents: read
      pull-requests: write
    with:
      artifact-name: validation-report
      report-file: validation-report.md
      marker: ${{ inputs.comment-marker }}
      job-name: Publish validation report
      missing-artifact-warning: >-
        Validation report artifact not found — upstream may have failed
      tooling-ref: ${{ inputs.tooling-ref }}
