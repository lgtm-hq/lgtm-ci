---
name: Reusable Validation Script

on:
  workflow_call:
    inputs:
      script:
        description: "Repo-relative validation script to execute"
        required: true
        type: string
      name:
        description: "Deprecated alias for job-name"
        required: false
        type: string
        default: ""
      job-name:
        description: "Display name for the validation check"
        required: false
        type: string
        default: "Validation"
      working-directory:
        description: "Working directory for resolving the script path"
        required: false
        type: string
        default: "."
      setup-commands:
        description: "Commands to run before the validation script"
        required: false
        type: string
        default: ""
      comment-on-failure:
        description: "Post or update a PR comment when validation fails"
        required: false
        type: boolean
        default: false
      comment-marker:
        description: "Unique marker for the validation PR comment"
        required: false
        type: string
        default: "validation-report"
      tooling-ref:
        description: "Git ref to use when checking out lgtm-ci tooling scripts"
        required: false
        type: string
        default: ""

      egress-policy:
        description: "harden-runner egress policy (audit or block)"
        required: false
        type: string
        default: "audit"
      allowed-endpoints:
        description: "Allowed endpoints when egress-policy is block"
        required: false
        type: string
        default: ""

    outputs:
      exit-code:
        description: "Exit code from the validation script"
        value: ${{ jobs.validate.outputs.exit-code }}
      status:
        description: "Validation status: passed or failed"
        value: ${{ jobs.validate.outputs.status }}

jobs:
  validate:
    name: >-
      ${{ inputs.job-name != '' && inputs.job-name ||
      (inputs.name != '' && inputs.name || 'Validation') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      exit-code: ${{ steps.validate.outputs.exit-code }}
      status: ${{ steps.validate.outputs.status }}

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: ${{ inputs.egress-policy }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Checkout lgtm-ci tooling
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: ${{ inputs.tooling-ref != '' && inputs.tooling-ref || github.workflow_sha }}
          sparse-checkout: scripts/ci/
          sparse-checkout-cone-mode: true
          persist-credentials: false

      - name: Run setup commands
        if: inputs.setup-commands != ''
        shell: bash
        env:
          COMMAND: ${{ inputs.setup-commands }}
          WORKING_DIRECTORY: ${{ inputs.working-directory }}
        run: bash .lgtm-ci-tooling/scripts/ci/actions/run-command.sh

      - name: Run validation script
        id: validate
        shell: bash
        env:
          SCRIPT_PATH: ${{ inputs.script }}
          # yamllint disable-line rule:line-length
          VALIDATION_NAME: ${{ inputs.job-name != '' && inputs.job-name || (inputs.name != '' && inputs.name || 'Validation') }}
          WORKING_DIRECTORY: ${{ inputs.working-directory }}
          COMMENT_OUTPUT: validation-comment.md
          OUTPUT_FILE: validation-output.txt
        run: bash .lgtm-ci-tooling/scripts/ci/actions/run-validate-script.sh

      - name: Upload validation comment
        if: steps.validate.outputs.exit-code != '0'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: validation-comment
          path: validation-comment.md
          retention-days: 1
          if-no-files-found: ignore

      - name: Fail on validation errors
        if: steps.validate.outputs.exit-code != '0'
        shell: bash
        env:
          EXIT_CODE: ${{ steps.validate.outputs.exit-code }}
        run: bash .lgtm-ci-tooling/scripts/ci/actions/fail-with-exit-code.sh

  comment:
    name: PR Validation Comment
    needs: validate
    if: >-
      always()
      && inputs.comment-on-failure
      && needs.validate.outputs.status == 'failed'
      && github.event_name == 'pull_request'
      && github.event.pull_request.head.repo.fork == false
    uses: ./.github/workflows/reusable-artifact-pr-comment.yml
    permissions:
      contents: read
      pull-requests: write
    with:
      artifact-name: validation-comment
      comment-file: validation-comment.md
      marker: ${{ inputs.comment-marker }}
      job-name: PR Validation Comment
      missing-artifact-warning: >-
        Validation comment artifact not found — upstream may have failed
      tooling-ref: ${{ inputs.tooling-ref }}
      egress-policy: ${{ inputs.egress-policy }}
      allowed-endpoints: ${{ inputs.allowed-endpoints }}
