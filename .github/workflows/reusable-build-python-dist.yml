---
# Build Python sdist/wheel and upload as a workflow artifact.
# OIDC upload to PyPI must run in the caller workflow via prepare-pypi-upload
# and caller-level pypa/gh-action-pypi-publish (see docs/python-release-publish.md).
name: Reusable Python Distribution Build Workflow

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version for building"
        required: false
        type: string
        default: "3.12"
      validate:
        description: "Run twine check on built distributions"
        required: false
        type: boolean
        default: true
      verify-tag-version:
        description: "Verify git tag matches pyproject.toml version"
        required: false
        type: boolean
        default: true
      ensure-tag-on-default-branch:
        description: "Verify tagged commit is on the default branch"
        required: false
        type: boolean
        default: true
      default-branch:
        description: "Default branch name for tag-on-default-branch check"
        required: false
        type: string
        default: "main"
      working-directory:
        description: "Working directory containing the package"
        required: false
        type: string
        default: "."
      artifact-name:
        description: "Name of the uploaded Python distribution artifact"
        required: false
        type: string
        default: "python-dist"
      artifact-retention-days:
        description: "Days to retain the distribution artifact"
        required: false
        type: number
        default: 7
      tooling-ref:
        description: "Git ref to use when checking out lgtm-ci tooling scripts"
        required: false
        type: string
        default: ""
      egress-policy:
        description: "harden-runner egress policy (audit or block)"
        required: false
        type: string
        default: "block"
      allowed-endpoints:
        description: "Allowed endpoints when egress-policy is block"
        required: false
        type: string
        default: |
          github.com:443
          api.github.com:443
          codeload.github.com:443
          objects.githubusercontent.com:443
          raw.githubusercontent.com:443
          pipelines.actions.githubusercontent.com:443
          pypi.org:443
          files.pythonhosted.org:443
          test.pypi.org:443
          upload.pypi.org:443
          upload.test.pypi.org:443
      allowed-endpoints-mode:
        description: >-
          replace: non-empty allowed-endpoints overrides egress-preset; append:
          merges preset with allowed-endpoints (deduped, first-seen wins)
        required: false
        type: string
        default: "replace"

      egress-preset:
        description: >-
          Named allowlist when allowed-endpoints is empty and egress-policy is
          block (github-minimal, github-pages, github-tooling, docker, playwright, pypi,
          rubygems, npm-publish, quality, sbom, scorecard)
        required: false
        type: string
        default: "pypi"
      build-job-name:
        description: "GitHub check name for the build job"
        required: false
        type: string
        default: "Build Python distribution"
      runner-image:
        description: "GitHub-hosted runner image label"
        required: false
        type: string
        default: "ubuntu-24.04"
      timeout-minutes:
        description: "Job timeout in minutes"
        required: false
        type: number
        default: 15

    outputs:
      version:
        description: "Built package version"
        value: ${{ jobs.build.outputs.version }}
      package-name:
        description: "Built package name"
        value: ${{ jobs.build.outputs.package-name }}

jobs:
  build:
    name: ${{ inputs.build-job-name }}
    runs-on: ${{ inputs.runner-image }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: read

    outputs:
      version: ${{ steps.build-package.outputs.version }}
      package-name: ${{ steps.build-package.outputs.package-name }}

    steps:
      - name: Harden runner
        # Pinned to SHA for supply chain security
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: ${{ inputs.egress-policy }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Checkout lgtm-ci tooling
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: ${{ inputs.tooling-ref != '' && inputs.tooling-ref || github.workflow_sha }}
          sparse-checkout: |
            .github/actions/checkout-and-harden
          sparse-checkout-cone-mode: true
          persist-credentials: false
      - name: Checkout and harden
        id: egress
        uses: ./.lgtm-ci-tooling/.github/actions/checkout-and-harden
        with:
          tooling-ref: ${{ inputs.tooling-ref }}
          egress-policy: ${{ inputs.egress-policy }}
          egress-preset: ${{ inputs.egress-preset }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}
          allowed-endpoints-mode: ${{ inputs.allowed-endpoints-mode }}
          sparse-checkout-extra: |
            .github/actions/
            scripts/ci/
      - name: Setup Python
        uses: ./.lgtm-ci-tooling/.github/actions/setup-python
        with:
          python-version: ${{ inputs.python-version }}
          working-directory: ${{ inputs.working-directory }}
          install-dependencies: "false"
      - name: Build Python distribution
        id: build-package
        uses: ./.lgtm-ci-tooling/.github/actions/build-python-package
        with:
          validate: ${{ inputs.validate }}
          verify-tag-version: ${{ inputs.verify-tag-version }}
          ensure-tag-on-default-branch: ${{ inputs.ensure-tag-on-default-branch }}
          default-branch: ${{ inputs.default-branch }}
          working-directory: ${{ inputs.working-directory }}
      - name: Upload Python distribution
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ inputs.working-directory }}/dist/
          retention-days: ${{ inputs.artifact-retention-days }}
          if-no-files-found: error
