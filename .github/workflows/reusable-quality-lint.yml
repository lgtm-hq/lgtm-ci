---
name: Reusable Quality Lint Workflow

on:
  workflow_call:
    inputs:
      job-name:
        description: "GitHub check run name reported for this job"
        required: false
        type: string
        default: "🛠️ Lintro Code Quality"
      tools:
        description: "Comma-separated lintro --tools list (empty = all tools)"
        required: false
        type: string
        default: ""
      fail-on-error:
        description: "Fail workflow if linting errors found"
        required: false
        type: boolean
        default: true
      upload-report:
        description: "Upload linting report as artifact"
        required: false
        type: boolean
        default: true
      working-directory:
        description: "Working directory for linting"
        required: false
        type: string
        default: "."
      tooling-ref:
        description: "Git ref to use when checking out lgtm-ci tooling scripts"
        required: false
        type: string
        default: ""
      egress-policy:
        description: "harden-runner egress policy (audit or block)"
        required: false
        type: string
        default: "block"
      allowed-endpoints:
        description: "Allowed endpoints when egress-policy is block"
        required: false
        type: string
        default: >
          github.com:443
          api.github.com:443
          codeload.github.com:443
          release-assets.githubusercontent.com:443
          objects.githubusercontent.com:443
          raw.githubusercontent.com:443
          pipelines.actions.githubusercontent.com:443
          github-releases.githubusercontent.com:443
          ghcr.io:443
          pkg-containers.githubusercontent.com:443
          docker.io:443
          registry-1.docker.io:443
          auth.docker.io:443
          production.cloudflare.docker.com:443
          production.cloudfront.docker.com:443
          pypi.org:443
          files.pythonhosted.org:443
          static.rust-lang.org:443
          bun.sh:443
          astral.sh:443
          releases.astral.sh:443
          sh.rustup.rs:443
          deb.debian.org:80
          registry.npmjs.org:443
          crates.io:443
          static.crates.io:443
          index.crates.io:443
          semgrep.dev:443
          metrics.semgrep.dev:443
          api.osv.dev:443
          api.deps.dev:443
      allowed-endpoints-mode:
        description: >-
          replace: non-empty allowed-endpoints overrides egress-preset; append:
          merges preset with allowed-endpoints (deduped, first-seen wins)
        required: false
        type: string
        default: "replace"

      egress-preset:
        description: >-
          Named allowlist when allowed-endpoints is empty and egress-policy is
          block (github-minimal, github-pages, github-tooling, docker, playwright, pypi,
          rubygems, npm-publish, quality, sbom, scorecard)
        required: false
        type: string
        default: "quality"
      lintro-tool-options:
        description: >-
          Comma-separated lintro --tool-options passed to the quality check
          (e.g. pydoclint:timeout=120,osv_scanner:check_suppressions=false)
        required: false
        type: string
        default: ""
      lintro-image:
        description: "Pinned ghcr.io/lgtm-hq/py-lintro image (digest strongly recommended)"
        required: false
        type: string
        # yamllint disable-line rule:line-length
        default: "ghcr.io/lgtm-hq/py-lintro@sha256:c3887f0d555cb6d250d7550eb1de0609fac050f7a71990d718487d50e133fd59"
      runner-image:
        description: "GitHub-hosted runner image label"
        required: false
        type: string
        default: "ubuntu-24.04"

      timeout-minutes:
        description: "Job timeout in minutes for Docker lintro quality checks"
        required: false
        type: number
        default: 45

    outputs:
      exit-code:
        description: "Exit code from lintro"
        value: ${{ jobs.quality.outputs.exit-code }}
      status:
        description: "passed or failed"
        value: ${{ jobs.quality.outputs.status }}

jobs:
  quality:
    name: ${{ inputs.job-name }}
    runs-on: ${{ inputs.runner-image }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: read
      packages: read
    outputs:
      exit-code: ${{ steps.quality.outputs.exit-code }}
      status: ${{ steps.quality.outputs.status }}
    env:
      LINTRO_IMAGE: ${{ inputs.lintro-image }}

    steps:
      - name: Harden runner
        if: runner.os == 'Linux' || runner.environment == 'self-hosted'
        # Pinned to SHA for supply chain security
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: ${{ inputs.egress-policy }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}
      - name: Checkout repository
        # Pinned to SHA for supply chain security
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Checkout lgtm-ci tooling
        # yamllint disable-line rule:line-length
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: ${{ inputs.tooling-ref != '' && inputs.tooling-ref || github.workflow_sha }}
          sparse-checkout: |
            .github/actions/checkout-and-harden
          sparse-checkout-cone-mode: true
          persist-credentials: false
      - name: Checkout and harden
        id: egress
        uses: ./.lgtm-ci-tooling/.github/actions/checkout-and-harden
        with:
          tooling-ref: ${{ inputs.tooling-ref }}
          egress-policy: ${{ inputs.egress-policy }}
          egress-preset: ${{ inputs.egress-preset }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}
          allowed-endpoints-mode: ${{ inputs.allowed-endpoints-mode }}
          sparse-checkout-extra: |
            scripts/ci/
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Run lintro quality checks
        id: quality
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        env:
          STEP: check
          TOOLS: ${{ inputs.tools }}
          TOOL_OPTIONS: ${{ inputs.lintro-tool-options }}
          FAIL_ON_ERROR: ${{ inputs.fail-on-error }}
          MAP_HOST_USER: "true"
        run: bash "${{ github.workspace }}/.lgtm-ci-tooling/scripts/ci/quality/run-lintro-docker.sh"
      - name: Upload linting report
        if: inputs.upload-report && always()
        # Pinned to SHA for supply chain security
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: linting-report
          path: |
            ${{ inputs.working-directory }}/.lintro/
            ${{ inputs.working-directory }}/chk-output.txt
          retention-days: 7
          if-no-files-found: ignore
