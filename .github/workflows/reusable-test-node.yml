---
name: Reusable Node.js Test Workflow

on:
  workflow_call:
    inputs:
      node-version:
        description: "Node.js version to use"
        required: false
        type: string
        default: "20"
      test-path:
        description: "Path to test files or directory"
        required: false
        type: string
        default: "."
      coverage:
        description: "Whether to collect coverage"
        required: false
        type: boolean
        default: false
      coverage-format:
        description: "Coverage output format: json, lcov, html"
        required: false
        type: string
        default: "json"
      coverage-threshold:
        description: "Minimum coverage percentage to pass"
        required: false
        type: number
        default: 0
      upload-coverage:
        description: "Upload coverage report as artifact"
        required: false
        type: boolean
        default: false
      publish-results:
        description: "Publish results to GitHub Pages"
        required: false
        type: boolean
        default: false
      extra-args:
        description: "Additional arguments to pass to vitest"
        required: false
        type: string
        default: ""
      working-directory:
        description: "Working directory for running tests"
        required: false
        type: string
        default: "."
      post-pr-comment:
        description: "Post or update a Node test summary comment on pull requests"
        required: false
        type: boolean
        default: true
      comment-marker:
        description: "Unique marker for the Node test PR comment"
        required: false
        type: string
        default: "node-test-results"
      tooling-ref:
        description: "Git ref to use when checking out lgtm-ci tooling scripts"
        required: false
        type: string
        default: ""

    outputs:
      tests-passed:
        description: "Number of tests passed"
        value: ${{ jobs.test.outputs.tests-passed }}
      tests-failed:
        description: "Number of tests failed"
        value: ${{ jobs.test.outputs.tests-failed }}
      tests-total:
        description: "Total number of tests"
        value: ${{ jobs.test.outputs.tests-total }}
      coverage-percent:
        description: "Coverage percentage"
        value: ${{ jobs.test.outputs.coverage-percent }}
      passed:
        description: "Whether all tests passed"
        value: ${{ jobs.test.outputs.passed }}

jobs:
  test:
    name: Node.js Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    outputs:
      tests-passed: ${{ steps.parse.outputs.tests-passed }}
      tests-failed: ${{ steps.parse.outputs.tests-failed }}
      tests-total: ${{ steps.parse.outputs.tests-total }}
      coverage-percent: ${{ steps.parse.outputs.coverage-percent }}
      passed: ${{ steps.run.outputs.exit-code == '0' }}

    steps:
      - name: Harden runner
        # Pinned to SHA for supply chain security
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout repository
        # Pinned to SHA for supply chain security
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Checkout lgtm-ci tooling
        # yamllint disable-line rule:line-length
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: ${{ inputs.tooling-ref != '' && inputs.tooling-ref || 'main' }}
          sparse-checkout: |
            .github/actions/
            scripts/ci/
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ inputs.node-version }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Get bun cache directory
        id: bun-cache
        shell: bash
        env:
          STEP: bun-cache
        run: bash .lgtm-ci-tooling/scripts/ci/actions/setup-node.sh

      - name: Cache bun dependencies
        id: cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ${{ steps.bun-cache.outputs.dir }}
            ${{ inputs.working-directory }}/node_modules
          # yamllint disable-line rule:line-length
          key: bun-${{ runner.os }}-${{ inputs.node-version }}-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            bun-${{ runner.os }}-${{ inputs.node-version }}-
            bun-${{ runner.os }}-

      - name: Install dependencies
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        env:
          STEP: deps
          FROZEN_LOCKFILE: "true"
        run: bash "${{ github.workspace }}/.lgtm-ci-tooling/scripts/ci/actions/setup-node.sh"

      - name: Setup vitest
        shell: bash
        env:
          STEP: setup
          COVERAGE: ${{ inputs.coverage }}
          WORKING_DIRECTORY: ${{ inputs.working-directory }}
        run: bash .lgtm-ci-tooling/scripts/ci/actions/run-vitest.sh

      - name: Run vitest
        id: run
        shell: bash
        env:
          STEP: run
          TEST_PATH: ${{ inputs.test-path }}
          COVERAGE: ${{ inputs.coverage }}
          COVERAGE_FORMAT: ${{ inputs.coverage-format }}
          EXTRA_ARGS: ${{ inputs.extra-args }}
          WORKING_DIRECTORY: ${{ inputs.working-directory }}
        run: bash .lgtm-ci-tooling/scripts/ci/actions/run-vitest.sh
        continue-on-error: true

      - name: Parse results
        id: parse
        if: always()
        shell: bash
        env:
          STEP: parse
          RESULTS_FILE: ${{ inputs.working-directory }}/vitest-results.json
          COVERAGE_FILE: ${{ inputs.working-directory }}/coverage/coverage-summary.json
        run: bash .lgtm-ci-tooling/scripts/ci/actions/run-vitest.sh

      - name: Generate summary
        if: always()
        shell: bash
        env:
          STEP: summary
          TESTS_PASSED: ${{ steps.parse.outputs.tests-passed }}
          TESTS_FAILED: ${{ steps.parse.outputs.tests-failed }}
          TESTS_SKIPPED: ${{ steps.parse.outputs.tests-skipped }}
          TESTS_TOTAL: ${{ steps.parse.outputs.tests-total }}
          COVERAGE_PERCENT: ${{ steps.parse.outputs.coverage-percent }}
          EXIT_CODE: ${{ steps.run.outputs.exit-code }}
        run: bash .lgtm-ci-tooling/scripts/ci/actions/run-vitest.sh

      - name: Check coverage threshold
        if: inputs.coverage && inputs.coverage-threshold > 0
        uses: ./.lgtm-ci-tooling/.github/actions/check-coverage-threshold
        with:
          coverage-percent: ${{ steps.parse.outputs.coverage-percent }}
          threshold: ${{ inputs.coverage-threshold }}

      - name: Upload coverage report
        if: always() && inputs.upload-coverage && inputs.coverage
        # Pinned to SHA for supply chain security
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: node-coverage
          path: |
            ${{ inputs.working-directory }}/coverage/
            ${{ inputs.working-directory }}/vitest-results.json
          retention-days: 7
          if-no-files-found: ignore

      - name: Fail on vitest errors
        if: steps.run.outputs.exit-code != '' && steps.run.outputs.exit-code != '0'
        shell: bash
        env:
          EXIT_CODE: ${{ steps.run.outputs.exit-code }}
        run: bash .lgtm-ci-tooling/scripts/ci/actions/fail-with-exit-code.sh

  comment-pr:
    name: Node.js Tests PR Comment
    runs-on: ubuntu-latest
    needs: test
    if: >-
      always()
      && github.event_name == 'pull_request'
      && inputs.post-pr-comment
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout lgtm-ci tooling
        # yamllint disable-line rule:line-length
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: ${{ inputs.tooling-ref != '' && inputs.tooling-ref || 'main' }}
          sparse-checkout: scripts/ci/
          sparse-checkout-cone-mode: true
          persist-credentials: false

      - name: Generate PR comment
        shell: bash
        env:
          TEST_SUITE_NAME: Node.js Tests
          TESTS_PASSED: ${{ needs.test.outputs.tests-passed }}
          TESTS_FAILED: ${{ needs.test.outputs.tests-failed }}
          TESTS_TOTAL: ${{ needs.test.outputs.tests-total }}
          COVERAGE_PERCENT: ${{ needs.test.outputs.coverage-percent }}
          COVERAGE_THRESHOLD: ${{ inputs.coverage-threshold }}
          JOB_RESULT: ${{ needs.test.result }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          COMMENT_OUTPUT: pr-comment.md
        run: bash .lgtm-ci-tooling/scripts/ci/actions/generate-shell-test-comment.sh

      - name: Detect PR number
        id: pr
        shell: bash
        env:
          STEP: pr-number
          GH_TOKEN: ${{ github.token }}
          INPUT_PR_NUMBER: ""
          EVENT_NAME: ${{ github.event_name }}
          EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
          EVENT_ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: bash .lgtm-ci-tooling/scripts/ci/actions/post-pr-comment.sh

      - name: Read comment from file
        id: read
        shell: bash
        env:
          STEP: read-file
          COMMENT_FILE: pr-comment.md
        run: bash .lgtm-ci-tooling/scripts/ci/actions/post-pr-comment.sh

      - name: Post PR comment
        id: post
        shell: bash
        env:
          STEP: post
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          MARKER: ${{ inputs.comment-marker }}
          MODE: upsert
          DELETE_ON_EMPTY: "false"
          FILE_PROVIDED: ${{ steps.read.outputs.file_provided }}
          BODY_FROM_FILE: ${{ steps.read.outputs.body }}
          BODY_FROM_INPUT: ""
        run: bash .lgtm-ci-tooling/scripts/ci/actions/post-pr-comment.sh

  publish:
    name: Publish Results
    needs: test
    if: inputs.publish-results && !cancelled()
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write

    steps:
      - name: Checkout repository
        # Pinned to SHA for supply chain security
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Checkout lgtm-ci tooling
        # yamllint disable-line rule:line-length
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: ${{ inputs.tooling-ref != '' && inputs.tooling-ref || 'main' }}
          sparse-checkout: |
            .github/actions/
            scripts/ci/
          persist-credentials: false

      - name: Download coverage
        if: inputs.coverage && inputs.upload-coverage
        # Pinned to SHA for supply chain security
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: node-coverage
          path: coverage-report

      - name: Generate badge
        if: inputs.coverage && inputs.upload-coverage
        uses: ./.lgtm-ci-tooling/.github/actions/generate-coverage-badge
        with:
          coverage-percent: ${{ needs.test.outputs.coverage-percent }}
          format: svg
          output-path: >-
            ${{ inputs.working-directory == '.' && 'coverage-report/badge.svg' ||
            format('coverage-report/{0}/badge.svg', inputs.working-directory) }}

      - name: Publish to GitHub Pages
        if: inputs.coverage && inputs.upload-coverage
        uses: ./.lgtm-ci-tooling/.github/actions/publish-test-results
        with:
          results-path: >-
            ${{ inputs.working-directory == '.' && 'coverage-report' ||
            format('coverage-report/{0}', inputs.working-directory) }}
          coverage-path: >-
            ${{ inputs.working-directory == '.' && 'coverage-report' ||
            format('coverage-report/{0}', inputs.working-directory) }}
          badge-path: >-
            ${{ inputs.working-directory == '.' && 'coverage-report' ||
            format('coverage-report/{0}', inputs.working-directory) }}
          target-dir: vitest
