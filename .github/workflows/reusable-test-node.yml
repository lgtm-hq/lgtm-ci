---
name: Reusable Node.js Test Workflow

on:
  workflow_call:
    inputs:
      node-version:
        description: "Node.js version to use"
        required: false
        type: string
        default: "20"
      node-versions:
        description: "Comma-separated Node.js versions for a test matrix"
        required: false
        type: string
        default: ""
      test-path:
        description: "Path to test files or directory"
        required: false
        type: string
        default: "."
      coverage:
        description: "Whether to collect coverage"
        required: false
        type: boolean
        default: false
      coverage-format:
        description: "Coverage output format: json, lcov, html"
        required: false
        type: string
        default: "json"
      coverage-threshold:
        description: "Minimum coverage percentage to pass"
        required: false
        type: number
        default: 0
      upload-coverage:
        description: "Upload coverage report as artifact"
        required: false
        type: boolean
        default: false
      upload-pages-coverage-html:
        description: "Upload flat HTML coverage artifact for Model B Pages bundling"
        required: false
        type: boolean
        default: false
      pages-coverage-artifact-name:
        description: "Artifact name for flat Node HTML coverage upload"
        required: false
        type: string
        default: "coverage-html"
      pages-coverage-upload-on:
        description: "When to upload flat Node HTML coverage (v1: push-main only)"
        required: false
        type: string
        default: "push-main"
      pages-coverage-source-subpath:
        description: >-
          Coverage HTML directory relative to working-directory for flat Pages
          artifact staging
        required: false
        type: string
        default: "coverage"
      publish-results:
        description: >-
          Deprecated: use reusable-test-node-publish.yml in a separate caller job.
          Ignored in this workflow so callers are not required to grant pages write.
        required: false
        type: boolean
        default: false
      extra-args:
        description: "Additional arguments to pass to vitest"
        required: false
        type: string
        default: ""
      working-directory:
        description: "Working directory for running tests"
        required: false
        type: string
        default: "."
      package-manager:
        description: "Package manager for dependency install: npm, bun, pnpm"
        required: false
        type: string
        default: "npm"
      pre-test-command:
        description: "Optional command to run after dependency install and before tests"
        required: false
        type: string
        default: ""
      upload-build-artifact:
        description: "Upload a build artifact after the pre-test command"
        required: false
        type: boolean
        default: false
      build-artifact-path:
        description: "Path to upload when upload-build-artifact is true"
        required: false
        type: string
        default: "dist"
      post-pr-comment:
        description: "Post or update a Node test summary comment on pull requests"
        required: false
        type: boolean
        default: true
      comment-marker:
        description: "Unique marker for the Node test PR comment"
        required: false
        type: string
        default: "node-test-results"
      job-name:
        description: "GitHub check name for the test job"
        required: false
        type: string
        default: "Node.js Tests"
      test-command:
        description: >-
          Optional shell command to run instead of vitest (e.g. bun run
          test:coverage). Runs in working-directory after dependency install.
        required: false
        type: string
        default: ""
      coverage-pr-comment:
        description: >-
          Post a generate-coverage-comment PR summary instead of the default
          Node test results comment
        required: false
        type: boolean
        default: false
      coverage-comment-marker:
        description: "PR comment marker when coverage-pr-comment is true"
        required: false
        type: string
        default: "node-coverage-report"
      coverage-comment-title:
        description: "Heading title for the coverage PR comment"
        required: false
        type: string
        default: "Coverage Report"
      coverage-summary-file:
        description: >-
          Coverage summary path relative to working-directory for coverage PR
          comments (Istanbul JSON)
        required: false
        type: string
        default: "coverage/coverage-summary.json"
      draft-pr-skip:
        description: "Skip jobs on draft pull requests"
        required: false
        type: boolean
        default: false
      tooling-ref:
        description: "Git ref to use when checking out lgtm-ci tooling scripts"
        required: false
        type: string
        default: ""

      egress-policy:
        description: "harden-runner egress policy (audit or block)"
        required: false
        type: string
        default: "audit"
      allowed-endpoints:
        description: "Allowed endpoints when egress-policy is block"
        required: false
        type: string
        default: ""
      runner-image:
        description: "GitHub-hosted runner image label"
        required: false
        type: string
        default: "ubuntu-latest"
      timeout-minutes:
        description: "Timeout for test jobs in minutes"
        required: false
        type: number
        default: 60

    outputs:
      tests-passed:
        description: "Number of tests passed"
        value: >-
          ${{ inputs.test-command == '' && jobs.aggregate-tests.outputs.tests-passed || '' }}
      tests-failed:
        description: "Number of tests failed"
        value: >-
          ${{ inputs.test-command == '' && jobs.aggregate-tests.outputs.tests-failed || '' }}
      tests-total:
        description: "Total number of tests"
        value: >-
          ${{ inputs.test-command == '' && jobs.aggregate-tests.outputs.tests-total || '' }}
      coverage-percent:
        description: "Coverage percentage"
        value: >-
          ${{ inputs.test-command == '' && jobs.aggregate-tests.outputs.coverage-percent || '' }}
      passed:
        description: "Whether all tests passed"
        value: >-
          ${{ inputs.test-command == '' && jobs.aggregate-tests.outputs.passed ||
          (inputs.test-command != '' && jobs.test-custom.outputs.passed == 'true') }}
      pages-coverage-artifact-name:
        description: "Resolved flat HTML coverage artifact name"
        value: ${{ inputs.pages-coverage-artifact-name }}
      pages-coverage-uploaded:
        description: "Whether flat HTML coverage artifact was uploaded this run"
        value: ${{ jobs.pages-coverage-status.outputs.pages-coverage-uploaded || 'false' }}

jobs:
  prepare:
    name: Prepare Node Matrix
    runs-on: ${{ inputs.runner-image }}
    if: >-
      !inputs.draft-pr-skip ||
      github.event_name != 'pull_request' ||
      github.event.pull_request.draft == false
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      pages-coverage-node-version: ${{ steps.matrix.outputs.pages-coverage-node-version }}

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: ${{ inputs.egress-policy }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}

      - name: Checkout lgtm-ci tooling
        # yamllint disable-line rule:line-length
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: ${{ inputs.tooling-ref != '' && inputs.tooling-ref || github.workflow_sha }}
          sparse-checkout: scripts/ci/
          sparse-checkout-cone-mode: true
          persist-credentials: false

      - name: Generate Node.js matrix
        id: matrix
        shell: bash
        env:
          NODE_VERSION: ${{ inputs.node-version }}
          NODE_VERSIONS: ${{ inputs.node-versions }}
        run: bash .lgtm-ci-tooling/scripts/ci/actions/generate-node-matrix.sh

  test-vitest:
    name: Node.js tests (Vitest)
    needs: prepare
    runs-on: ${{ inputs.runner-image }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    if: >-
      inputs.test-command == ''
      && (
        !inputs.draft-pr-skip ||
        github.event_name != 'pull_request' ||
        github.event.pull_request.draft == false
      )
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    outputs:
      tests-passed: ${{ steps.parse.outputs.tests-passed }}
      tests-failed: ${{ steps.parse.outputs.tests-failed }}
      tests-total: ${{ steps.parse.outputs.tests-total }}
      coverage-percent: ${{ steps.parse.outputs.coverage-percent }}
      passed: ${{ steps.run.outputs.exit-code == '0' }}
      pages-upload-outcome: ${{ steps.record-pages-upload-outcome.outputs.outcome }}

    steps:
      - name: Harden runner
        # Pinned to SHA for supply chain security
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: ${{ inputs.egress-policy }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}
      - name: Checkout repository
        # Pinned to SHA for supply chain security
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Checkout lgtm-ci tooling
        # yamllint disable-line rule:line-length
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: ${{ inputs.tooling-ref != '' && inputs.tooling-ref || github.workflow_sha }}
          sparse-checkout: |
            .github/actions/
            scripts/ci/
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup Bun
        if: inputs.package-manager == 'bun'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Setup pnpm
        if: inputs.package-manager == 'pnpm'
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Get bun cache directory
        if: inputs.package-manager == 'bun'
        id: bun-cache
        shell: bash
        env:
          STEP: bun-cache
        run: bash .lgtm-ci-tooling/scripts/ci/actions/setup-node.sh

      - name: Cache bun dependencies
        if: inputs.package-manager == 'bun'
        id: cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ${{ steps.bun-cache.outputs.dir }}
            ${{ inputs.working-directory }}/node_modules
          # yamllint disable-line rule:line-length
          key: bun-${{ runner.os }}-${{ matrix.node-version }}-${{ hashFiles('**/bun.lock', '**/bun.lockb') }}
          restore-keys: |
            bun-${{ runner.os }}-${{ matrix.node-version }}-
            bun-${{ runner.os }}-

      - name: Install dependencies
        shell: bash
        env:
          PACKAGE_MANAGER: ${{ inputs.package-manager }}
          WORKING_DIRECTORY: ${{ inputs.working-directory }}
          FROZEN_LOCKFILE: "true"
        run: bash .lgtm-ci-tooling/scripts/ci/actions/setup-package-manager.sh

      - name: Run pre-test command
        if: inputs.pre-test-command != ''
        shell: bash
        env:
          COMMAND: ${{ inputs.pre-test-command }}
          WORKING_DIRECTORY: ${{ inputs.working-directory }}
        run: bash .lgtm-ci-tooling/scripts/ci/actions/run-command.sh

      - name: Upload build artifact
        if: inputs.upload-build-artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: node-build-${{ matrix.node-version }}
          path: ${{ inputs.working-directory }}/${{ inputs.build-artifact-path }}
          retention-days: 7
          if-no-files-found: error

      - name: Setup vitest
        shell: bash
        env:
          STEP: setup
          COVERAGE: ${{ inputs.coverage }}
          WORKING_DIRECTORY: ${{ inputs.working-directory }}
        run: bash .lgtm-ci-tooling/scripts/ci/actions/run-vitest.sh

      - name: Run vitest
        id: run
        shell: bash
        env:
          STEP: run
          TEST_PATH: ${{ inputs.test-path }}
          COVERAGE: ${{ inputs.coverage }}
          COVERAGE_FORMAT: ${{ inputs.coverage-format }}
          EXTRA_ARGS: ${{ inputs.extra-args }}
          WORKING_DIRECTORY: ${{ inputs.working-directory }}
        run: bash .lgtm-ci-tooling/scripts/ci/actions/run-vitest.sh
        continue-on-error: true

      - name: Parse results
        id: parse
        if: always()
        shell: bash
        env:
          STEP: parse
          RESULTS_FILE: ${{ inputs.working-directory }}/vitest-results.json
          COVERAGE_FILE: ${{ inputs.working-directory }}/coverage/coverage-summary.json
        run: bash .lgtm-ci-tooling/scripts/ci/actions/run-vitest.sh

      - name: Generate summary
        if: always()
        shell: bash
        env:
          STEP: summary
          TESTS_PASSED: ${{ steps.parse.outputs.tests-passed }}
          TESTS_FAILED: ${{ steps.parse.outputs.tests-failed }}
          TESTS_SKIPPED: ${{ steps.parse.outputs.tests-skipped }}
          TESTS_TOTAL: ${{ steps.parse.outputs.tests-total }}
          COVERAGE_PERCENT: ${{ steps.parse.outputs.coverage-percent }}
          EXIT_CODE: ${{ steps.run.outputs.exit-code }}
        run: bash .lgtm-ci-tooling/scripts/ci/actions/run-vitest.sh

      - name: Check coverage threshold
        id: coverage-gate
        if: inputs.coverage && inputs.coverage-threshold > 0
        uses: ./.lgtm-ci-tooling/.github/actions/check-coverage-threshold
        with:
          coverage-percent: ${{ steps.parse.outputs.coverage-percent }}
          threshold: ${{ inputs.coverage-threshold }}

      - name: Write matrix test summary
        if: always()
        shell: bash
        env:
          NODE_VERSION: ${{ matrix.node-version }}
          TESTS_PASSED: ${{ steps.parse.outputs.tests-passed }}
          TESTS_FAILED: ${{ steps.parse.outputs.tests-failed }}
          TESTS_TOTAL: ${{ steps.parse.outputs.tests-total }}
          COVERAGE_PERCENT: ${{ steps.parse.outputs.coverage-percent }}
          PASSED: >-
            ${{
              steps.run.outputs.exit-code == '0'
              && (
                steps.coverage-gate.outcome == 'success'
                || steps.coverage-gate.outcome == 'skipped'
              )
            }}
        run: bash .lgtm-ci-tooling/scripts/ci/actions/write-node-summary.sh

      - name: Upload matrix test summary
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: node-results-${{ matrix.node-version }}
          path: node-result-${{ matrix.node-version }}/summary.json
          retention-days: 7
          if-no-files-found: error

      - name: Generate coverage PR comment
        id: generate-coverage-comment
        if: >-
          always()
          && inputs.coverage-pr-comment
          && inputs.coverage
          && github.event_name == 'pull_request'
        uses: ./.lgtm-ci-tooling/.github/actions/generate-coverage-comment
        with:
          coverage-file: >-
            ${{ inputs.working-directory }}/${{ inputs.coverage-summary-file }}
          format: istanbul
          threshold-lines: "0"
          threshold-branches: "0"
          threshold-functions: "0"

      - name: Write coverage PR comment artifact
        if: steps.generate-coverage-comment.outputs.comment-ready == 'true'
        shell: bash
        env:
          COMMENT_BODY: ${{ steps.generate-coverage-comment.outputs.comment-body }}
          COMMENT_TITLE: ${{ inputs.coverage-comment-title }}
          COMMENT_OUTPUT: node-coverage-pr-comment.txt
        run: >-
          bash .lgtm-ci-tooling/scripts/ci/actions/prepare-coverage-comment.sh

      - name: Upload coverage PR comment artifact
        if: >-
          steps.generate-coverage-comment.outputs.comment-ready == 'true' &&
          github.event.pull_request.head.repo.fork == false
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: node-coverage-pr-comment-${{ matrix.node-version }}
          path: node-coverage-pr-comment.txt

      - name: Stage coverage report
        if: always() && inputs.upload-coverage && inputs.coverage
        shell: bash
        env:
          NODE_VERSION: ${{ matrix.node-version }}
          WORKING_DIRECTORY: ${{ inputs.working-directory }}
        run: bash .lgtm-ci-tooling/scripts/ci/actions/stage-node-coverage.sh

      - name: Upload coverage report
        if: always() && inputs.upload-coverage && inputs.coverage
        # Pinned to SHA for supply chain security
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: node-coverage-${{ matrix.node-version }}
          path: node-coverage-${{ matrix.node-version }}/
          retention-days: 7
          if-no-files-found: ignore

      - name: Evaluate pages coverage upload gate
        id: pages-upload-gate
        if: always() && inputs.upload-pages-coverage-html && inputs.coverage
        shell: bash
        env:
          PAGES_COVERAGE_UPLOAD_ON: ${{ inputs.pages-coverage-upload-on }}
        run: bash .lgtm-ci-tooling/scripts/ci/actions/pages-coverage-upload-gate.sh

      - name: Stage pages coverage HTML
        id: stage-pages-coverage
        if: >-
          always()
          && inputs.upload-pages-coverage-html
          && inputs.coverage
          && matrix.node-version == needs.prepare.outputs.pages-coverage-node-version
        shell: bash
        env:
          WORKING_DIRECTORY: ${{ inputs.working-directory }}
          PAGES_COVERAGE_SOURCE_SUBPATH: ${{ inputs.pages-coverage-source-subpath }}
          PAGES_COVERAGE_STAGING_DIR: ${{ inputs.pages-coverage-artifact-name }}
        run: bash .lgtm-ci-tooling/scripts/ci/actions/stage-node-pages-coverage.sh

      - name: Upload pages coverage HTML artifact
        id: pages-upload
        if: >-
          always()
          && inputs.upload-pages-coverage-html
          && inputs.coverage
          && matrix.node-version == needs.prepare.outputs.pages-coverage-node-version
          && steps.pages-upload-gate.outputs.should-upload == 'true'
          && steps.stage-pages-coverage.outcome == 'success'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.pages-coverage-artifact-name }}
          path: ${{ inputs.pages-coverage-artifact-name }}/
          retention-days: 7
          if-no-files-found: error

      - name: Record pages upload outcome
        if: >-
          always()
          && matrix.node-version == needs.prepare.outputs.pages-coverage-node-version
        id: record-pages-upload-outcome
        shell: bash
        env:
          PAGES_UPLOAD_OUTCOME: ${{ steps.pages-upload.outcome }}
        run: bash .lgtm-ci-tooling/scripts/ci/actions/record-pages-upload-outcome.sh

      - name: Fail on vitest errors
        if: >-
          steps.run.outputs.exit-code != ''
          && steps.run.outputs.exit-code != '0'
        shell: bash
        env:
          EXIT_CODE: ${{ steps.run.outputs.exit-code }}
        run: bash .lgtm-ci-tooling/scripts/ci/actions/fail-with-exit-code.sh

  test-custom:
    name: Node.js tests (custom command)
    needs: prepare
    runs-on: ${{ inputs.runner-image }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    if: >-
      inputs.test-command != ''
      && (
        !inputs.draft-pr-skip ||
        github.event_name != 'pull_request' ||
        github.event.pull_request.draft == false
      )
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    outputs:
      passed: ${{ steps.record.outputs.passed }}
      pages-upload-outcome: ${{ steps.record-pages-upload-outcome.outputs.outcome }}

    steps:
      - name: Harden runner
        # Pinned to SHA for supply chain security
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: ${{ inputs.egress-policy }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}

      - name: Checkout repository
        # Pinned to SHA for supply chain security
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Checkout lgtm-ci tooling
        # yamllint disable-line rule:line-length
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: ${{ inputs.tooling-ref != '' && inputs.tooling-ref || github.workflow_sha }}
          sparse-checkout: |
            .github/actions/
            scripts/ci/
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup Bun
        if: inputs.package-manager == 'bun'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Setup pnpm
        if: inputs.package-manager == 'pnpm'
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Get bun cache directory
        if: inputs.package-manager == 'bun'
        id: bun-cache
        shell: bash
        env:
          STEP: bun-cache
        run: bash .lgtm-ci-tooling/scripts/ci/actions/setup-node.sh

      - name: Cache bun dependencies
        if: inputs.package-manager == 'bun'
        id: cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ${{ steps.bun-cache.outputs.dir }}
            ${{ inputs.working-directory }}/node_modules
          key: bun-${{ runner.os }}-${{ matrix.node-version }}-${{ hashFiles('**/bun.lock', '**/bun.lockb') }}
          restore-keys: |
            bun-${{ runner.os }}-${{ matrix.node-version }}-
            bun-${{ runner.os }}-

      - name: Install dependencies
        shell: bash
        env:
          PACKAGE_MANAGER: ${{ inputs.package-manager }}
          WORKING_DIRECTORY: ${{ inputs.working-directory }}
          FROZEN_LOCKFILE: "true"
        run: bash .lgtm-ci-tooling/scripts/ci/actions/setup-package-manager.sh

      - name: Run pre-test command
        if: inputs.pre-test-command != ''
        shell: bash
        env:
          COMMAND: ${{ inputs.pre-test-command }}
          WORKING_DIRECTORY: ${{ inputs.working-directory }}
        run: bash .lgtm-ci-tooling/scripts/ci/actions/run-command.sh

      - name: Run custom test command
        id: custom-run
        shell: bash
        env:
          COMMAND: ${{ inputs.test-command }}
          WORKING_DIRECTORY: ${{ inputs.working-directory }}
        run: bash .lgtm-ci-tooling/scripts/ci/actions/run-command.sh

      - name: Generate coverage PR comment
        id: generate-coverage-comment
        if: >-
          always()
          && inputs.coverage-pr-comment
          && inputs.coverage
          && github.event_name == 'pull_request'
        uses: ./.lgtm-ci-tooling/.github/actions/generate-coverage-comment
        with:
          coverage-file: >-
            ${{ inputs.working-directory }}/${{ inputs.coverage-summary-file }}
          format: istanbul
          threshold-lines: "0"
          threshold-branches: "0"
          threshold-functions: "0"

      - name: Write coverage PR comment artifact
        if: steps.generate-coverage-comment.outputs.comment-ready == 'true'
        shell: bash
        env:
          COMMENT_BODY: ${{ steps.generate-coverage-comment.outputs.comment-body }}
          COMMENT_TITLE: ${{ inputs.coverage-comment-title }}
          COMMENT_OUTPUT: node-coverage-pr-comment.txt
        run: >-
          bash .lgtm-ci-tooling/scripts/ci/actions/prepare-coverage-comment.sh

      - name: Upload coverage PR comment artifact
        if: >-
          steps.generate-coverage-comment.outputs.comment-ready == 'true' &&
          github.event.pull_request.head.repo.fork == false
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: node-coverage-pr-comment-${{ matrix.node-version }}
          path: node-coverage-pr-comment.txt

      - name: Evaluate pages coverage upload gate
        id: pages-upload-gate
        if: always() && inputs.upload-pages-coverage-html && inputs.coverage
        shell: bash
        env:
          PAGES_COVERAGE_UPLOAD_ON: ${{ inputs.pages-coverage-upload-on }}
        run: bash .lgtm-ci-tooling/scripts/ci/actions/pages-coverage-upload-gate.sh

      - name: Stage pages coverage HTML
        id: stage-pages-coverage
        if: >-
          always()
          && inputs.upload-pages-coverage-html
          && inputs.coverage
          && matrix.node-version == needs.prepare.outputs.pages-coverage-node-version
        shell: bash
        env:
          WORKING_DIRECTORY: ${{ inputs.working-directory }}
          PAGES_COVERAGE_SOURCE_SUBPATH: ${{ inputs.pages-coverage-source-subpath }}
          PAGES_COVERAGE_STAGING_DIR: ${{ inputs.pages-coverage-artifact-name }}
        run: bash .lgtm-ci-tooling/scripts/ci/actions/stage-node-pages-coverage.sh

      - name: Upload pages coverage HTML artifact
        id: pages-upload
        if: >-
          always()
          && inputs.upload-pages-coverage-html
          && inputs.coverage
          && matrix.node-version == needs.prepare.outputs.pages-coverage-node-version
          && steps.pages-upload-gate.outputs.should-upload == 'true'
          && steps.stage-pages-coverage.outcome == 'success'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.pages-coverage-artifact-name }}
          path: ${{ inputs.pages-coverage-artifact-name }}/
          retention-days: 7
          if-no-files-found: error

      - name: Record pages upload outcome
        if: >-
          always()
          && matrix.node-version == needs.prepare.outputs.pages-coverage-node-version
        id: record-pages-upload-outcome
        shell: bash
        env:
          PAGES_UPLOAD_OUTCOME: ${{ steps.pages-upload.outcome }}
        run: bash .lgtm-ci-tooling/scripts/ci/actions/record-pages-upload-outcome.sh

      - name: Fail on custom test command errors
        if: steps.custom-run.outcome == 'failure'
        run: exit 1

      - name: Record custom test result
        if: always()
        id: record
        shell: bash
        run: |
          if [[ "${{ job.status }}" == "success" ]]; then
            echo "passed=true" >>"$GITHUB_OUTPUT"
          else
            echo "passed=false" >>"$GITHUB_OUTPUT"
          fi

  pages-coverage-status:
    name: Pages coverage upload status
    needs:
      - prepare
      - test-vitest
      - test-custom
    if: >-
      always()
      && inputs.upload-pages-coverage-html
      && inputs.coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      pages-coverage-uploaded: ${{ steps.record.outputs.uploaded }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: ${{ inputs.egress-policy }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}

      - name: Checkout lgtm-ci tooling
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: ${{ inputs.tooling-ref != '' && inputs.tooling-ref || github.workflow_sha }}
          sparse-checkout: scripts/ci/
          sparse-checkout-cone-mode: true
          persist-credentials: false

      - name: Record pages coverage upload status
        id: record
        shell: bash
        env:
          UPLOAD_PAGES_COVERAGE_HTML: ${{ inputs.upload-pages-coverage-html }}
          COVERAGE: ${{ inputs.coverage }}
          PAGES_UPLOAD_OUTCOME: >-
            ${{ inputs.test-command == '' && needs.test-vitest.outputs.pages-upload-outcome ||
            needs.test-custom.outputs.pages-upload-outcome }}
        run: >-
          bash .lgtm-ci-tooling/scripts/ci/actions/record-pages-coverage-upload-status.sh

  aggregate-tests:
    name: Aggregate Node.js Results
    needs:
      - prepare
      - test-vitest
    if: >-
      always()
      && inputs.test-command == ''
      && (
        !inputs.draft-pr-skip ||
        github.event_name != 'pull_request' ||
        github.event.pull_request.draft == false
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tests-passed: ${{ steps.aggregate.outputs.tests-passed }}
      tests-failed: ${{ steps.aggregate.outputs.tests-failed }}
      tests-total: ${{ steps.aggregate.outputs.tests-total }}
      coverage-percent: ${{ steps.aggregate.outputs.coverage-percent }}
      passed: ${{ needs.test-vitest.result == 'success' && steps.aggregate.outputs.passed == 'true' }}

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: ${{ inputs.egress-policy }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}

      - name: Checkout lgtm-ci tooling
        # yamllint disable-line rule:line-length
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: ${{ inputs.tooling-ref != '' && inputs.tooling-ref || github.workflow_sha }}
          sparse-checkout: scripts/ci/
          sparse-checkout-cone-mode: true
          persist-credentials: false

      - name: Download matrix test summaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: node-results-*
          path: node-results
          merge-multiple: false

      - name: Aggregate matrix test summaries
        id: aggregate
        shell: bash
        env:
          RESULTS_DIR: node-results
          MATRIX_JSON: ${{ needs.prepare.outputs.matrix }}
        run: bash .lgtm-ci-tooling/scripts/ci/actions/aggregate-node-results.sh

  coverage-pr-comment:
    name: Node coverage PR comment
    needs:
      - prepare
      - test-vitest
      - test-custom
    if: >-
      always()
      && inputs.coverage-pr-comment
      && inputs.coverage
      && github.event_name == 'pull_request'
      && github.event.pull_request.head.repo.fork == false
      && inputs.post-pr-comment
      && (
        needs.test-vitest.result == 'success'
        || needs.test-custom.result == 'success'
      )
      && (
        !inputs.draft-pr-skip ||
        github.event_name != 'pull_request' ||
        github.event.pull_request.draft == false
      )
    runs-on: ${{ inputs.runner-image }}
    permissions:
      contents: read
      pull-requests: write
    strategy:
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: ${{ inputs.egress-policy }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}
      - name: Checkout lgtm-ci tooling
        # yamllint disable-line rule:line-length
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: ${{ inputs.tooling-ref != '' && inputs.tooling-ref || github.workflow_sha }}
          sparse-checkout: |
            .github/actions/
            scripts/ci/
          sparse-checkout-cone-mode: true
          persist-credentials: false

      - name: Download coverage PR comment artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: node-coverage-pr-comment-${{ matrix.node-version }}

      - name: Comment PR with Node coverage
        uses: ./.lgtm-ci-tooling/.github/actions/post-pr-comment
        with:
          file: node-coverage-pr-comment.txt
          marker: >-
            ${{ inputs.node-versions != '' && format('{0}-{1}',
            inputs.coverage-comment-marker, matrix.node-version) ||
            inputs.coverage-comment-marker }}

  comment-pr:
    needs: aggregate-tests
    if: >-
      always()
      && inputs.test-command == ''
      && github.event_name == 'pull_request'
      && github.event.pull_request.head.repo.fork == false
      && inputs.post-pr-comment
      && !inputs.coverage-pr-comment
      && (
        !inputs.draft-pr-skip ||
        github.event_name != 'pull_request' ||
        github.event.pull_request.draft == false
      )
    uses: ./.github/workflows/reusable-test-pr-comment.yml
    permissions:
      contents: read
      pull-requests: write
    with:
      test-suite-name: ${{ inputs.job-name }}
      comment-marker: ${{ inputs.comment-marker }}
      tests-passed: ${{ needs.aggregate-tests.outputs.tests-passed }}
      tests-failed: ${{ needs.aggregate-tests.outputs.tests-failed }}
      tests-total: ${{ needs.aggregate-tests.outputs.tests-total }}
      coverage-percent: ${{ needs.aggregate-tests.outputs.coverage-percent }}
      coverage-threshold: ${{ inputs.coverage-threshold }}
      job-result: ${{ needs.aggregate-tests.outputs.passed == 'true' && 'success' || 'failure' }}
      tooling-ref: ${{ inputs.tooling-ref }}
      egress-policy: ${{ inputs.egress-policy }}
      allowed-endpoints: ${{ inputs.allowed-endpoints }}
