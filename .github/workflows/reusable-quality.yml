---
name: Reusable Quality Workflow

on:
  workflow_call:
    inputs:
      job-name:
        description: "GitHub check run name reported for this job"
        required: false
        type: string
        default: "Lintro Quality Checks"
      tools:
        description: "Comma-separated lintro --tools list (empty = all tools)"
        required: false
        type: string
        default: ""
      lintro-tools:
        description: "Deprecated alias for tools"
        required: false
        type: string
        default: ""
      fail-on-error:
        description: "Fail workflow if linting errors found"
        required: false
        type: boolean
        default: true
      upload-report:
        description: "Upload linting report as artifact"
        required: false
        type: boolean
        default: true
      working-directory:
        description: "Working directory for linting"
        required: false
        type: string
        default: "."
      post-pr-comment:
        description: "Post or update a lintro summary comment on pull requests"
        required: false
        type: boolean
        default: true
      tooling-ref:
        description: "Git ref to use when checking out lgtm-ci tooling scripts"
        required: false
        type: string
        default: ""
      egress-policy:
        description: "harden-runner egress policy (audit or block)"
        required: false
        type: string
        default: "audit"
      allowed-endpoints:
        description: "Allowed endpoints when egress-policy is block"
        required: false
        type: string
        default: ""
      lintro-image:
        description: "Pinned ghcr.io/lgtm-hq/py-lintro image (digest strongly recommended)"
        required: false
        type: string
        # yamllint disable-line rule:line-length
        default: "ghcr.io/lgtm-hq/py-lintro@sha256:1ff3db35939283734b859c7c5d95be87fd8fd62734b3434e0437769d50d53578"
    outputs:
      exit-code:
        description: "Exit code from lintro"
        value: ${{ jobs.quality.outputs.exit-code }}
      status:
        description: "passed or failed"
        value: ${{ jobs.quality.outputs.status }}

jobs:
  quality:
    name: ${{ inputs.job-name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      exit-code: ${{ steps.quality.outputs.exit-code }}
      status: ${{ steps.quality.outputs.status }}
    env:
      LINTRO_IMAGE: ${{ inputs.lintro-image }}

    steps:
      - name: Harden runner
        # Pinned to SHA for supply chain security
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: ${{ inputs.egress-policy }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}

      - name: Checkout repository
        # Pinned to SHA for supply chain security
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Checkout lgtm-ci tooling
        # yamllint disable-line rule:line-length
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: ${{ inputs.tooling-ref != '' && inputs.tooling-ref || github.workflow_sha }}
          sparse-checkout: scripts/ci/
          sparse-checkout-cone-mode: true
          persist-credentials: false

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Run lintro quality checks
        id: quality
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        env:
          STEP: check
          TOOLS: ${{ inputs.tools != '' && inputs.tools || inputs.lintro-tools }}
          FAIL_ON_ERROR: ${{ inputs.fail-on-error }}
          LINTRO_IMAGE: ${{ env.LINTRO_IMAGE }}
        run: bash "${{ github.workspace }}/.lgtm-ci-tooling/scripts/ci/quality/run-lintro-docker.sh"

      - name: Upload linting report
        if: inputs.upload-report && always()
        # Pinned to SHA for supply chain security
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: linting-report
          path: |
            ${{ inputs.working-directory }}/.lintro/
            ${{ inputs.working-directory }}/chk-output.txt
          retention-days: 7
          if-no-files-found: ignore

  comment:
    name: PR Lint Comment
    runs-on: ubuntu-latest
    needs: quality
    if: >-
      !cancelled()
      && inputs.post-pr-comment
      && github.event_name == 'pull_request'
      && github.event.pull_request.head.repo.fork == false
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Harden runner
        # Pinned to SHA for supply chain security
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: ${{ inputs.egress-policy }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}

      - name: Checkout lgtm-ci tooling
        # yamllint disable-line rule:line-length
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: ${{ inputs.tooling-ref != '' && inputs.tooling-ref || github.workflow_sha }}
          sparse-checkout: scripts/ci/
          sparse-checkout-cone-mode: true
          persist-credentials: false

      - name: Download linting report
        id: download
        # Pinned to SHA for supply chain security
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        continue-on-error: true
        with:
          name: linting-report
          path: ${{ inputs.working-directory }}

      - name: Warn on missing artifact
        if: steps.download.outcome != 'success'
        shell: bash
        run: echo "::warning::Linting report artifact not found — quality job may have failed before producing output"

      - name: Generate PR comment
        if: steps.download.outcome == 'success'
        shell: bash
        env:
          LINTRO_OUTPUT: ${{ inputs.working-directory }}/chk-output.txt
          LINTRO_EXIT_CODE: ${{ needs.quality.outputs.exit-code }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          COMMENT_OUTPUT: pr-comment.md
        run: bash .lgtm-ci-tooling/scripts/ci/actions/generate-lintro-comment.sh

      - name: Detect PR number
        if: steps.download.outcome == 'success'
        id: pr
        shell: bash
        env:
          STEP: pr-number
          GH_TOKEN: ${{ github.token }}
          INPUT_PR_NUMBER: ""
          EVENT_NAME: ${{ github.event_name }}
          EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
          EVENT_ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: bash .lgtm-ci-tooling/scripts/ci/actions/post-pr-comment.sh

      - name: Read comment from file
        if: steps.download.outcome == 'success'
        id: read
        shell: bash
        env:
          STEP: read-file
          COMMENT_FILE: pr-comment.md
        run: bash .lgtm-ci-tooling/scripts/ci/actions/post-pr-comment.sh

      - name: Post PR comment
        if: steps.download.outcome == 'success'
        id: post
        shell: bash
        env:
          STEP: post
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_PULL_REQUEST_HEAD_REPO_FULL_NAME: ${{ github.event.pull_request.head.repo.full_name }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          MARKER: lintro-report
          MODE: upsert
          DELETE_ON_EMPTY: "false"
          FILE_PROVIDED: ${{ steps.read.outputs.file_provided }}
          BODY_FROM_FILE: ${{ steps.read.outputs.body }}
          BODY_FROM_INPUT: ""
        run: bash .lgtm-ci-tooling/scripts/ci/actions/post-pr-comment.sh
