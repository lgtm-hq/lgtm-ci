---
## DEPRECATED — This orchestrator is provided as a migration shim for one
## release cycle. New callers (and lgtm-ci's own ci.yml) should invoke
## `reusable-quality-lint.yml` and `reusable-quality-pr-comment.yml` directly.
## This shim will be removed in the next minor release.
##
## Note: using this shim introduces an extra nesting level in check names
## (e.g. "quality / quality / Lintro Quality Checks"). Direct calls avoid that.

name: "Reusable Quality Workflow (DEPRECATED)"

on:
  workflow_call:
    inputs:
      job-name:
        description: "GitHub check run name reported for this job"
        required: false
        type: string
        default: "Lintro Quality Checks"
      tools:
        description: "Comma-separated lintro --tools list (empty = all tools)"
        required: false
        type: string
        default: ""
      lintro-tools:
        description: "Deprecated alias for tools"
        required: false
        type: string
        default: ""
      fail-on-error:
        description: "Fail workflow if linting errors found"
        required: false
        type: boolean
        default: true
      upload-report:
        description: "Upload linting report as artifact"
        required: false
        type: boolean
        default: true
      working-directory:
        description: "Working directory for linting"
        required: false
        type: string
        default: "."
      post-pr-comment:
        description: "Post or update a lintro summary comment on pull requests"
        required: false
        type: boolean
        default: true
      tooling-ref:
        description: "Git ref to use when checking out lgtm-ci tooling scripts"
        required: false
        type: string
        default: ""
      egress-policy:
        description: "harden-runner egress policy (audit or block)"
        required: false
        type: string
        default: "audit"
      allowed-endpoints:
        description: "Allowed endpoints when egress-policy is block"
        required: false
        type: string
        default: ""
      lintro-tool-options:
        description: >-
          Comma-separated lintro --tool-options passed to the quality check
          (e.g. pydoclint:timeout=120,osv_scanner:check_suppressions=false)
        required: false
        type: string
        default: ""
      lintro-image:
        description: "Pinned ghcr.io/lgtm-hq/py-lintro image (digest strongly recommended)"
        required: false
        type: string
        # yamllint disable-line rule:line-length
        default: "ghcr.io/lgtm-hq/py-lintro@sha256:1ff3db35939283734b859c7c5d95be87fd8fd62734b3434e0437769d50d53578"
    outputs:
      exit-code:
        description: "Exit code from lintro"
        value: ${{ jobs.quality.outputs.exit-code }}
      status:
        description: "passed or failed"
        value: ${{ jobs.quality.outputs.status }}

jobs:
  quality:
    uses: ./.github/workflows/reusable-quality-lint.yml
    permissions:
      contents: read
      packages: read
    with:
      job-name: ${{ inputs.job-name }}
      tools: ${{ inputs.tools }}
      lintro-tools: ${{ inputs.lintro-tools }}
      fail-on-error: ${{ inputs.fail-on-error }}
      upload-report: ${{ inputs.upload-report }}
      working-directory: ${{ inputs.working-directory }}
      tooling-ref: ${{ inputs.tooling-ref }}
      egress-policy: ${{ inputs.egress-policy }}
      allowed-endpoints: ${{ inputs.allowed-endpoints }}
      lintro-tool-options: ${{ inputs.lintro-tool-options }}
      lintro-image: ${{ inputs.lintro-image }}

  quality-pr-comment:
    needs: quality
    if: >-
      !cancelled()
      && inputs.post-pr-comment
      && github.event_name == 'pull_request'
      && github.event.pull_request.head.repo.fork == false
    uses: ./.github/workflows/reusable-quality-pr-comment.yml
    permissions:
      contents: read
      pull-requests: write
    with:
      exit-code: ${{ needs.quality.outputs.exit-code }}
      working-directory: ${{ inputs.working-directory }}
      tooling-ref: ${{ inputs.tooling-ref }}
      egress-policy: ${{ inputs.egress-policy }}
      allowed-endpoints: ${{ inputs.allowed-endpoints }}
