---
name: Reusable Quality Workflow

on:
  workflow_call:
    inputs:
      tools:
        description: "Comma-separated lintro --tools list (empty = all tools)"
        required: false
        type: string
        default: ""
      fail-on-error:
        description: "Fail workflow if linting errors found"
        required: false
        type: boolean
        default: true
      upload-report:
        description: "Upload linting report as artifact"
        required: false
        type: boolean
        default: true
      working-directory:
        description: "Working directory for linting"
        required: false
        type: string
        default: "."

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      # Pinned digest — keep in sync with ci.yml / pyproject.toml lintro pin
      # yamllint disable-line rule:line-length
      LINTRO_IMAGE: ghcr.io/lgtm-hq/py-lintro@sha256:6b6ee149e4daa0f17447b4c1c481e949277eb7a28453c5cb819dd95119ba42dc

    steps:
      - name: Harden runner
        # Pinned to SHA for supply chain security
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout repository
        # Pinned to SHA for supply chain security
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run quality checks
        uses: ./.github/actions/run-quality
        with:
          lintro-image: ${{ env.LINTRO_IMAGE }}
          tools: ${{ inputs.tools }}
          fail-on-error: ${{ inputs.fail-on-error }}
          working-directory: ${{ inputs.working-directory }}

      - name: Upload linting report
        if: inputs.upload-report && always()
        # Pinned to SHA for supply chain security
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: linting-report
          path: |
            ${{ inputs.working-directory }}/.lintro/
            ${{ inputs.working-directory }}/chk-output.txt
          retention-days: 7
          if-no-files-found: ignore
