---
name: Reusable GHCR Cleanup

on:
  workflow_call:
    inputs:
      package-name:
        description: "GHCR package name to clean"
        required: true
        type: string
      min-age-days:
        description: "Minimum age in days before deletion"
        required: false
        type: number
        default: 7
      keep-latest:
        description: "Always keep N most recent untagged versions"
        required: false
        type: number
        default: 0
      build-cache-pr-age-days:
        description: >-
          Minimum age in days before deleting ephemeral pr-*/mq-*/dispatch-*
          build-cache tags
        required: false
        type: number
        default: 14
      protect-referenced:
        description: >-
          Collect digests referenced by tagged manifest indexes and skip prune
          when collection is incomplete
        required: false
        type: boolean
        default: true
      prune-buildcache:
        description: "Delete aged ephemeral build-cache tags (pr-*, mq-*, dispatch-*)"
        required: false
        type: boolean
        default: true
      dry-run:
        description: "Log only, no deletions"
        required: false
        type: boolean
        default: false
      tooling-ref:
        description: "Git ref to use when checking out lgtm-ci tooling scripts"
        required: false
        type: string
        default: ""
      egress-policy:
        description: "harden-runner egress policy (audit or block)"
        required: false
        type: string
        default: "block"
      allowed-endpoints:
        description: "Allowed endpoints when egress-policy is block"
        required: false
        type: string
        default: |
          github.com:443
          api.github.com:443
          codeload.github.com:443
          objects.githubusercontent.com:443
          raw.githubusercontent.com:443
          uploads.github.com:443
          pipelines.actions.githubusercontent.com:443
      allowed-endpoints-mode:
        description: >-
          replace: non-empty allowed-endpoints overrides egress-preset; append:
          merges preset with allowed-endpoints (deduped, first-seen wins)
        required: false
        type: string
        default: "replace"

      egress-preset:
        description: >-
          Named allowlist when allowed-endpoints is empty and egress-policy is
          block (github-minimal, github-pages, github-tooling, docker, playwright, pypi,
          rubygems, npm-publish, quality, sbom, scorecard)
        required: false
        type: string
        default: "github-tooling"

      runner-image:
        description: "GitHub-hosted runner image label"
        required: false
        type: string
        default: "ubuntu-24.04"

      timeout-minutes:
        description: "Job timeout in minutes"
        required: false
        type: number
        default: 10

    secrets:
      token:
        description: "GitHub token with packages:write scope"
        required: true

jobs:
  cleanup:
    name: Clean Untagged Images
    runs-on: ${{ inputs.runner-image }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: read
      packages: write
    concurrency:
      group: ghcr-cleanup-${{ github.repository_owner }}-${{ inputs.package-name }}
      cancel-in-progress: false

    steps:
      - name: Harden runner
        # Pinned to SHA for supply chain security
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: ${{ inputs.egress-policy }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Checkout lgtm-ci tooling
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: ${{ inputs.tooling-ref != '' && inputs.tooling-ref || github.workflow_sha }}
          sparse-checkout: |
            .github/actions/checkout-and-harden
          sparse-checkout-cone-mode: true
          persist-credentials: false
      - name: Checkout and harden
        id: egress
        uses: ./.lgtm-ci-tooling/.github/actions/checkout-and-harden
        with:
          tooling-ref: ${{ inputs.tooling-ref }}
          egress-policy: ${{ inputs.egress-policy }}
          egress-preset: ${{ inputs.egress-preset }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}
          allowed-endpoints-mode: ${{ inputs.allowed-endpoints-mode }}
          sparse-checkout-extra: |
            scripts/ci/
      - name: Clean untagged GHCR images
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.token }}
          PACKAGE_NAME: ${{ inputs.package-name }}
          MIN_AGE_DAYS: ${{ inputs.min-age-days }}
          KEEP_LATEST: ${{ inputs.keep-latest }}
          BUILD_CACHE_PR_AGE_DAYS: ${{ inputs.build-cache-pr-age-days }}
          PROTECT_REFERENCED: ${{ inputs.protect-referenced }}
          PRUNE_BUILDCACHE: ${{ inputs.prune-buildcache }}
          DRY_RUN: ${{ inputs.dry-run }}
          GITHUB_ORG: ${{ github.repository_owner }}
        run: .lgtm-ci-tooling/scripts/ci/actions/ghcr-cleanup.sh
