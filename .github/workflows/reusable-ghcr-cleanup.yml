---
name: Reusable GHCR Cleanup

on:
  workflow_call:
    inputs:
      package-name:
        description: "GHCR package name to clean"
        required: true
        type: string
      min-age-days:
        description: "Minimum age in days before deletion"
        required: false
        type: number
        default: 7
      keep-latest:
        description: "Always keep N most recent untagged versions"
        required: false
        type: number
        default: 5
      dry-run:
        description: "Log only, no deletions"
        required: false
        type: boolean
        default: false
    secrets:
      token:
        description: "GitHub token with packages:write scope"
        required: true

jobs:
  cleanup:
    name: Clean Untagged Images
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
    concurrency:
      group: ghcr-cleanup-${{ github.repository_owner }}-${{ inputs.package-name }}
      cancel-in-progress: false

    steps:
      - name: Harden runner
        # Pinned to SHA for supply chain security
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0 # v2.12.0
        with:
          egress-policy: audit

      - name: Checkout repository
        # Pinned to SHA for supply chain security
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Clean untagged GHCR images
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.token }}
          PACKAGE_NAME: ${{ inputs.package-name }}
          MIN_AGE_DAYS: ${{ inputs.min-age-days }}
          KEEP_LATEST: ${{ inputs.keep-latest }}
          DRY_RUN: ${{ inputs.dry-run }}
          GITHUB_ORG: ${{ github.repository_owner }}
        run: ./scripts/ci/actions/ghcr-cleanup.sh
