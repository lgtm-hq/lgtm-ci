---
name: Reusable Semantic PR Title

on:
  workflow_call:
    inputs:
      types:
        description: "Allowed conventional commit types"
        required: false
        type: string
        default: "feat,fix,docs,style,refactor,perf,test,build,ci,chore,revert"
      scopes:
        description: "Allowed scopes, comma-separated. Empty allows any scope."
        required: false
        type: string
        default: ""
      require-scope:
        description: "Require a scope in the PR title"
        required: false
        type: boolean
        default: false

      egress-policy:
        description: "harden-runner egress policy (audit or block)"
        required: false
        type: string
        default: "audit"
      allowed-endpoints:
        description: "Allowed endpoints when egress-policy is block"
        required: false
        type: string
        default: ""
      job-name:
        description: "GitHub check name for the semantic title check"
        required: false
        type: string
        default: "Semantic PR Title"

jobs:
  semantic-title:
    name: ${{ inputs.job-name }}
    runs-on: ubuntu-latest
    if: github.event_name != 'merge_group'
    permissions:
      pull-requests: read

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: ${{ inputs.egress-policy }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}

      - name: Validate semantic PR title
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          types: ${{ inputs.types }}
          scopes: ${{ inputs.scopes }}
          requireScope: ${{ inputs.require-scope }}
