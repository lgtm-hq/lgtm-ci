# SPDX-License-Identifier: MIT
#
# Caller permissions:
#   post-failure-comment: true (default) → grant pull-requests: write
#   post-failure-comment: false → pull-requests: read is sufficient
# The reusable job requests pull-requests: write when comments are enabled.
---
name: Reusable Semantic PR Title

on:
  workflow_call:
    inputs:
      types:
        description: >-
          Allowed conventional commit types (newline-delimited; legacy
          comma-separated values are normalized automatically). Leave empty
          for the default list.
        required: false
        type: string
        default: ""
      scopes:
        description: >-
          Allowed scopes (newline-delimited; legacy comma-separated values are
          normalized automatically). Empty allows any scope.
        required: false
        type: string
        default: ""
      require-scope:
        description: "Require a scope in the PR title"
        required: false
        type: boolean
        default: false
      max-length:
        description: "Maximum PR title length (0 for no limit)"
        required: false
        type: string
        default: "0"
      post-failure-comment:
        description: "Post or clear a PR comment on validation failure"
        required: false
        type: boolean
        default: true
      comment-marker:
        description: "Upsert marker for the failure comment"
        required: false
        type: string
        default: "semantic-pr-title"
      tooling-ref:
        description: "Git ref to use when checking out lgtm-ci tooling scripts"
        required: false
        type: string
        default: ""

      egress-policy:
        description: "harden-runner egress policy (audit or block)"
        required: false
        type: string
        default: "block"
      allowed-endpoints:
        description: "Allowed endpoints when egress-policy is block"
        required: false
        type: string
        default: ""

      allowed-endpoints-mode:
        description: >-
          replace: non-empty allowed-endpoints overrides egress-preset; append:
          merges preset with allowed-endpoints (deduped, first-seen wins)
        required: false
        type: string
        default: "replace"

      egress-preset:
        description: >-
          Named allowlist when allowed-endpoints is empty and egress-policy is
          block (github-minimal, github-pages, github-tooling, docker, playwright, pypi,
          rubygems, npm-publish, quality, sbom, scorecard)
        required: false
        type: string
        default: "github-minimal"
      job-name:
        description: "GitHub check name for the semantic title check"
        required: false
        type: string
        default: "Semantic PR Title"

jobs:
  semantic-title:
    name: ${{ inputs.job-name }}
    runs-on: ubuntu-latest
    if: github.event_name != 'merge_group'
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        # Pinned to SHA for supply chain security
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Checkout lgtm-ci tooling
        # yamllint disable-line rule:line-length
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: ${{ inputs.tooling-ref != '' && inputs.tooling-ref || github.workflow_sha }}
          sparse-checkout: |
            .github/actions/harden-runner
            .github/actions/post-pr-comment
            .github/actions/resolve-egress-allowlist
            scripts/ci/
          sparse-checkout-cone-mode: true
          persist-credentials: false

      - name: Resolve egress allowlist
        id: egress
        uses: ./.lgtm-ci-tooling/.github/actions/resolve-egress-allowlist
        with:
          egress-policy: ${{ inputs.egress-policy }}
          egress-preset: ${{ inputs.egress-preset }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}
          allowed-endpoints-mode: ${{ inputs.allowed-endpoints-mode }}
      - name: Harden runner
        # yamllint disable-line rule:line-length
        uses: ./.lgtm-ci-tooling/.github/actions/harden-runner
        with:
          egress-policy: ${{ inputs.egress-policy }}
          allowed-endpoints: ${{ steps.egress.outputs['allowed-endpoints'] }}

      - name: Prepare semantic PR lists
        id: prepare
        env:
          TYPES_INPUT: ${{ inputs.types }}
          SCOPES_INPUT: ${{ inputs.scopes }}
        run: bash .lgtm-ci-tooling/scripts/ci/actions/prepare-semantic-pr-lists.sh

      - name: Validate PR title length
        id: length
        if: inputs.max-length != '' && inputs.max-length != '0'
        continue-on-error: true
        env:
          TITLE: ${{ github.event.pull_request.title }}
          MAX_LENGTH: ${{ inputs.max-length }}
        run: bash .lgtm-ci-tooling/scripts/ci/actions/validate-pr-title-length.sh

      - name: Validate semantic PR title
        id: semantic
        continue-on-error: true
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          types: ${{ steps.prepare.outputs.types }}
          scopes: ${{ steps.prepare.outputs.scopes }}
          requireScope: ${{ inputs.require-scope }}

      - name: Format semantic PR title failure comment
        id: failure-comment
        if: >-
          always()
          && inputs.post-failure-comment
          && github.event_name == 'pull_request'
          && github.event.pull_request.head.repo.fork == false
          && (
            steps.length.outputs.error != ''
            || steps.semantic.outputs.error_message != ''
          )
        env:
          SEMANTIC_ERROR: >-
            ${{ steps.length.outputs.error || steps.semantic.outputs.error_message }}
          ALLOWED_TYPES: ${{ steps.prepare.outputs.types }}
          COMMENT_FILE: semantic-pr-title-failure.md
        run: >-
          bash .lgtm-ci-tooling/scripts/ci/actions/format-semantic-pr-title-failure-comment.sh

      - name: Post semantic PR title failure comment
        if: >-
          always()
          && inputs.post-failure-comment
          && github.event_name == 'pull_request'
          && github.event.pull_request.head.repo.fork == false
          && steps.failure-comment.outcome == 'success'
          && (
            steps.length.outputs.error != ''
            || steps.semantic.outputs.error_message != ''
          )
        uses: ./.lgtm-ci-tooling/.github/actions/post-pr-comment
        with:
          file: semantic-pr-title-failure.md
          marker: ${{ inputs.comment-marker }}

      - name: Clear semantic PR title failure comment
        if: >-
          inputs.post-failure-comment
          && github.event_name == 'pull_request'
          && github.event.pull_request.head.repo.fork == false
          && steps.semantic.outcome == 'success'
          && (
            steps.length.outcome == 'success'
            || steps.length.outcome == 'skipped'
          )
        uses: ./.lgtm-ci-tooling/.github/actions/post-pr-comment
        with:
          marker: ${{ inputs.comment-marker }}
          delete-on-empty: "true"

      - name: Fail on invalid PR title
        if: >-
          always()
          && (
            steps.semantic.outcome == 'failure'
            || steps.length.outcome == 'failure'
          )
        env:
          EXIT_CODE: "1"
        run: bash .lgtm-ci-tooling/scripts/ci/actions/fail-with-exit-code.sh
