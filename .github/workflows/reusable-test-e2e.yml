---
name: Reusable E2E Test Workflow

on:
  workflow_call:
    inputs:
      node-version:
        description: "Node.js version to use"
        required: false
        type: string
        default: "20"
      project:
        description: "Playwright project to run"
        required: false
        type: string
        default: ""
      browsers:
        description: "Browsers to test: chromium, firefox, webkit, all"
        required: false
        type: string
        default: "chromium"
      shard:
        description: 'Shard configuration (e.g., "1/3" for shard 1 of 3)'
        required: false
        type: string
        default: ""
      reporter:
        description: "Reporter to use: json, html, junit"
        required: false
        type: string
        default: "html"
      upload-report:
        description: "Upload test report as artifact"
        required: false
        type: boolean
        default: true
      publish-results:
        description: >-
          Deprecated: use a separate publish caller workflow instead. Ignored
          by this workflow.
        required: false
        type: boolean
        default: false
      extra-args:
        description: "Additional arguments to pass to Playwright"
        required: false
        type: string
        default: ""
      working-directory:
        description: "Working directory for running tests"
        required: false
        type: string
        default: "."
      package-manager:
        description: "Package manager for dependency install: npm, bun, pnpm"
        required: false
        type: string
        default: "npm"

      tooling-ref:
        description: "Git ref to use when checking out lgtm-ci tooling scripts"
        required: false
        type: string
        default: ""
      job-name:
        description: "GitHub check name for the E2E test job"
        required: false
        type: string
        default: "E2E Tests"
      runner-image:
        description: "GitHub-hosted runner image label"
        required: false
        type: string
        default: "ubuntu-24.04"
      draft-pr-skip:
        description: "Skip jobs on draft pull requests"
        required: false
        type: boolean
        default: false
      timeout-minutes:
        description: "Job timeout in minutes"
        required: false
        type: number
        default: 90
      egress-policy:
        description: "harden-runner egress policy (audit or block)"
        required: false
        type: string
        default: "block"
      allowed-endpoints:
        description: "Allowed endpoints when egress-policy is block"
        required: false
        type: string
        default: ""

      allowed-endpoints-mode:
        description: >-
          replace: non-empty allowed-endpoints overrides egress-preset; append:
          merges preset with allowed-endpoints (deduped, first-seen wins)
        required: false
        type: string
        default: "replace"

      egress-preset:
        description: >-
          Named allowlist when allowed-endpoints is empty and egress-policy is
          block (github-minimal, github-pages, github-tooling, docker, playwright, pypi,
          rubygems, npm-publish, quality, sbom, scorecard)
        required: false
        type: string
        default: "playwright"

    outputs:
      tests-passed:
        description: "Number of tests passed"
        value: ${{ jobs.test.outputs.tests-passed }}
      tests-failed:
        description: "Number of tests failed"
        value: ${{ jobs.test.outputs.tests-failed }}
      passed:
        description: "Whether E2E tests passed"
        value: ${{ jobs.test.outputs.passed }}

jobs:
  test:
    name: ${{ inputs.job-name }}
    runs-on: ${{ inputs.runner-image }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    if: >-
      !inputs.draft-pr-skip ||
      github.event_name != 'pull_request' ||
      github.event.pull_request.draft == false
    permissions:
      contents: read

    outputs:
      tests-passed: ${{ steps.test.outputs.tests-passed }}
      tests-failed: ${{ steps.test.outputs.tests-failed }}
      passed: ${{ steps.test.outputs.tests-failed == '0' }}

    steps:
      - name: Checkout repository
        # Pinned to SHA for supply chain security
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Checkout lgtm-ci tooling
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: ${{ inputs.tooling-ref != '' && inputs.tooling-ref || github.workflow_sha }}
          sparse-checkout: |
            .github/actions/
            scripts/ci/
          sparse-checkout-cone-mode: true
          persist-credentials: false

      - name: Resolve egress allowlist
        id: egress
        uses: ./.lgtm-ci-tooling/.github/actions/resolve-egress-allowlist
        with:
          egress-policy: ${{ inputs.egress-policy }}
          egress-preset: ${{ inputs.egress-preset }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}
          allowed-endpoints-mode: ${{ inputs.allowed-endpoints-mode }}
      - name: Harden runner
        # yamllint disable-line rule:line-length
        uses: ./.lgtm-ci-tooling/.github/actions/harden-runner
        with:
          egress-policy: ${{ inputs.egress-policy }}
          allowed-endpoints: ${{ steps.egress.outputs['allowed-endpoints'] }}
      - name: Run Playwright
        id: test
        uses: ./.lgtm-ci-tooling/.github/actions/run-playwright
        with:
          node-version: ${{ inputs.node-version }}
          project: ${{ inputs.project }}
          browser: ${{ inputs.browsers }}
          reporter: ${{ inputs.reporter }}
          shard: ${{ inputs.shard }}
          extra-args: ${{ inputs.extra-args }}
          working-directory: ${{ inputs.working-directory }}

      - name: Upload report
        if: inputs.upload-report && always()
        # Pinned to SHA for supply chain security
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report-${{ github.run_id }}
          path: |
            ${{ inputs.working-directory }}/playwright-report/
            ${{ inputs.working-directory }}/playwright-results.json
            ${{ inputs.working-directory }}/test-results/
          retention-days: 30
          if-no-files-found: ignore
