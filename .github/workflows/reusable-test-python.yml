---
name: Reusable Python Test Workflow

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version to use"
        required: false
        type: string
        default: "3.12"
      python-versions:
        description: "Comma-separated Python versions for a test matrix"
        required: false
        type: string
        default: ""
      test-path:
        description: "Path to test files or directory"
        required: false
        type: string
        default: "tests"
      coverage:
        description: "Whether to collect coverage"
        required: false
        type: boolean
        default: false
      coverage-format:
        description: "Coverage output format: xml, json, lcov"
        required: false
        type: string
        default: "json"
      coverage-threshold:
        description: "Minimum coverage percentage to pass"
        required: false
        type: number
        default: 0
      upload-coverage:
        description: "Upload coverage report as artifact"
        required: false
        type: boolean
        default: false
      markers:
        description: "pytest markers to filter tests"
        required: false
        type: string
        default: ""
      extra-args:
        description: "Additional arguments to pass to pytest"
        required: false
        type: string
        default: ""
      extras:
        description: "Comma-separated uv sync extras (e.g. dev,full)"
        required: false
        type: string
        default: ""
      working-directory:
        description: "Working directory for running tests"
        required: false
        type: string
        default: "."
      post-pr-comment:
        description: "Post or update a Python test summary comment on pull requests"
        required: false
        type: boolean
        default: true
      comment-marker:
        description: "Unique marker for the Python test PR comment"
        required: false
        type: string
        default: "python-test-results"
      tooling-ref:
        description: "Git ref to use when checking out lgtm-ci tooling scripts"
        required: false
        type: string
        default: ""

      egress-policy:
        description: "harden-runner egress policy (audit or block)"
        required: false
        type: string
        default: "block"
      allowed-endpoints:
        description: "Allowed endpoints when egress-policy is block"
        required: false
        type: string
        default: ""

      allowed-endpoints-mode:
        description: >-
          replace: non-empty allowed-endpoints overrides egress-preset; append:
          merges preset with allowed-endpoints (deduped, first-seen wins)
        required: false
        type: string
        default: "replace"

      egress-preset:
        description: >-
          Named allowlist when allowed-endpoints is empty and egress-policy is
          block (github-minimal, github-pages, github-tooling, docker, playwright, pypi,
          rubygems, npm-publish, quality, sbom, scorecard)
        required: false
        type: string
        default: "pypi"
      job-name:
        description: "GitHub check name for the test job"
        required: false
        type: string
        default: "Python Tests"
      runner-image:
        description: "GitHub-hosted runner image label"
        required: false
        type: string
        default: "ubuntu-latest"
      draft-pr-skip:
        description: "Skip jobs on draft pull requests"
        required: false
        type: boolean
        default: false
      timeout-minutes:
        description: "Job timeout in minutes"
        required: false
        type: number
        default: 60

    outputs:
      tests-passed:
        description: "Number of tests passed"
        value: >-
          ${{ inputs.python-versions != '' && jobs.aggregate.outputs.tests-passed ||
          jobs.test.outputs.tests-passed }}
      tests-failed:
        description: "Number of tests failed"
        value: >-
          ${{ inputs.python-versions != '' && jobs.aggregate.outputs.tests-failed ||
          jobs.test.outputs.tests-failed }}
      tests-total:
        description: "Total number of tests"
        value: >-
          ${{ inputs.python-versions != '' && jobs.aggregate.outputs.tests-total ||
          jobs.test.outputs.tests-total }}
      coverage-percent:
        description: "Coverage percentage"
        value: >-
          ${{ inputs.python-versions != '' && jobs.aggregate.outputs.coverage-percent ||
          jobs.test.outputs.coverage-percent }}
      passed:
        description: "Whether all tests passed"
        value: >-
          ${{ inputs.python-versions != '' && jobs.aggregate.outputs.passed ||
          jobs.test.outputs.passed }}

jobs:
  prepare:
    name: Prepare Python Matrix
    runs-on: ${{ inputs.runner-image }}
    if: >-
      !inputs.draft-pr-skip ||
      github.event_name != 'pull_request' ||
      github.event.pull_request.draft == false
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}

    steps:
      - name: Checkout repository
        # Pinned to SHA for supply chain security
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Checkout lgtm-ci tooling
        # yamllint disable-line rule:line-length
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: ${{ inputs.tooling-ref != '' && inputs.tooling-ref || github.workflow_sha }}
          sparse-checkout: |
            .github/actions/harden-runner
            .github/actions/resolve-egress-allowlist
            scripts/ci/
          sparse-checkout-cone-mode: true
          persist-credentials: false

      - name: Resolve egress allowlist
        id: egress
        uses: ./.lgtm-ci-tooling/.github/actions/resolve-egress-allowlist
        with:
          egress-policy: ${{ inputs.egress-policy }}
          egress-preset: github-tooling
          allowed-endpoints: ""
          allowed-endpoints-mode: ${{ inputs.allowed-endpoints-mode }}
      - name: Harden runner
        # yamllint disable-line rule:line-length
        uses: ./.lgtm-ci-tooling/.github/actions/harden-runner
        with:
          egress-policy: ${{ inputs.egress-policy }}
          allowed-endpoints: ${{ steps.egress.outputs['allowed-endpoints'] }}

      - name: Generate Python matrix
        id: matrix
        shell: bash
        env:
          PYTHON_VERSION: ${{ inputs.python-version }}
          PYTHON_VERSIONS: ${{ inputs.python-versions }}
        run: bash .lgtm-ci-tooling/scripts/ci/actions/generate-python-matrix.sh

  test:
    name: ${{ inputs.job-name }}
    needs: prepare
    runs-on: ${{ inputs.runner-image }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    if: >-
      !inputs.draft-pr-skip ||
      github.event_name != 'pull_request' ||
      github.event.pull_request.draft == false
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    outputs:
      tests-passed: ${{ steps.parse.outputs.tests-passed }}
      tests-failed: ${{ steps.parse.outputs.tests-failed }}
      tests-total: ${{ steps.parse.outputs.tests-total }}
      coverage-percent: ${{ steps.parse.outputs.coverage-percent }}
      passed: ${{ steps.run.outputs.exit-code == '0' }}

    steps:
      - name: Checkout repository
        # Pinned to SHA for supply chain security
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Checkout lgtm-ci tooling
        # yamllint disable-line rule:line-length
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: ${{ inputs.tooling-ref != '' && inputs.tooling-ref || github.workflow_sha }}
          sparse-checkout: |
            .github/actions/
            scripts/ci/
          sparse-checkout-cone-mode: true
          persist-credentials: false

      - name: Resolve egress allowlist
        id: egress
        uses: ./.lgtm-ci-tooling/.github/actions/resolve-egress-allowlist
        with:
          egress-policy: ${{ inputs.egress-policy }}
          egress-preset: ${{ inputs.egress-preset }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}
          allowed-endpoints-mode: ${{ inputs.allowed-endpoints-mode }}
      - name: Harden runner
        # yamllint disable-line rule:line-length
        uses: ./.lgtm-ci-tooling/.github/actions/harden-runner
        with:
          egress-policy: ${{ inputs.egress-policy }}
          allowed-endpoints: ${{ steps.egress.outputs['allowed-endpoints'] }}
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: latest
          enable-cache: false

      - name: Setup Python
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        env:
          STEP: python-install
          PYTHON_VERSION: ${{ matrix.python-version }}
        run: bash "${{ github.workspace }}/.lgtm-ci-tooling/scripts/ci/actions/setup-python.sh"

      - name: Cache uv dependencies
        id: cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cache/uv
            ${{ inputs.working-directory }}/.venv
          # yamllint disable-line rule:line-length
          key: uv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('**/pyproject.toml', '**/requirements*.txt', '**/uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ matrix.python-version }}-
            uv-${{ runner.os }}-

      - name: Install dependencies
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        env:
          STEP: deps
          EXTRAS: ${{ inputs.extras }}
        run: bash "${{ github.workspace }}/.lgtm-ci-tooling/scripts/ci/actions/setup-python.sh"

      - name: Setup pytest
        shell: bash
        env:
          STEP: setup
          COVERAGE: ${{ inputs.coverage }}
          WORKING_DIRECTORY: ${{ inputs.working-directory }}
        run: bash .lgtm-ci-tooling/scripts/ci/actions/run-pytest.sh

      - name: Run pytest
        id: run
        shell: bash
        env:
          STEP: run
          TEST_PATH: ${{ inputs.test-path }}
          COVERAGE: ${{ inputs.coverage }}
          COVERAGE_FORMAT: ${{ inputs.coverage-format }}
          MARKERS: ${{ inputs.markers }}
          EXTRA_ARGS: ${{ inputs.extra-args }}
          WORKING_DIRECTORY: ${{ inputs.working-directory }}
        run: bash .lgtm-ci-tooling/scripts/ci/actions/run-pytest.sh
        continue-on-error: true

      - name: Parse results
        id: parse
        if: always()
        shell: bash
        env:
          STEP: parse
          RESULTS_FILE: ${{ inputs.working-directory }}/pytest-results.json
          COVERAGE_FILE: >-
            ${{ steps.run.outputs.coverage-file != '' &&
            format('{0}/{1}', inputs.working-directory, steps.run.outputs.coverage-file)
            || '' }}
        run: bash .lgtm-ci-tooling/scripts/ci/actions/run-pytest.sh

      - name: Generate summary
        if: always()
        shell: bash
        env:
          STEP: summary
          TESTS_PASSED: ${{ steps.parse.outputs.tests-passed }}
          TESTS_FAILED: ${{ steps.parse.outputs.tests-failed }}
          TESTS_SKIPPED: ${{ steps.parse.outputs.tests-skipped }}
          TESTS_TOTAL: ${{ steps.parse.outputs.tests-total }}
          COVERAGE_PERCENT: ${{ steps.parse.outputs.coverage-percent }}
          EXIT_CODE: ${{ steps.run.outputs.exit-code }}
        run: bash .lgtm-ci-tooling/scripts/ci/actions/run-pytest.sh

      - name: Check coverage threshold
        id: coverage-gate
        if: inputs.coverage && inputs.coverage-threshold > 0
        uses: ./.lgtm-ci-tooling/.github/actions/check-coverage-threshold
        with:
          coverage-percent: ${{ steps.parse.outputs.coverage-percent }}
          threshold: ${{ inputs.coverage-threshold }}

      - name: Write matrix test summary
        if: always()
        shell: bash
        env:
          PYTHON_VERSION: ${{ matrix.python-version }}
          TESTS_PASSED: ${{ steps.parse.outputs.tests-passed }}
          TESTS_FAILED: ${{ steps.parse.outputs.tests-failed }}
          TESTS_TOTAL: ${{ steps.parse.outputs.tests-total }}
          COVERAGE_PERCENT: ${{ steps.parse.outputs.coverage-percent }}
          PASSED: >-
            ${{
              steps.run.outputs.exit-code == '0'
              && (
                steps.coverage-gate.outcome == 'success'
                || steps.coverage-gate.outcome == 'skipped'
              )
            }}
        run: bash .lgtm-ci-tooling/scripts/ci/actions/write-python-summary.sh

      - name: Upload matrix test summary
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-results-${{ matrix.python-version }}
          path: python-result-${{ matrix.python-version }}/summary.json
          retention-days: 7
          if-no-files-found: error

      - name: Upload coverage report
        if: >-
          always()
          && inputs.upload-coverage
          && inputs.coverage
          && steps.run.outputs.coverage-file != ''
        # Pinned to SHA for supply chain security
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: >-
            ${{ inputs.python-versions != '' && format('python-coverage-{0}',
            matrix.python-version) || 'python-coverage' }}
          path: |
            ${{ inputs.working-directory }}/${{ steps.run.outputs.coverage-file }}
            ${{ inputs.working-directory }}/pytest-results.json
          retention-days: 7
          if-no-files-found: ignore

      - name: Fail on pytest errors
        if: steps.run.outputs.exit-code != '' && steps.run.outputs.exit-code != '0'
        shell: bash
        env:
          EXIT_CODE: ${{ steps.run.outputs.exit-code }}
        run: bash .lgtm-ci-tooling/scripts/ci/actions/fail-with-exit-code.sh

  aggregate:
    name: Aggregate Python Results
    needs:
      - prepare
      - test
    if: >-
      always()
      && inputs.python-versions != ''
      && (
        !inputs.draft-pr-skip ||
        github.event_name != 'pull_request' ||
        github.event.pull_request.draft == false
      )
    runs-on: ubuntu-latest
    permissions:
      actions: write # upload-artifact/merge re-uploads merged python-coverage (artifact write)
      contents: read
    outputs:
      tests-passed: ${{ steps.aggregate.outputs.tests-passed }}
      tests-failed: ${{ steps.aggregate.outputs.tests-failed }}
      tests-total: ${{ steps.aggregate.outputs.tests-total }}
      coverage-percent: ${{ steps.aggregate.outputs.coverage-percent }}
      passed: ${{ needs.test.result == 'success' && steps.aggregate.outputs.passed == 'true' }}

    steps:
      - name: Checkout repository
        # Pinned to SHA for supply chain security
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Checkout lgtm-ci tooling
        # yamllint disable-line rule:line-length
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: ${{ inputs.tooling-ref != '' && inputs.tooling-ref || github.workflow_sha }}
          sparse-checkout: |
            .github/actions/harden-runner
            .github/actions/resolve-egress-allowlist
            scripts/ci/
          sparse-checkout-cone-mode: true
          persist-credentials: false

      - name: Resolve egress allowlist
        id: egress
        uses: ./.lgtm-ci-tooling/.github/actions/resolve-egress-allowlist
        with:
          egress-policy: ${{ inputs.egress-policy }}
          egress-preset: github-tooling
          allowed-endpoints: ""
          allowed-endpoints-mode: ${{ inputs.allowed-endpoints-mode }}
      - name: Harden runner
        # yamllint disable-line rule:line-length
        uses: ./.lgtm-ci-tooling/.github/actions/harden-runner
        with:
          egress-policy: ${{ inputs.egress-policy }}
          allowed-endpoints: ${{ steps.egress.outputs['allowed-endpoints'] }}

      - name: Download matrix test summaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: python-results-*
          path: python-results
          merge-multiple: false

      - name: Aggregate matrix test summaries
        id: aggregate
        shell: bash
        env:
          RESULTS_DIR: python-results
          MATRIX_JSON: ${{ needs.prepare.outputs.matrix }}
        run: bash .lgtm-ci-tooling/scripts/ci/actions/aggregate-python-results.sh

      - name: Merge per-version coverage artifacts
        if: inputs.upload-coverage && inputs.coverage
        continue-on-error: true
        # yamllint disable-line rule:line-length
        uses: actions/upload-artifact/merge@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-coverage
          pattern: python-coverage-*
          retention-days: 7

  comment-pr:
    needs:
      - test
      - aggregate
    if: >-
      always()
      && (
        needs.aggregate.result == 'success'
        || needs.aggregate.result == 'skipped'
      )
      && (
        needs.test.result == 'success'
        || needs.test.result == 'failure'
      )
      && github.event_name == 'pull_request'
      && github.event.pull_request.head.repo.fork == false
      && inputs.post-pr-comment
      && (
        !inputs.draft-pr-skip ||
        github.event.pull_request.draft == false
      )
    uses: ./.github/workflows/reusable-test-pr-comment.yml
    permissions:
      contents: read
      pull-requests: write
    with:
      test-suite-name: ${{ inputs.job-name }}
      comment-marker: ${{ inputs.comment-marker }}
      tests-passed: >-
        ${{ inputs.python-versions != '' && needs.aggregate.outputs.tests-passed ||
        needs.test.outputs.tests-passed }}
      tests-failed: >-
        ${{ inputs.python-versions != '' && needs.aggregate.outputs.tests-failed ||
        needs.test.outputs.tests-failed }}
      tests-total: >-
        ${{ inputs.python-versions != '' && needs.aggregate.outputs.tests-total ||
        needs.test.outputs.tests-total }}
      coverage-percent: >-
        ${{ inputs.python-versions != '' && needs.aggregate.outputs.coverage-percent ||
        needs.test.outputs.coverage-percent }}
      coverage-threshold: ${{ inputs.coverage-threshold }}
      job-result: >-
        ${{ inputs.python-versions != '' &&
        (needs.aggregate.outputs.passed == 'true' && 'success' || 'failure') ||
        needs.test.result }}
      tooling-ref: ${{ inputs.tooling-ref }}
