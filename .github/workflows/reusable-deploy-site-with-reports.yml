---
name: Reusable Deploy Site With Reports Workflow

on:
  workflow_call:
    inputs:
      site-root:
        description: "Path to static site content to deploy"
        required: false
        type: string
        default: "dist"
      build-command:
        description: "Optional build command to run before deployment"
        required: false
        type: string
        default: ""
      bundle-manifest:
        description: "Inline JSON manifest or path to a manifest file in the caller repo"
        required: false
        type: string
        default: ""
      bundle-after-build:
        description: "Run bundle step after optional site build"
        required: false
        type: boolean
        default: true
      commit-sha:
        description: "Commit SHA for checkout and artifact resolution (workflow_run callers)"
        required: false
        type: string
        default: ""
      fallback-ref:
        description: "Optional branch ref for fallback artifact lookup (e.g. main)"
        required: false
        type: string
        default: ""
      strict-bundle:
        description: "Fail when any manifest entry cannot be resolved"
        required: false
        type: boolean
        default: false
      node-version:
        description: "Node.js version for build step"
        required: false
        type: string
        default: "20"
      package-manager:
        description: "Package manager for dependency install: npm, bun, pnpm (empty = skip)"
        required: false
        type: string
        default: "npm"
      working-directory:
        description: "Working directory for dependency installation"
        required: false
        type: string
        default: "."
      frozen-lockfile:
        description: "Use lockfile enforcement during dependency installation"
        required: false
        type: boolean
        default: true
      environment:
        description: "GitHub environment name for deployment"
        required: false
        type: string
        default: "github-pages"
      artifact-name:
        description: "Name for the pages artifact"
        required: false
        type: string
        default: "github-pages"
      tooling-ref:
        description: "Git ref to use when checking out lgtm-ci tooling scripts"
        required: false
        type: string
        default: ""
      egress-policy:
        description: "harden-runner egress policy (audit or block)"
        required: false
        type: string
        default: "block"
      allowed-endpoints:
        description: >-
          Allowed endpoints for both jobs when egress-policy is block and
          allowed-endpoints-build / allowed-endpoints-deploy are empty (replaces
          per-job presets when non-empty)
        required: false
        type: string
        default: |
          github.com:443
          api.github.com:443
          actions.githubusercontent.com:443
          codeload.github.com:443
          objects.githubusercontent.com:443
          release-assets.githubusercontent.com:443
          pipelines.actions.githubusercontent.com:443
      allowed-endpoints-mode:
        description: >-
          replace: non-empty allowed-endpoints overrides egress-preset; append:
          merges preset with allowed-endpoints (deduped, first-seen wins)
        required: false
        type: string
        default: "replace"
      allowed-endpoints-build:
        description: >-
          Allowed endpoints for the build job when egress-policy is block
          (replaces egress-build-preset when non-empty; falls back to
          allowed-endpoints when empty)
        required: false
        type: string
        default: |
          github.com:443
          api.github.com:443
          codeload.github.com:443
          objects.githubusercontent.com:443
          raw.githubusercontent.com:443
          pipelines.actions.githubusercontent.com:443
          registry.npmjs.org:443
          bun.sh:443
          cdn.playwright.dev:443
          playwright.azureedge.net:443
          playwright-akamai.azureedge.net:443
          archive.ubuntu.com:80
          security.ubuntu.com:80
      allowed-endpoints-deploy:
        description: >-
          Allowed endpoints for the deploy job when egress-policy is block
          (replaces egress-deploy-preset when non-empty; falls back to
          allowed-endpoints when empty)
        required: false
        type: string
        default: |
          github.com:443
          api.github.com:443
          actions.githubusercontent.com:443
          codeload.github.com:443
          objects.githubusercontent.com:443
          release-assets.githubusercontent.com:443
          pipelines.actions.githubusercontent.com:443
      egress-build-preset:
        description: >-
          Named allowlist for the build job when allowed-endpoints-build and
          allowed-endpoints are empty and egress-policy is block (playwright for
          npm builds and artifact download)
        required: false
        type: string
        default: "playwright"
      egress-deploy-preset:
        description: >-
          Named allowlist for the deploy job when allowed-endpoints-deploy and
          allowed-endpoints are empty and egress-policy is block (use
          github-pages for GitHub Pages OIDC deploy)
        required: false
        type: string
        default: "github-pages"
      build-job-name:
        description: "GitHub check name for the build job"
        required: false
        type: string
        default: "Build site and bundle reports"
      deploy-job-name:
        description: "GitHub check name for the deploy job"
        required: false
        type: string
        default: "Deploy to GitHub Pages"
      runner-image:
        description: "GitHub-hosted runner image label"
        required: false
        type: string
        default: "ubuntu-24.04"
      timeout-minutes:
        description: "Job timeout in minutes"
        required: false
        type: number
        default: 10

    outputs:
      page-url:
        description: "URL of the deployed GitHub Pages site"
        value: ${{ jobs.deploy.outputs.page-url }}

concurrency:
  group: pages-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: ${{ inputs.build-job-name }}
    runs-on: ${{ inputs.runner-image }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: read
      # write (not read) so delete-run-pages-artifacts.sh can self-heal reruns (#415)
      actions: write # resolve/download workflow artifacts for bundling + prune stale Pages artifacts

    steps:
      - name: Harden runner
        # Pinned to SHA for supply chain security
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: ${{ inputs.egress-policy }}
          # yamllint disable-line rule:line-length
          allowed-endpoints: ${{ inputs.allowed-endpoints-build != '' && inputs.allowed-endpoints-build || inputs.allowed-endpoints }}
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: >-
            ${{ inputs.commit-sha != '' && inputs.commit-sha || github.sha }}
          persist-credentials: false
      - name: Checkout lgtm-ci tooling
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: ${{ inputs.tooling-ref != '' && inputs.tooling-ref || github.workflow_sha }}
          sparse-checkout: |
            .github/actions/checkout-and-harden
          sparse-checkout-cone-mode: true
          persist-credentials: false
      - name: Checkout and harden
        id: egress
        uses: ./.lgtm-ci-tooling/.github/actions/checkout-and-harden
        with:
          tooling-ref: ${{ inputs.tooling-ref }}
          egress-policy: ${{ inputs.egress-policy }}
          egress-preset: >-
            ${{ inputs.egress-build-preset != '' && inputs.egress-build-preset ||
            'playwright' }}
          allowed-endpoints-mode: ${{ inputs.allowed-endpoints-mode }}
          allowed-endpoints: >-
            ${{ inputs.allowed-endpoints-build != '' && inputs.allowed-endpoints-build ||
            inputs.allowed-endpoints }}
          sparse-checkout-extra: |
            .github/actions/
            scripts/ci/
      - name: Setup Node.js
        if: inputs.build-command != '' && inputs.package-manager != ''
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ inputs.node-version }}
      - name: Setup Bun
        if: inputs.build-command != '' && inputs.package-manager == 'bun'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest
      - name: Setup pnpm
        if: inputs.build-command != '' && inputs.package-manager == 'pnpm'
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - name: Install dependencies
        if: inputs.build-command != '' && inputs.package-manager != ''
        shell: bash
        env:
          PACKAGE_MANAGER: ${{ inputs.package-manager }}
          WORKING_DIRECTORY: ${{ inputs.working-directory }}
          FROZEN_LOCKFILE: ${{ inputs.frozen-lockfile }}
        run: >-
          bash .lgtm-ci-tooling/scripts/ci/actions/setup-package-manager.sh
      - name: Build site
        if: inputs.build-command != ''
        shell: bash
        env:
          STEP: prepare
          SOURCE_PATH: ${{ inputs.site-root }}
          BUILD_COMMAND: ${{ inputs.build-command }}
        run: >-
          bash .lgtm-ci-tooling/scripts/ci/actions/deploy-pages.sh
      - name: Bundle workflow artifacts
        if: inputs.bundle-after-build && inputs.bundle-manifest != ''
        uses: ./.lgtm-ci-tooling/.github/actions/bundle-workflow-artifacts
        with:
          commit-sha: >-
            ${{ inputs.commit-sha != '' && inputs.commit-sha || github.sha }}
          site-root: ${{ inputs.site-root }}
          bundle-manifest: ${{ inputs.bundle-manifest }}
          fallback-ref: ${{ inputs.fallback-ref }}
          strict: ${{ inputs.strict-bundle }}
      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - name: Prepare and upload artifact
        uses: ./.lgtm-ci-tooling/.github/actions/deploy-pages
        with:
          source-path: ${{ inputs.site-root }}
          artifact-name: ${{ inputs.artifact-name }}
  deploy:
    name: ${{ inputs.deploy-job-name }}
    needs: build
    runs-on: ${{ inputs.runner-image }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: ${{ inputs.environment }}
      url: ${{ steps.deployment.outputs.page_url }}

    outputs:
      page-url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Harden runner
        # Pinned to SHA for supply chain security
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: ${{ inputs.egress-policy }}
          # yamllint disable-line rule:line-length
          allowed-endpoints: ${{ inputs.allowed-endpoints-deploy != '' && inputs.allowed-endpoints-deploy || inputs.allowed-endpoints }}
      - name: Checkout repository
        # Pinned to SHA for supply chain security
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Checkout lgtm-ci tooling
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: ${{ inputs.tooling-ref != '' && inputs.tooling-ref || github.workflow_sha }}
          sparse-checkout: |
            .github/actions/checkout-and-harden
          sparse-checkout-cone-mode: true
          persist-credentials: false
      - name: Checkout and harden
        id: egress
        uses: ./.lgtm-ci-tooling/.github/actions/checkout-and-harden
        with:
          tooling-ref: ${{ inputs.tooling-ref }}
          egress-policy: ${{ inputs.egress-policy }}
          egress-preset: >-
            ${{ inputs.egress-deploy-preset != '' && inputs.egress-deploy-preset ||
            'github-pages' }}
          allowed-endpoints-mode: ${{ inputs.allowed-endpoints-mode }}
          allowed-endpoints: >-
            ${{ inputs.allowed-endpoints-deploy != '' && inputs.allowed-endpoints-deploy ||
            inputs.allowed-endpoints }}
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
        with:
          artifact_name: ${{ inputs.artifact-name }}
