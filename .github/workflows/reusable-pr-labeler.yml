---
name: Reusable PR Auto Label

# Automatically applies labels to pull requests based on changed files.
# Uses path patterns defined in a labeler configuration file.

"on":
  workflow_call:
    inputs:
      configuration-path:
        description: "Path to labeler config"
        required: false
        type: string
        default: ".github/labeler.yml"
      sync-labels:
        description: "Remove labels not matching config"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden Runner
        # Pinned to SHA for supply chain security
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Apply labels based on changed files
        # Pinned to SHA for supply chain security
        uses: actions/labeler@634933edcd8ababfe52f92936142cc22ac488b1b # v6.0.1
        with:
          repo-token: ${{ github.token }}
          configuration-path: ${{ inputs.configuration-path }}
          sync-labels: ${{ inputs.sync-labels }}
