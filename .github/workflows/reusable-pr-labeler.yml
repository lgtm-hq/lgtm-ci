---
name: Reusable PR Auto Label

# Automatically applies labels to pull requests based on changed files.
# Uses path patterns defined in a labeler configuration file.

"on":
  workflow_call:
    inputs:
      configuration-path:
        description: "Path to labeler config"
        required: false
        type: string
        default: ".github/labeler.yml"
      sync-labels:
        description: "Remove labels not matching config"
        required: false
        type: boolean
        default: false
      job-name:
        description: "GitHub check name for the label job"
        required: false
        type: string
        default: "PR Labeler"
      egress-policy:
        description: "harden-runner egress policy (audit or block)"
        required: false
        type: string
        default: "audit"
      allowed-endpoints:
        description: "Allowed endpoints when egress-policy is block"
        required: false
        type: string
        default: ""

jobs:
  label:
    name: ${{ inputs.job-name }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: ${{ inputs.egress-policy }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}
      - name: Apply labels based on changed files
        uses: actions/labeler@f27b608878404679385c85cfa523b85ccb86e213 # v6.1.0
        with:
          repo-token: ${{ github.token }}
          configuration-path: ${{ inputs.configuration-path }}
          sync-labels: ${{ inputs.sync-labels }}
