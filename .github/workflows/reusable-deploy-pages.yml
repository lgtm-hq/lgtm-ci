---
name: Reusable Deploy to GitHub Pages

on:
  workflow_call:
    inputs:
      source-path:
        description: "Path to static content to deploy"
        required: false
        type: string
        default: "dist"
      build-command:
        description: "Optional build command to run before deployment"
        required: false
        type: string
        default: ""
      node-version:
        description: "Node.js version for build step"
        required: false
        type: string
        default: "20"
      environment:
        description: "GitHub environment name for deployment"
        required: false
        type: string
        default: "github-pages"
      artifact-name:
        description: "Name for the pages artifact"
        required: false
        type: string
        default: "github-pages"

    outputs:
      page-url:
        description: "URL of the deployed GitHub Pages site"
        value: ${{ jobs.deploy.outputs.page-url }}

# Required permissions for GitHub Pages deployment with OIDC
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one deployment at a time
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Harden runner
        # Pinned to SHA for supply chain security
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout repository
        # Pinned to SHA for supply chain security
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        if: inputs.build-command != ''
        uses: ./.github/actions/setup-node
        with:
          node-version: ${{ inputs.node-version }}

      - name: Configure Pages
        # Pinned to SHA for supply chain security
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Prepare and upload artifact
        uses: ./.github/actions/deploy-pages
        with:
          source-path: ${{ inputs.source-path }}
          build-command: ${{ inputs.build-command }}
          artifact-name: ${{ inputs.artifact-name }}

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    environment:
      name: ${{ inputs.environment }}
      url: ${{ steps.deployment.outputs.page_url }}

    outputs:
      page-url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        # Pinned to SHA for supply chain security
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
        with:
          artifact_name: ${{ inputs.artifact-name }}
