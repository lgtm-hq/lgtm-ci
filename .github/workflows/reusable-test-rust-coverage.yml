# SPDX-License-Identifier: MIT
---
name: Reusable Rust Coverage Only Workflow

on:
  workflow_call:
    inputs:
      job-name:
        description: "GitHub check name for Rust coverage"
        required: false
        type: string
        default: "Rust Coverage"
      setup-script:
        description: "Path to Rust coverage setup script"
        required: false
        type: string
        default: ""
      coverage-script:
        description: "Path to Rust coverage run script"
        required: false
        type: string
        default: ""
      upload-pages-coverage-html:
        description: "Upload flat HTML coverage artifact for Model B Pages bundling"
        required: false
        type: boolean
        default: false
      pages-coverage-artifact-name:
        description: "Artifact name for flat Rust HTML coverage upload"
        required: false
        type: string
        default: "rust-coverage-html"
      pages-coverage-upload-on:
        description: "When to upload flat Rust HTML coverage (v1: push-main only)"
        required: false
        type: string
        default: "push-main"
      post-pr-comment:
        description: "Post coverage summary comment on pull requests"
        required: false
        type: boolean
        default: true
      comment-marker:
        description: "PR comment marker for Rust coverage"
        required: false
        type: string
        default: "rust-coverage-report"
      comment-title:
        description: "Heading title for the Rust coverage PR comment"
        required: false
        type: string
        default: "Rust Coverage Report"
      tooling-ref:
        description: "Git ref for lgtm-ci tooling and composite actions"
        required: false
        type: string
        default: ""
      draft-pr-skip:
        description: "Skip jobs on draft pull requests"
        required: false
        type: boolean
        default: true
      egress-policy:
        description: "harden-runner egress policy (audit or block)"
        required: false
        type: string
        default: "audit"
      allowed-endpoints:
        description: "Allowed endpoints when egress-policy is block"
        required: false
        type: string
        default: ""
      runner-image:
        description: "GitHub-hosted runner image label"
        required: false
        type: string
        default: "ubuntu-24.04"
      timeout-minutes:
        description: "Coverage job timeout in minutes"
        required: false
        type: number
        default: 45

    outputs:
      coverage-percent:
        description: "Line coverage percentage from the LCOV report"
        value: ${{ jobs.coverage.outputs.coverage-percent }}
      passed:
        description: "Whether coverage succeeded"
        value: ${{ jobs.coverage.outputs.passed == 'true' }}
      pages-coverage-artifact-name:
        description: "Resolved flat HTML coverage artifact name"
        value: ${{ jobs.coverage.outputs.pages-coverage-artifact-name }}
      pages-coverage-uploaded:
        description: "Whether flat HTML coverage artifact was uploaded this run"
        value: ${{ jobs.coverage.outputs.pages-coverage-uploaded }}

jobs:
  coverage:
    name: ${{ inputs.job-name }}
    runs-on: ${{ inputs.runner-image }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    if: >-
      !inputs.draft-pr-skip ||
      github.event_name != 'pull_request' ||
      github.event.pull_request.draft == false
    permissions:
      contents: read
    outputs:
      passed: ${{ steps.record.outputs.passed }}
      pr_comment_ready: >-
        ${{ steps.generate-comment.outcome == 'success' }}
      coverage-percent: >-
        ${{ steps.generate-comment.outputs.lines-coverage || '' }}
      pages-coverage-artifact-name: ${{ inputs.pages-coverage-artifact-name }}
      pages-coverage-uploaded: ${{ steps.record-pages-upload.outputs.uploaded }}
    concurrency:
      group: rust-coverage-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: ${{ inputs.egress-policy }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Checkout lgtm-ci tooling
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: ${{ inputs.tooling-ref != '' && inputs.tooling-ref || github.workflow_sha }}
          sparse-checkout: |
            .github/actions/
            scripts/ci/
          sparse-checkout-cone-mode: true
          persist-credentials: false

      - name: Setup Rust coverage toolchain
        shell: bash
        env:
          RAW_SCRIPT_PATH: ${{ inputs.setup-script }}
          DEFAULT_SCRIPT_PATH: .lgtm-ci-tooling/scripts/ci/testing/rust/setup-rust-coverage.sh
        run: bash .lgtm-ci-tooling/scripts/ci/actions/run-caller-script.sh

      - name: Run Rust coverage
        id: rust-coverage
        shell: bash
        env:
          RAW_SCRIPT_PATH: ${{ inputs.coverage-script }}
          DEFAULT_SCRIPT_PATH: .lgtm-ci-tooling/scripts/ci/testing/rust/run-rust-coverage.sh
        run: bash .lgtm-ci-tooling/scripts/ci/actions/run-caller-script.sh
        continue-on-error: true

      - name: Generate Rust coverage HTML
        if: >-
          inputs.upload-pages-coverage-html
          && steps.rust-coverage.outcome == 'success'
        shell: bash
        env:
          RUST_COVERAGE_HTML_DIR: ${{ inputs.pages-coverage-artifact-name }}
        run: >-
          bash .lgtm-ci-tooling/scripts/ci/testing/rust/run-rust-coverage-html.sh

      - name: Evaluate pages coverage upload gate
        id: pages-upload-gate
        if: inputs.upload-pages-coverage-html
        shell: bash
        env:
          PAGES_COVERAGE_UPLOAD_ON: ${{ inputs.pages-coverage-upload-on }}
        run: bash .lgtm-ci-tooling/scripts/ci/actions/pages-coverage-upload-gate.sh

      - name: Upload pages coverage HTML artifact
        id: pages-upload
        if: >-
          inputs.upload-pages-coverage-html
          && steps.rust-coverage.outcome == 'success'
          && steps.pages-upload-gate.outputs.should-upload == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.pages-coverage-artifact-name }}
          path: ${{ inputs.pages-coverage-artifact-name }}/
          if-no-files-found: error

      - name: Generate coverage PR comment
        id: generate-comment
        if: always() && github.event_name == 'pull_request'
        uses: ./.lgtm-ci-tooling/.github/actions/generate-coverage-comment
        with:
          coverage-file: rust-coverage.lcov
          format: lcov
          threshold-lines: "0"
          threshold-branches: "0"
          threshold-functions: "0"

      - name: Write coverage PR comment artifact
        if: steps.generate-comment.outcome == 'success'
        shell: bash
        env:
          COMMENT_BODY: ${{ steps.generate-comment.outputs.comment-body }}
          COMMENT_TITLE: ${{ inputs.comment-title }}
          COMMENT_OUTPUT: rust-coverage-pr-comment.txt
        run: >-
          bash .lgtm-ci-tooling/scripts/ci/actions/prepare-coverage-comment.sh

      - name: Upload coverage PR comment artifact
        if: >-
          steps.generate-comment.outcome == 'success' &&
          github.event.pull_request.head.repo.fork == false
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rust-coverage-pr-comment
          path: rust-coverage-pr-comment.txt

      - name: Fail if Rust coverage failed
        if: env.RUST_COVERAGE_EXIT_CODE != '0'
        shell: bash
        env:
          COVERAGE_NAME: Rust
        run: >-
          bash .lgtm-ci-tooling/scripts/ci/testing/rust/fail-on-coverage.sh

      - name: Record pages coverage upload result
        if: always()
        id: record-pages-upload
        shell: bash
        run: |
          if [[ "${{ steps.pages-upload.outcome }}" == "success" ]]; then
            echo "uploaded=true" >>"$GITHUB_OUTPUT"
          else
            echo "uploaded=false" >>"$GITHUB_OUTPUT"
          fi

      - name: Record coverage result
        if: always()
        id: record
        shell: bash
        run: |
          if [[ "${{ job.status }}" == "success" ]]; then
            echo "passed=true" >>"$GITHUB_OUTPUT"
          else
            echo "passed=false" >>"$GITHUB_OUTPUT"
          fi

  coverage-pr-comment:
    name: Rust coverage PR comment
    needs: coverage
    if: >-
      always()
      && inputs.post-pr-comment
      && github.event_name == 'pull_request'
      && github.event.pull_request.head.repo.fork == false
      && needs.coverage.outputs.pr_comment_ready == 'true'
    uses: ./.github/workflows/reusable-artifact-pr-comment.yml
    permissions:
      contents: read
      pull-requests: write
    with:
      artifact-name: rust-coverage-pr-comment
      comment-file: rust-coverage-pr-comment.txt
      marker: ${{ inputs.comment-marker }}
      job-name: Rust coverage PR comment
      tooling-ref: ${{ inputs.tooling-ref }}
      egress-policy: ${{ inputs.egress-policy }}
      allowed-endpoints: ${{ inputs.allowed-endpoints }}
      runner-image: ${{ inputs.runner-image }}
      timeout-minutes: 5
