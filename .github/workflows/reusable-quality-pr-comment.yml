---
name: Reusable Quality PR Comment Workflow

on:
  workflow_call:
    inputs:
      working-directory:
        description: "Working directory where lint artifacts were produced"
        required: false
        type: string
        default: "."
      exit-code:
        description: "Exit code from the quality lint job"
        required: true
        type: string
      tooling-ref:
        description: "Git ref to use when checking out lgtm-ci tooling scripts"
        required: false
        type: string
        default: ""
      egress-policy:
        description: "harden-runner egress policy (audit or block)"
        required: false
        type: string
        default: "audit"
      allowed-endpoints:
        description: "Allowed endpoints when egress-policy is block"
        required: false
        type: string
        default: ""
      job-name:
        description: "Display name for the PR comment job"
        required: false
        type: string
        default: "PR Lint Comment"

jobs:
  comment:
    name: ${{ inputs.job-name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Harden runner
        # Pinned to SHA for supply chain security
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: ${{ inputs.egress-policy }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}

      - name: Checkout lgtm-ci tooling
        # yamllint disable-line rule:line-length
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: ${{ inputs.tooling-ref != '' && inputs.tooling-ref || github.workflow_sha }}
          sparse-checkout: scripts/ci/
          sparse-checkout-cone-mode: true
          persist-credentials: false

      - name: Download linting report
        id: download
        # Pinned to SHA for supply chain security
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        continue-on-error: true
        with:
          name: linting-report
          path: ${{ inputs.working-directory }}

      - name: Warn on missing artifact
        if: steps.download.outcome != 'success'
        shell: bash
        run: echo "::warning::Linting report artifact not found — quality job may have failed before producing output"

      - name: Generate PR comment
        if: steps.download.outcome == 'success'
        shell: bash
        env:
          LINTRO_OUTPUT: ${{ inputs.working-directory }}/chk-output.txt
          LINTRO_EXIT_CODE: ${{ inputs.exit-code }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          COMMENT_OUTPUT: pr-comment.md
        run: bash .lgtm-ci-tooling/scripts/ci/actions/generate-lintro-comment.sh

      - name: Detect PR number
        if: steps.download.outcome == 'success'
        id: pr
        shell: bash
        env:
          STEP: pr-number
          GH_TOKEN: ${{ github.token }}
          INPUT_PR_NUMBER: ""
          EVENT_NAME: ${{ github.event_name }}
          EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
          EVENT_ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: bash .lgtm-ci-tooling/scripts/ci/actions/post-pr-comment.sh

      - name: Read comment from file
        if: steps.download.outcome == 'success'
        id: read
        shell: bash
        env:
          STEP: read-file
          COMMENT_FILE: pr-comment.md
        run: bash .lgtm-ci-tooling/scripts/ci/actions/post-pr-comment.sh

      - name: Post PR comment
        if: >-
          steps.download.outcome == 'success'
          && steps.pr.outputs.number != ''
        id: post
        shell: bash
        env:
          STEP: post
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_PULL_REQUEST_HEAD_REPO_FULL_NAME: ${{ github.event.pull_request.head.repo.full_name }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          MARKER: lintro-report
          MODE: upsert
          DELETE_ON_EMPTY: "false"
          FILE_PROVIDED: ${{ steps.read.outputs.file_provided }}
          BODY_FROM_FILE: ${{ steps.read.outputs.body }}
          BODY_FROM_INPUT: ""
        run: bash .lgtm-ci-tooling/scripts/ci/actions/post-pr-comment.sh
