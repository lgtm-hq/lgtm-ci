# SPDX-License-Identifier: MIT
---
name: Reusable Rust Coverage Workflow

on:
  workflow_call:
    inputs:
      job-name:
        description: "GitHub check name for Rust coverage"
        required: false
        type: string
        default: "Rust Coverage"
      setup-script:
        description: "Path to Rust coverage setup script"
        required: false
        type: string
        default: ""
      coverage-script:
        description: "Path to Rust coverage run script"
        required: false
        type: string
        default: ""
      upload-pages-coverage-html:
        description: "Upload flat HTML coverage artifact for Model B Pages bundling"
        required: false
        type: boolean
        default: false
      pages-coverage-artifact-name:
        description: "Artifact name for flat Rust HTML coverage upload"
        required: false
        type: string
        default: "rust-coverage-html"
      pages-coverage-upload-on:
        description: "When to upload flat Rust HTML coverage (v1: push-main only)"
        required: false
        type: string
        default: "push-main"
      post-pr-comment:
        description: "Post coverage summary comment on pull requests"
        required: false
        type: boolean
        default: true
      comment-marker:
        description: "PR comment marker for Rust coverage"
        required: false
        type: string
        default: "rust-coverage-report"
      comment-title:
        description: "Heading title for the Rust coverage PR comment"
        required: false
        type: string
        default: "Rust Coverage Report"
      tooling-ref:
        description: "Git ref for lgtm-ci tooling and composite actions"
        required: false
        type: string
        default: ""
      draft-pr-skip:
        description: "Skip jobs on draft pull requests"
        required: false
        type: boolean
        default: true
      egress-policy:
        description: "harden-runner egress policy (audit or block)"
        required: false
        type: string
        default: "audit"
      allowed-endpoints:
        description: "Allowed endpoints when egress-policy is block"
        required: false
        type: string
        default: ""
      runner-image:
        description: "GitHub-hosted runner image label"
        required: false
        type: string
        default: "ubuntu-24.04"
      timeout-minutes:
        description: "Coverage job timeout in minutes"
        required: false
        type: number
        default: 45

    outputs:
      coverage-percent:
        description: "Line coverage percentage from the LCOV report"
        value: ${{ jobs.coverage.outputs.coverage-percent }}
      passed:
        description: "Whether coverage succeeded"
        value: ${{ jobs.coverage.outputs.passed }}
      pages-coverage-artifact-name:
        description: "Resolved flat HTML coverage artifact name"
        value: ${{ jobs.coverage.outputs.pages-coverage-artifact-name }}
      pages-coverage-uploaded:
        description: "Whether flat HTML coverage artifact was uploaded this run"
        value: ${{ jobs.coverage.outputs.pages-coverage-uploaded }}

jobs:
  coverage:
    uses: ./.github/workflows/reusable-test-rust-coverage.yml
    with:
      job-name: ${{ inputs.job-name }}
      setup-script: ${{ inputs.setup-script }}
      coverage-script: ${{ inputs.coverage-script }}
      upload-pages-coverage-html: ${{ inputs.upload-pages-coverage-html }}
      pages-coverage-artifact-name: ${{ inputs.pages-coverage-artifact-name }}
      pages-coverage-upload-on: ${{ inputs.pages-coverage-upload-on }}
      post-pr-comment: ${{ inputs.post-pr-comment }}
      comment-marker: ${{ inputs.comment-marker }}
      comment-title: ${{ inputs.comment-title }}
      tooling-ref: ${{ inputs.tooling-ref }}
      draft-pr-skip: ${{ inputs.draft-pr-skip }}
      egress-policy: ${{ inputs.egress-policy }}
      allowed-endpoints: ${{ inputs.allowed-endpoints }}
      runner-image: ${{ inputs.runner-image }}
      timeout-minutes: ${{ inputs.timeout-minutes }}
