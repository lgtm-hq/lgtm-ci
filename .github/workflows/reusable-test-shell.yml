---
name: Reusable Shell Test Workflow

on:
  workflow_call:
    inputs:
      bats-version:
        description: "BATS version to use"
        required: false
        type: string
        default: "1.10.0"
      test-path:
        description: "Path to test files or directory"
        required: false
        type: string
        default: "tests/bats"
      coverage:
        description: "Whether to collect coverage with kcov"
        required: false
        type: boolean
        default: false
      coverage-threshold:
        description: "Minimum coverage percentage to pass"
        required: false
        type: number
        default: 0
      upload-coverage:
        description: "Upload coverage report as artifact"
        required: false
        type: boolean
        default: false
      test-filter:
        description: "Filter tests by name pattern"
        required: false
        type: string
        default: ""
      parallel:
        description: "Number of parallel test jobs"
        required: false
        type: number
        default: 1
      working-directory:
        description: "Working directory for running tests"
        required: false
        type: string
        default: "."
      is-pr:
        description: "Whether this is a pull request (for PR comments)"
        required: false
        type: boolean
        default: false

    outputs:
      tests-passed:
        description: "Number of tests passed"
        value: ${{ jobs.test.outputs.tests-passed }}
      tests-failed:
        description: "Number of tests failed"
        value: ${{ jobs.test.outputs.tests-failed }}
      tests-total:
        description: "Total number of tests"
        value: ${{ jobs.test.outputs.tests-total }}
      coverage-percent:
        description: "Coverage percentage"
        value: ${{ jobs.test.outputs.coverage-percent }}
      passed:
        description: "Whether all tests passed"
        value: ${{ jobs.test.outputs.passed }}

jobs:
  test:
    name: Shell Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    outputs:
      tests-passed: ${{ steps.results.outputs.tests-passed }}
      tests-failed: ${{ steps.results.outputs.tests-failed }}
      tests-total: ${{ steps.results.outputs.tests-total }}
      coverage-percent: ${{ steps.coverage.outputs.coverage-percent }}
      passed:
        ${{ steps.test.outcome == 'success' && steps.results.outputs.tests-ran == 'true'
        }}

    steps:
      - name: Harden runner
        # Pinned to SHA for supply chain security
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0 # v2.12.0
        with:
          egress-policy: audit

      - name: Checkout repository
        # Pinned to SHA for supply chain security
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install BATS and helpers
        shell: bash
        env:
          STEP: install-bats
          BATS_VERSION: ${{ inputs.bats-version }}
        run: bash scripts/ci/actions/run-bats-tests.sh

      - name: Install kcov for coverage
        if: inputs.coverage
        shell: bash
        env:
          STEP: install-kcov
        run: bash scripts/ci/actions/run-bats-tests.sh

      - name: Run BATS tests
        id: test
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        env:
          STEP: run-tests
          TEST_PATH: ${{ inputs.test-path }}
          TEST_FILTER: ${{ inputs.test-filter }}
          PARALLEL: ${{ inputs.parallel }}
        run: bash scripts/ci/actions/run-bats-tests.sh

      - name: Run tests with coverage
        if: inputs.coverage && steps.test.outcome == 'success'
        id: coverage-run
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        continue-on-error: true
        env:
          STEP: run-coverage
          TEST_PATH: ${{ inputs.test-path }}
          TEST_FILTER: ${{ inputs.test-filter }}
          PARALLEL: ${{ inputs.parallel }}
          COVERAGE_DIR: coverage-report
        run: bash scripts/ci/actions/run-bats-tests.sh

      - name: Parse test results
        id: results
        if: always()
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        env:
          STEP: parse-results
        run: bash scripts/ci/actions/run-bats-tests.sh

      - name: Parse coverage results
        id: coverage
        if: inputs.coverage && always()
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        env:
          STEP: parse-coverage
          COVERAGE_DIR: coverage-report
        run: bash scripts/ci/actions/run-bats-tests.sh

      - name: Check coverage threshold
        if: inputs.coverage && inputs.coverage-threshold > 0
        shell: bash
        env:
          STEP: check-threshold
          COVERAGE_PERCENT: ${{ steps.coverage.outputs.coverage-percent }}
          COVERAGE_THRESHOLD: ${{ inputs.coverage-threshold }}
        run: bash scripts/ci/actions/run-bats-tests.sh

      - name: Upload test results
        if: always()
        # Pinned to SHA for supply chain security
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: shell-test-results
          path: |
            ${{ inputs.working-directory }}/bats-output.tap
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload coverage report
        if: inputs.upload-coverage && inputs.coverage
        # Pinned to SHA for supply chain security
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: shell-coverage
          path: |
            ${{ inputs.working-directory }}/coverage-report
          retention-days: 7
          if-no-files-found: ignore

  comment-pr:
    name: PR Comment
    runs-on: ubuntu-latest
    needs: test
    if: inputs.is-pr && always()
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0 # v2.12.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Generate PR comment
        shell: bash
        env:
          TESTS_PASSED: ${{ needs.test.outputs.tests-passed }}
          TESTS_FAILED: ${{ needs.test.outputs.tests-failed }}
          TESTS_TOTAL: ${{ needs.test.outputs.tests-total }}
          COVERAGE_PERCENT: ${{ needs.test.outputs.coverage-percent }}
          COVERAGE_THRESHOLD: ${{ inputs.coverage-threshold }}
          JOB_RESULT: ${{ needs.test.result }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
        run: bash scripts/ci/actions/generate-shell-test-comment.sh > pr-comment.md

      - name: Post PR comment
        uses: ./.github/actions/post-pr-comment
        with:
          file: pr-comment.md
          marker: "shell-test-results"
