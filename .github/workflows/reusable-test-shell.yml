---
name: Reusable Shell Test Workflow

on:
  workflow_call:
    inputs:
      bats-version:
        description: "BATS version to use"
        required: false
        type: string
        default: "1.10.0"
      test-path:
        description: "Path to test files or directory"
        required: false
        type: string
        default: "tests/bats"
      coverage:
        description: "Whether to collect coverage with kcov"
        required: false
        type: boolean
        default: false
      coverage-threshold:
        description: "Minimum coverage percentage to pass"
        required: false
        type: number
        default: 0
      upload-coverage:
        description: "Upload coverage report as artifact"
        required: false
        type: boolean
        default: false
      test-filter:
        description: "Filter tests by name pattern"
        required: false
        type: string
        default: ""
      parallel:
        description: "Number of parallel test jobs"
        required: false
        type: number
        default: 1
      working-directory:
        description: "Working directory for running tests"
        required: false
        type: string
        default: "."
      publish-test-summary:
        description: >-
          Publish or update the test summary comment on the pull request for this workflow run (test
          pass/fail totals; rich coverage not yet supported for kcov)
        required: false
        type: boolean
        default: true
      comment-marker:
        description: "Upsert marker for the shell test summary comment"
        required: false
        type: string
        default: "shell-test-results"
      tooling-ref:
        description: "Git ref to use when checking out lgtm-ci tooling scripts"
        required: false
        type: string
        default: ""
      job-name:
        description: "GitHub check name for the test job"
        required: false
        type: string
        default: "Shell Tests"
      runner-image:
        description: "GitHub-hosted runner image label"
        required: false
        type: string
        default: "ubuntu-latest"
      draft-pr-skip:
        description: "Skip jobs on draft pull requests"
        required: false
        type: boolean
        default: true
      timeout-minutes:
        description: "Job timeout in minutes"
        required: false
        type: number
        default: 60
      egress-policy:
        description: "harden-runner egress policy (audit or block)"
        required: false
        type: string
        default: "block"
      allowed-endpoints:
        description: "Allowed endpoints when egress-policy is block"
        required: false
        type: string
        default: ""

      allowed-endpoints-mode:
        description: >-
          replace: non-empty allowed-endpoints overrides egress-preset; append:
          merges preset with allowed-endpoints (deduped, first-seen wins)
        required: false
        type: string
        default: "replace"

      egress-preset:
        description: >-
          Named allowlist when allowed-endpoints is empty and egress-policy is
          block (github-minimal, github-pages, github-tooling, docker, playwright, pypi,
          rubygems, npm-publish, quality, sbom, scorecard)
        required: false
        type: string
        default: "github-tooling"

    outputs:
      tests-passed:
        description: "Number of tests passed"
        value: ${{ jobs.test.outputs.tests-passed }}
      tests-failed:
        description: "Number of tests failed"
        value: ${{ jobs.test.outputs.tests-failed }}
      tests-total:
        description: "Total number of tests"
        value: ${{ jobs.test.outputs.tests-total }}
      coverage-percent:
        description: "Coverage percentage"
        value: ${{ jobs.test.outputs.coverage-percent }}
      passed:
        description: "Whether all tests passed"
        value: ${{ jobs.test.outputs.passed }}

jobs:
  test:
    name: ${{ inputs.job-name }}
    runs-on: ${{ inputs.runner-image }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    if: >-
      !inputs.draft-pr-skip ||
      github.event_name != 'pull_request' ||
      github.event.pull_request.draft == false
    permissions:
      contents: read

    outputs:
      tests-passed: ${{ steps.results.outputs.tests-passed }}
      tests-failed: ${{ steps.results.outputs.tests-failed }}
      tests-total: ${{ steps.results.outputs.tests-total }}
      coverage-percent: ${{ steps.coverage.outputs.coverage-percent }}
      # yamllint disable-line rule:line-length
      passed: >-
        ${{ (steps.test.outcome == 'success' || steps.coverage-run.outcome == 'success')
        && steps.results.outputs.tests-ran == 'true' }}

    steps:
      - name: Checkout repository
        # Pinned to SHA for supply chain security
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Checkout lgtm-ci tooling
        # yamllint disable-line rule:line-length
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: ${{ inputs.tooling-ref != '' && inputs.tooling-ref || github.workflow_sha }}
          sparse-checkout: |
            .github/actions/harden-runner
            .github/actions/resolve-egress-allowlist
            scripts/ci/
          sparse-checkout-cone-mode: true
          persist-credentials: false

      - name: Resolve egress allowlist
        id: egress
        uses: ./.lgtm-ci-tooling/.github/actions/resolve-egress-allowlist
        with:
          egress-policy: ${{ inputs.egress-policy }}
          egress-preset: ${{ inputs.egress-preset }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}
          allowed-endpoints-mode: ${{ inputs.allowed-endpoints-mode }}
      - name: Harden runner
        # yamllint disable-line rule:line-length
        uses: ./.lgtm-ci-tooling/.github/actions/harden-runner
        with:
          egress-policy: ${{ inputs.egress-policy }}
          allowed-endpoints: ${{ steps.egress.outputs['allowed-endpoints'] }}
      - name: Install BATS and helpers
        shell: bash
        env:
          STEP: install-bats
          BATS_VERSION: ${{ inputs.bats-version }}
        run: bash .lgtm-ci-tooling/scripts/ci/actions/run-bats-tests.sh

      - name: Install kcov for coverage
        if: inputs.coverage
        shell: bash
        env:
          STEP: install-kcov
        run: bash .lgtm-ci-tooling/scripts/ci/actions/run-bats-tests.sh

      - name: Run BATS tests
        if: ${{ !inputs.coverage }}
        id: test
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        env:
          STEP: run-tests
          TEST_PATH: ${{ inputs.test-path }}
          TEST_FILTER: ${{ inputs.test-filter }}
          PARALLEL: ${{ inputs.parallel }}
        run: bash "${{ github.workspace }}/.lgtm-ci-tooling/scripts/ci/actions/run-bats-tests.sh"

      - name: Run BATS tests with coverage
        if: ${{ inputs.coverage }}
        id: coverage-run
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        env:
          STEP: run-coverage
          TEST_PATH: ${{ inputs.test-path }}
          TEST_FILTER: ${{ inputs.test-filter }}
          PARALLEL: ${{ inputs.parallel }}
          COVERAGE_DIR: coverage-report
        run: bash "${{ github.workspace }}/.lgtm-ci-tooling/scripts/ci/actions/run-bats-tests.sh"

      - name: Parse test results
        id: results
        if: always()
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        env:
          STEP: parse-results
        run: bash "${{ github.workspace }}/.lgtm-ci-tooling/scripts/ci/actions/run-bats-tests.sh"

      - name: Parse coverage results
        id: coverage
        if: inputs.coverage && always()
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        env:
          STEP: parse-coverage
          COVERAGE_DIR: coverage-report
        run: bash "${{ github.workspace }}/.lgtm-ci-tooling/scripts/ci/actions/run-bats-tests.sh"

      - name: Check coverage threshold
        if: inputs.coverage && inputs.coverage-threshold > 0
        shell: bash
        env:
          STEP: check-threshold
          COVERAGE_PERCENT: ${{ steps.coverage.outputs.coverage-percent }}
          COVERAGE_THRESHOLD: ${{ inputs.coverage-threshold }}
        run: bash .lgtm-ci-tooling/scripts/ci/actions/run-bats-tests.sh

      - name: Upload test results
        if: always()
        # Pinned to SHA for supply chain security
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: shell-test-results
          path: |
            ${{ inputs.working-directory }}/bats-output.tap
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload coverage report
        if: ${{ always() && inputs.upload-coverage && inputs.coverage }}
        # Pinned to SHA for supply chain security
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: shell-coverage
          path: |
            ${{ inputs.working-directory }}/coverage-report
          retention-days: 7
          if-no-files-found: ignore

  publish-test-summary:
    needs: test
    if: >-
      always()
      && github.event_name == 'pull_request'
      && github.event.pull_request.head.repo.fork == false
      && inputs.publish-test-summary
      && (
        !inputs.draft-pr-skip ||
        github.event.pull_request.draft == false
      )
    uses: ./.github/workflows/reusable-publish-test-summary.yml
    permissions:
      contents: read
      pull-requests: write
    with:
      test-suite-name: ${{ inputs.job-name }}
      comment-marker: ${{ inputs.comment-marker }}
      tests-passed: ${{ needs.test.outputs.tests-passed }}
      tests-failed: ${{ needs.test.outputs.tests-failed }}
      tests-total: ${{ needs.test.outputs.tests-total }}
      coverage-percent: ${{ needs.test.outputs.coverage-percent }}
      coverage-threshold: ${{ inputs.coverage-threshold }}
      job-result: ${{ needs.test.result }}
      tooling-ref: ${{ inputs.tooling-ref }}
