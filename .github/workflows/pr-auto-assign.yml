# SPDX-License-Identifier: MIT
---
name: PR - Auto Assign

# Automatically assigns a random CODEOWNER to new pull requests.
# Ensures every PR has an assignee for accountability.

"on":
  pull_request_target:
    types: [opened]

permissions:
  contents: read
  pull-requests: write

jobs:
  assign:
    uses: ./.github/workflows/reusable-pr-auto-assign.yml
    permissions:
      contents: read
      pull-requests: write
