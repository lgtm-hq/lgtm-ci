# SPDX-License-Identifier: MIT
---
name: PR - Auto Assign

# Automatically assigns a random CODEOWNER to new pull requests.
# Ensures every PR has an assignee for accountability.

"on":
  pull_request_target:
    types: [opened]

permissions:
  contents: read
  pull-requests: write

jobs:
  assign:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden Runner
        # Pinned to SHA for supply chain security
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0 # v2.12.0
        with:
          egress-policy: audit

      - name: Checkout
        # Pinned to SHA for supply chain security
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          sparse-checkout: .github/CODEOWNERS
          sparse-checkout-cone-mode: false

      - name: Assign random CODEOWNER
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          set -o pipefail

          # Extract usernames from CODEOWNERS, filter out team entries (@org/team)
          # Pipeline: extract @mentions -> dedupe -> remove @ -> filter individuals
          # The regex '^[A-Za-z0-9_-]+$' excludes team entries by disallowing '/' characters
          owners=""
          pipeline_output=$(grep -oE '@[a-zA-Z0-9_/-]+' .github/CODEOWNERS \
            | sort -u | tr -d '@' | grep -E '^[A-Za-z0-9_-]+$') \
            && exit_code=0 || exit_code=$?

          if [[ $exit_code -eq 0 ]]; then
            owners="$pipeline_output"
          elif [[ $exit_code -eq 1 ]]; then
            # grep exit code 1 means no matches - expected when no individual owners
            echo "No matches found in pipeline, treating as empty result"
            owners=""
          else
            # Any other exit code indicates an actual error
            echo "Error: Pipeline failed with exit code $exit_code"
            exit "$exit_code"
          fi

          if [[ -z "$owners" ]]; then
            echo "No valid individual CODEOWNERS found, skipping assignment"
            exit 0
          fi

          # Convert to array using mapfile (shellcheck-safe)
          mapfile -t owner_array <<< "$owners"

          # Filter out the PR author from candidates
          filtered_array=()
          for owner in "${owner_array[@]}"; do
            if [[ "$owner" != "$PR_AUTHOR" ]]; then
              filtered_array+=("$owner")
            fi
          done
          owner_array=("${filtered_array[@]}")
          count=${#owner_array[@]}

          if [[ $count -eq 0 ]]; then
            echo "No eligible assignees after filtering out PR author ($PR_AUTHOR), skipping"
            exit 0
          fi

          random_index=$((RANDOM % count))
          selected="${owner_array[$random_index]}"

          echo "Selected assignee: $selected (from $count eligible CODEOWNERS, excluding PR author $PR_AUTHOR)"
          gh pr edit "$PR_NUMBER" --add-assignee "$selected"
