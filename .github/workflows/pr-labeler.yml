---
name: PR - Auto Label

# Automatically applies labels to pull requests based on changed files.
# Uses path patterns defined in .github/labeler.yml

"on":
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    uses: ./.github/workflows/reusable-pr-labeler.yml
    permissions:
      contents: read
      pull-requests: write
