---
name: Reusable CodeQL

on:
  workflow_call:
    inputs:
      languages:
        description: "CodeQL languages, comma-separated"
        required: false
        type: string
        default: ""
      build-mode:
        description: "CodeQL build mode: none or autobuild"
        required: false
        type: string
        default: "none"
      config-file:
        description: "Optional CodeQL config file path"
        required: false
        type: string
        default: ""
      category:
        description: "SARIF category for results"
        required: false
        type: string
        default: ""

      egress-policy:
        description: "harden-runner egress policy (audit or block)"
        required: false
        type: string
        default: "audit"
      allowed-endpoints:
        description: "Allowed endpoints when egress-policy is block"
        required: false
        type: string
        default: ""
      job-name:
        description: "GitHub check name for CodeQL"
        required: false
        type: string
        default: "CodeQL"

jobs:
  codeql:
    name: ${{ inputs.job-name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: ${{ inputs.egress-policy }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        if: inputs.config-file == '' && inputs.languages != ''
        uses: github/codeql-action/init@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
        with:
          languages: ${{ inputs.languages }}
          build-mode: ${{ inputs.build-mode }}

      - name: Initialize CodeQL with auto-detected languages
        if: inputs.config-file == '' && inputs.languages == ''
        uses: github/codeql-action/init@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
        with:
          build-mode: ${{ inputs.build-mode }}

      - name: Initialize CodeQL with config
        if: inputs.config-file != ''
        uses: github/codeql-action/init@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
        with:
          languages: ${{ inputs.languages }}
          build-mode: ${{ inputs.build-mode }}
          config-file: ${{ inputs.config-file }}

      - name: Autobuild
        if: inputs.build-mode == 'autobuild'
        uses: github/codeql-action/autobuild@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5

      - name: Analyze
        uses: github/codeql-action/analyze@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
        with:
          category: ${{ inputs.category }}
