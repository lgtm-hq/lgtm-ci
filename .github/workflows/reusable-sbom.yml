---
name: Reusable SBOM Workflow

on:
  workflow_call:
    inputs:
      target:
        description: "Target to generate SBOM for"
        required: false
        type: string
        default: "."
      target-type:
        description: "Type of target: dir, image, file"
        required: false
        type: string
        default: "dir"
      sbom-format:
        description: "SBOM output format: cyclonedx-json, spdx-json"
        required: false
        type: string
        default: "cyclonedx-json"
      scan-vulnerabilities:
        description: "Scan SBOM for vulnerabilities"
        required: false
        type: boolean
        default: true
      fail-on-severity:
        description: "Fail on vulnerability severity: critical, high, medium, low, none"
        required: false
        type: string
        default: ""
      upload-sarif:
        description: "Upload vulnerability SARIF to GitHub Security"
        required: false
        type: boolean
        default: false
      create-attestation:
        description: "Create attestation for the SBOM"
        required: false
        type: boolean
        default: false
      artifact-name:
        description: "Name for uploaded SBOM artifact"
        required: false
        type: string
        default: "sbom"

      tooling-ref:
        description: "Git ref to use when checking out lgtm-ci tooling scripts"
        required: false
        type: string
        default: ""
      egress-policy:
        description: "harden-runner egress policy (audit or block)"
        required: false
        type: string
        default: "block"
      allowed-endpoints:
        description: "Allowed endpoints when egress-policy is block"
        required: false
        type: string
        default: ""

      allowed-endpoints-mode:
        description: >-
          replace: non-empty allowed-endpoints overrides egress-preset; append:
          merges preset with allowed-endpoints (deduped, first-seen wins)
        required: false
        type: string
        default: "replace"

      egress-preset:
        description: >-
          Named allowlist when allowed-endpoints is empty and egress-policy is
          block (github-minimal, github-pages, github-tooling, docker, playwright, pypi,
          rubygems, npm-publish, quality, sbom, scorecard)
        required: false
        type: string
        default: "sbom"
      job-name:
        description: "GitHub check name for the SBOM job"
        required: false
        type: string
        default: "SBOM & Supply Chain"

    outputs:
      sbom-file:
        description: "Path to the generated SBOM file, or 'none' if not generated"
        value: ${{ jobs.sbom.outputs.sbom-file }}
      vulnerabilities-found:
        description:
          "Whether vulnerabilities were found (true/false), or 'not-run' if scan was
          skipped"
        value: ${{ jobs.sbom.outputs.vulnerabilities-found }}
      attestation-url:
        description: "URL of the attestation, or 'not-run' if attestation was skipped"
        value: ${{ jobs.sbom.outputs.attestation-url }}

jobs:
  sbom:
    name: ${{ inputs.job-name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      id-token: write
      attestations: write

    outputs:
      sbom-file: ${{ steps.generate.outputs.sbom-file || 'none' }}
      vulnerabilities-found: ${{ steps.scan.outputs.vulnerabilities-found || 'not-run' }}
      attestation-url: ${{ steps.attest.outputs.attestation-url || 'not-run' }}

    steps:
      - name: Checkout repository
        # Pinned to SHA for supply chain security
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Checkout lgtm-ci tooling
        # yamllint disable-line rule:line-length
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: ${{ inputs.tooling-ref != '' && inputs.tooling-ref || github.workflow_sha }}
          sparse-checkout: |
            .github/actions/
          sparse-checkout-cone-mode: true
          persist-credentials: false

      - name: Resolve egress allowlist
        id: egress
        uses: ./.lgtm-ci-tooling/.github/actions/resolve-egress-allowlist
        with:
          egress-policy: ${{ inputs.egress-policy }}
          egress-preset: ${{ inputs.egress-preset }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}
          allowed-endpoints-mode: ${{ inputs.allowed-endpoints-mode }}
      - name: Harden runner
        # yamllint disable-line rule:line-length
        uses: ./.lgtm-ci-tooling/.github/actions/harden-runner
        with:
          egress-policy: ${{ inputs.egress-policy }}
          allowed-endpoints: ${{ steps.egress.outputs['allowed-endpoints'] }}
      - name: Generate SBOM
        id: generate
        uses: ./.lgtm-ci-tooling/.github/actions/generate-sbom
        with:
          target: ${{ inputs.target }}
          target-type: ${{ inputs.target-type }}
          format: ${{ inputs.sbom-format }}
          upload-artifact: "true"
          artifact-name: ${{ inputs.artifact-name }}

      - name: Scan vulnerabilities
        id: scan
        if: inputs.scan-vulnerabilities
        uses: ./.lgtm-ci-tooling/.github/actions/scan-vulnerabilities
        with:
          target: ${{ steps.generate.outputs.sbom-file }}
          target-type: sbom
          fail-on: ${{ inputs.fail-on-severity }}
          upload-sarif: ${{ inputs.upload-sarif }}

      - name: Create attestation
        id: attest
        if: inputs.create-attestation && github.event_name != 'pull_request'
        uses: ./.lgtm-ci-tooling/.github/actions/attest-build
        with:
          subject-path: ${{ steps.generate.outputs.sbom-file }}
