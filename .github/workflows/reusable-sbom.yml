---
name: Reusable SBOM Workflow

on:
  workflow_call:
    inputs:
      mode:
        description: >-
          report: generate/scan/attest (default). release-assets: multi-format
          SBOM + optional cosign sign + upload to the GitHub Release.
        required: false
        type: string
        default: "report"
      target:
        description: "Target to generate SBOM for"
        required: false
        type: string
        default: "."
      target-type:
        description: "Type of target: dir, image, file"
        required: false
        type: string
        default: "dir"
      sbom-format:
        description: "SBOM output format for report mode: cyclonedx-json, spdx-json"
        required: false
        type: string
        default: "cyclonedx-json"
      formats:
        description: >-
          Comma-separated Syft formats for release-assets mode
          (default: spdx-json,cyclonedx-json)
        required: false
        type: string
        default: "spdx-json,cyclonedx-json"
      sign:
        description: >-
          Cosign keyless (OIDC) sign SBOM files in release-assets mode
        required: false
        type: boolean
        default: true
      scan-vulnerabilities:
        description: "Scan SBOM for vulnerabilities (report mode)"
        required: false
        type: boolean
        default: true
      fail-on-severity:
        description: >-
          Fail on vulnerability severity: critical, high, medium, low, none.
          Empty string disables the gate (advisory-only).
        required: false
        type: string
        default: "critical"
      upload-sarif:
        description: "Upload vulnerability SARIF to GitHub Security"
        required: false
        type: boolean
        default: false
      create-attestation:
        description: "Create attestation for the SBOM"
        required: false
        type: boolean
        default: false
      artifact-name:
        description: "Name for uploaded SBOM artifact"
        required: false
        type: string
        default: "sbom"
      upload-release-assets:
        description: >-
          Report mode only: when true, run a dedicated contents:write job that
          attaches the SBOM artifact to the GitHub Release. Generation itself
          stays contents:read.
        required: false
        type: boolean
        default: false
      release-tag:
        description: >-
          Release tag for asset upload. Required when mode is release-assets.
          In report mode with upload-release-assets, defaults to github.ref_name
          when empty.
        required: false
        type: string
        default: ""

      tooling-ref:
        description: "Git ref to use when checking out lgtm-ci tooling scripts"
        required: false
        type: string
        default: ""
      egress-policy:
        description: "harden-runner egress policy (audit or block)"
        required: false
        type: string
        default: "block"
      allowed-endpoints:
        description: "Allowed endpoints when egress-policy is block"
        required: false
        type: string
        default: >
          github.com:443
          api.github.com:443
          codeload.github.com:443
          release-assets.githubusercontent.com:443
          objects.githubusercontent.com:443
          raw.githubusercontent.com:443
          uploads.github.com:443
          anchore.io:443
          get.anchore.io:443
          toolbox-data.anchore.io:443
          grype.anchore.io:443
          pipelines.actions.githubusercontent.com:443
          fulcio.sigstore.dev:443
          rekor.sigstore.dev:443
          timestamp.sigstore.dev:443
          tuf-repo-cdn.sigstore.dev:443
          sigstore-tuf-root.storage.googleapis.com:443
          oauth2.sigstore.dev:443
      allowed-endpoints-mode:
        description: >-
          replace: non-empty allowed-endpoints overrides egress-preset; append:
          merges preset with allowed-endpoints (deduped, first-seen wins)
        required: false
        type: string
        default: "replace"

      egress-preset:
        description: >-
          Named allowlist when allowed-endpoints is empty and egress-policy is
          block (github-minimal, github-pages, github-tooling, docker, playwright, pypi,
          rubygems, npm-publish, quality, sbom, scorecard)
        required: false
        type: string
        default: "sbom"
      job-name:
        description: "GitHub check name for the SBOM job"
        required: false
        type: string
        default: "SBOM & Supply Chain"

      runner-image:
        description: "GitHub-hosted runner image label"
        required: false
        type: string
        default: "ubuntu-24.04"

      timeout-minutes:
        description: "Job timeout in minutes"
        required: false
        type: number
        default: 20

    outputs:
      sbom-file:
        description: "Path to the generated SBOM file, or 'none' if not generated"
        value: ${{ jobs.sbom.outputs.sbom-file || 'none' }}
      vulnerabilities-found:
        description:
          "Whether vulnerabilities were found (true/false), or 'not-run' if scan was
          skipped"
        value: ${{ jobs.sbom.outputs.vulnerabilities-found || 'not-run' }}
      attestation-url:
        description: "URL of the attestation, or 'not-run' if attestation was skipped"
        value: ${{ jobs.sbom.outputs.attestation-url || 'not-run' }}

jobs:
  validate:
    name: Validate SBOM inputs
    runs-on: ${{ inputs.runner-image }}
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Harden runner
        if: runner.os == 'Linux' || runner.environment == 'self-hosted'
        # Pinned to SHA for supply chain security
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: ${{ inputs.egress-policy }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}
      - name: Checkout lgtm-ci tooling
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: ${{ inputs.tooling-ref != '' && inputs.tooling-ref || github.workflow_sha }}
          sparse-checkout: |
            scripts/ci/
          sparse-checkout-cone-mode: true
          persist-credentials: false
      - name: Validate mode inputs
        shell: bash
        env:
          MODE: ${{ inputs.mode }}
          RELEASE_TAG: ${{ inputs.release-tag }}
        run: bash .lgtm-ci-tooling/scripts/ci/actions/validate-sbom-mode.sh

  sbom:
    name: ${{ inputs.job-name }}
    needs: [validate]
    if: inputs.mode != 'release-assets'
    runs-on: ${{ inputs.runner-image }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      # Generation/scan/attest only need read for contents. Release asset upload
      # is isolated in upload-release-assets (contents: write) — see #532.
      contents: read
      security-events: write
      id-token: write
      attestations: write

    outputs:
      sbom-file: ${{ steps.generate.outputs.sbom-file || 'none' }}
      vulnerabilities-found: ${{ steps.scan.outputs.vulnerabilities-found || 'not-run' }}
      attestation-url: ${{ steps.attest.outputs.attestation-url || 'not-run' }}

    steps:
      - name: Harden runner
        if: runner.os == 'Linux' || runner.environment == 'self-hosted'
        # Pinned to SHA for supply chain security
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: ${{ inputs.egress-policy }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}
      - name: Checkout repository
        # Pinned to SHA for supply chain security
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Checkout lgtm-ci tooling
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: ${{ inputs.tooling-ref != '' && inputs.tooling-ref || github.workflow_sha }}
          sparse-checkout: |
            .github/actions/checkout-and-harden
          sparse-checkout-cone-mode: true
          persist-credentials: false
      - name: Checkout and harden
        id: egress
        uses: ./.lgtm-ci-tooling/.github/actions/checkout-and-harden
        with:
          tooling-ref: ${{ inputs.tooling-ref }}
          egress-policy: ${{ inputs.egress-policy }}
          egress-preset: ${{ inputs.egress-preset }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}
          allowed-endpoints-mode: ${{ inputs.allowed-endpoints-mode }}
          sparse-checkout-extra: |
            .github/actions/
            scripts/ci/
      - name: Generate SBOM
        id: generate
        uses: ./.lgtm-ci-tooling/.github/actions/generate-sbom
        with:
          target: ${{ inputs.target }}
          target-type: ${{ inputs.target-type }}
          format: ${{ inputs.sbom-format }}
          upload-artifact: "true"
          artifact-name: ${{ inputs.artifact-name }}
          # Never let anchore attach release assets here — that needs
          # contents:write and belongs in upload-release-assets (#532).
          upload-release-assets: "false"
      - name: Scan vulnerabilities
        id: scan
        if: inputs.scan-vulnerabilities
        uses: ./.lgtm-ci-tooling/.github/actions/scan-vulnerabilities
        with:
          target: ${{ steps.generate.outputs.sbom-file }}
          target-type: sbom
          fail-on: ${{ inputs.fail-on-severity }}
          upload-sarif: ${{ inputs.upload-sarif }}
      - name: Create attestation
        id: attest
        if: inputs.create-attestation && github.event_name != 'pull_request'
        uses: ./.lgtm-ci-tooling/.github/actions/attest-build
        with:
          subject-path: ${{ steps.generate.outputs.sbom-file }}

  upload-release-assets:
    name: Upload SBOM release assets
    needs: [validate, sbom]
    if: inputs.mode != 'release-assets' && inputs.upload-release-assets
    runs-on: ${{ inputs.runner-image }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: write

    steps:
      - name: Harden runner
        if: runner.os == 'Linux' || runner.environment == 'self-hosted'
        # Pinned to SHA for supply chain security
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: ${{ inputs.egress-policy }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}
      - name: Checkout lgtm-ci tooling
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: ${{ inputs.tooling-ref != '' && inputs.tooling-ref || github.workflow_sha }}
          sparse-checkout: |
            scripts/ci/
          sparse-checkout-cone-mode: true
          persist-credentials: false
      - name: Download SBOM artifact
        # Pinned to SHA for supply chain security
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ inputs.artifact-name }}
          path: sbom-artifact
      - name: Upload SBOM to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release-tag != '' && inputs.release-tag || github.ref_name }}
          ARTIFACT_NAME: ${{ inputs.artifact-name }}
          SBOM_ARTIFACT_DIR: sbom-artifact
        run: bash .lgtm-ci-tooling/scripts/ci/actions/upload-sbom-release-assets.sh

  release-assets:
    name: ${{ inputs.job-name }}
    needs: [validate]
    if: inputs.mode == 'release-assets'
    runs-on: ${{ inputs.runner-image }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Harden runner
        if: runner.os == 'Linux' || runner.environment == 'self-hosted'
        # Pinned to SHA for supply chain security
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: ${{ inputs.egress-policy }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}
      - name: Checkout repository at release tag
        # Pinned to SHA for supply chain security
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.release-tag }}
          persist-credentials: false
      - name: Checkout lgtm-ci tooling
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: ${{ inputs.tooling-ref != '' && inputs.tooling-ref || github.workflow_sha }}
          sparse-checkout: |
            .github/actions/checkout-and-harden
          sparse-checkout-cone-mode: true
          persist-credentials: false
      - name: Checkout and harden
        id: egress
        uses: ./.lgtm-ci-tooling/.github/actions/checkout-and-harden
        with:
          tooling-ref: ${{ inputs.tooling-ref }}
          egress-policy: ${{ inputs.egress-policy }}
          egress-preset: ${{ inputs.egress-preset }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}
          allowed-endpoints-mode: ${{ inputs.allowed-endpoints-mode }}
          sparse-checkout-extra: |
            scripts/ci/
      - name: Install Syft
        shell: bash
        env:
          STEP: install
        run: bash .lgtm-ci-tooling/scripts/ci/actions/generate-sbom-release-assets.sh
      - name: Generate multi-format SBOMs
        id: generate
        shell: bash
        env:
          STEP: generate
          TARGET: ${{ inputs.target }}
          TARGET_TYPE: ${{ inputs.target-type }}
          FORMATS: ${{ inputs.formats }}
          OUTPUT_DIR: sbom
        run: bash .lgtm-ci-tooling/scripts/ci/actions/generate-sbom-release-assets.sh
      - name: Install Cosign
        if: inputs.sign
        # Pinned to SHA for supply chain security
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Sign SBOM files
        if: inputs.sign
        shell: bash
        env:
          SIGN: ${{ inputs.sign }}
          SBOM_DIR: sbom
        run: bash .lgtm-ci-tooling/scripts/ci/actions/sign-sbom-release-assets.sh
      - name: Upload SBOM assets to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release-tag }}
          ARTIFACT_NAME: ${{ inputs.artifact-name }}
          SBOM_ARTIFACT_DIR: sbom
        run: bash .lgtm-ci-tooling/scripts/ci/actions/upload-sbom-release-assets.sh
