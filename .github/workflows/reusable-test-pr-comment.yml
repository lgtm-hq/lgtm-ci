---
name: Reusable Test PR Comment Workflow

on:
  workflow_call:
    inputs:
      test-suite-name:
        description: "Display name for the test suite report"
        required: true
        type: string
      comment-marker:
        description: "Unique marker for the test PR comment"
        required: true
        type: string
      tests-passed:
        description: "Number of tests passed"
        required: false
        type: string
        default: "0"
      tests-failed:
        description: "Number of tests failed"
        required: false
        type: string
        default: "0"
      tests-total:
        description: "Total number of tests"
        required: false
        type: string
        default: "0"
      coverage-percent:
        description: "Coverage percentage"
        required: false
        type: string
        default: ""
      coverage-threshold:
        description: "Minimum coverage percentage threshold"
        required: false
        type: string
        default: "0"
      job-result:
        description: "Result of the test job (success, failure, etc.)"
        required: false
        type: string
        default: "unknown"
      tooling-ref:
        description: "Git ref to use when checking out lgtm-ci tooling scripts"
        required: false
        type: string
        default: ""

      egress-policy:
        description: "harden-runner egress policy (audit or block)"
        required: false
        type: string
        default: "audit"
      allowed-endpoints:
        description: "Allowed endpoints when egress-policy is block"
        required: false
        type: string
        default: ""
      runner-image:
        description: "GitHub-hosted runner image label"
        required: false
        type: string
        default: "ubuntu-latest"
      timeout-minutes:
        description: "Job timeout in minutes"
        required: false
        type: number
        default: 10

jobs:
  comment:
    name: ${{ inputs.test-suite-name }} PR Comment
    runs-on: ${{ inputs.runner-image }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: ${{ inputs.egress-policy }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}

      - name: Checkout lgtm-ci tooling
        # yamllint disable-line rule:line-length
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: ${{ inputs.tooling-ref != '' && inputs.tooling-ref || github.workflow_sha }}
          sparse-checkout: scripts/ci/
          sparse-checkout-cone-mode: true
          persist-credentials: false

      - name: Generate PR comment
        shell: bash
        env:
          TEST_SUITE_NAME: ${{ inputs.test-suite-name }}
          TESTS_PASSED: ${{ inputs.tests-passed }}
          TESTS_FAILED: ${{ inputs.tests-failed }}
          TESTS_TOTAL: ${{ inputs.tests-total }}
          COVERAGE_PERCENT: ${{ inputs.coverage-percent }}
          COVERAGE_THRESHOLD: ${{ inputs.coverage-threshold }}
          JOB_RESULT: ${{ inputs.job-result }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          COMMENT_OUTPUT: pr-comment.md
        run: bash .lgtm-ci-tooling/scripts/ci/actions/generate-test-comment.sh

      - name: Detect PR number
        id: pr
        shell: bash
        env:
          STEP: pr-number
          GH_TOKEN: ${{ github.token }}
          INPUT_PR_NUMBER: ""
          EVENT_NAME: ${{ github.event_name }}
          EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
          EVENT_ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: bash .lgtm-ci-tooling/scripts/ci/actions/post-pr-comment.sh

      - name: Read comment from file
        id: read
        shell: bash
        env:
          STEP: read-file
          COMMENT_FILE: pr-comment.md
        run: bash .lgtm-ci-tooling/scripts/ci/actions/post-pr-comment.sh

      - name: Post PR comment
        id: post
        shell: bash
        env:
          STEP: post
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_PULL_REQUEST_HEAD_REPO_FULL_NAME: ${{ github.event.pull_request.head.repo.full_name }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          MARKER: ${{ inputs.comment-marker }}
          MODE: upsert
          DELETE_ON_EMPTY: "false"
          FILE_PROVIDED: ${{ steps.read.outputs.file_provided }}
          BODY_FROM_FILE: ${{ steps.read.outputs.body }}
          BODY_FROM_INPUT: ""
        run: bash .lgtm-ci-tooling/scripts/ci/actions/post-pr-comment.sh
