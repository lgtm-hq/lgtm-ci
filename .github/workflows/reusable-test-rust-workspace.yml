---
name: Reusable Rust Workspace Test Workflow

on:
  workflow_call:
    inputs:
      job-name-build:
        description: "GitHub check name for the workspace build job"
        required: false
        type: string
        default: "🔨 Build Check"
      job-name-rust-coverage:
        description: "GitHub check name for Rust coverage"
        required: false
        type: string
        default: "🦀 Rust Coverage"
      job-name-web-coverage:
        description: "GitHub check name for web coverage"
        required: false
        type: string
        default: "🌐 Web Coverage"
      rust-setup-script:
        description: "Path to Rust coverage setup script"
        required: false
        type: string
        default: ""
      rust-coverage-script:
        description: "Path to Rust coverage run script"
        required: false
        type: string
        default: ""
      rust-build-script:
        description: "Path to Rust workspace build script"
        required: false
        type: string
        default: ""
      enable-web-coverage:
        description: >-
          Run the optional frontend coverage job (Vitest/Istanbul). Disable for
          Rust-only repositories.
        required: false
        type: boolean
        default: true
      web-working-directory:
        description: "Relative path to the web app package"
        required: false
        type: string
        default: "apps/web"
      web-setup-script:
        description: "Path to web coverage setup script"
        required: false
        type: string
        default: ""
      web-coverage-script:
        description: "Path to web coverage run script"
        required: false
        type: string
        default: ""
      package-manager:
        description: "Package manager for web coverage (bun, npm, pnpm)"
        required: false
        type: string
        default: "bun"
      post-pr-comment:
        description: "Post coverage summary comments on pull requests"
        required: false
        type: boolean
        default: true
      rust-comment-marker:
        description: "PR comment marker for Rust coverage"
        required: false
        type: string
        default: "rust-coverage-report"
      web-comment-marker:
        description: "PR comment marker for web coverage"
        required: false
        type: string
        default: "web-coverage-report"
      rust-comment-title:
        description: "Heading title for the Rust coverage PR comment"
        required: false
        type: string
        default: "Rust Coverage Report"
      web-comment-title:
        description: "Heading title for the web coverage PR comment"
        required: false
        type: string
        default: "Web Coverage Report"
      tooling-ref:
        description: "Git ref for lgtm-ci tooling and composite actions"
        required: false
        type: string
        default: ""
      draft-pr-skip:
        description: "Skip jobs on draft pull requests"
        required: false
        type: boolean
        default: true
      egress-policy:
        description: "harden-runner egress policy (audit or block)"
        required: false
        type: string
        default: "audit"
      allowed-endpoints:
        description: "Allowed endpoints when egress-policy is block"
        required: false
        type: string
        default: ""
      runner-image:
        description: "GitHub-hosted runner image label"
        required: false
        type: string
        default: "ubuntu-24.04"

jobs:
  build:
    name: ${{ inputs.job-name-build }}
    runs-on: ${{ inputs.runner-image }}
    timeout-minutes: 30
    if: >-
      !inputs.draft-pr-skip ||
      github.event_name != 'pull_request' ||
      github.event.pull_request.draft == false
    permissions:
      contents: read
    concurrency:
      group: rust-workspace-build-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout lgtm-ci tooling
        # yamllint disable-line rule:line-length
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: ${{ inputs.tooling-ref != '' && inputs.tooling-ref || github.workflow_sha }}
          sparse-checkout: |
            .github/actions/
            scripts/ci/
          sparse-checkout-cone-mode: true
          persist-credentials: false

      - name: Harden runner
        uses: ./.lgtm-ci-tooling/.github/actions/harden-runner
        with:
          egress-policy: ${{ inputs.egress-policy }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: ./.lgtm-ci-tooling/.github/actions/setup-rust

      - name: Build workspace
        shell: bash
        run: >-
          bash "${{
            inputs.rust-build-script != '' && inputs.rust-build-script ||
            '.lgtm-ci-tooling/scripts/ci/testing/rust/build-workspace.sh'
          }}"

  rust-coverage:
    name: ${{ inputs.job-name-rust-coverage }}
    runs-on: ${{ inputs.runner-image }}
    timeout-minutes: 45
    if: >-
      !inputs.draft-pr-skip ||
      github.event_name != 'pull_request' ||
      github.event.pull_request.draft == false
    permissions:
      contents: read
    outputs:
      pr_comment_ready: ${{ steps.generate-rust-comment.outcome == 'success' }}
    concurrency:
      group: rust-workspace-rust-coverage-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout lgtm-ci tooling
        # yamllint disable-line rule:line-length
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: ${{ inputs.tooling-ref != '' && inputs.tooling-ref || github.workflow_sha }}
          sparse-checkout: |
            .github/actions/
            scripts/ci/
          sparse-checkout-cone-mode: true
          persist-credentials: false

      - name: Harden runner
        uses: ./.lgtm-ci-tooling/.github/actions/harden-runner
        with:
          egress-policy: ${{ inputs.egress-policy }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Rust coverage toolchain
        shell: bash
        run: >-
          bash "${{
            inputs.rust-setup-script != '' && inputs.rust-setup-script ||
            '.lgtm-ci-tooling/scripts/ci/testing/rust/setup-rust-coverage.sh'
          }}"

      - name: Run Rust coverage
        id: rust-coverage
        shell: bash
        run: >-
          bash "${{
            inputs.rust-coverage-script != '' && inputs.rust-coverage-script ||
            '.lgtm-ci-tooling/scripts/ci/testing/rust/run-rust-coverage.sh'
          }}"
        continue-on-error: true

      - name: Generate Rust coverage PR comment
        id: generate-rust-comment
        if: always() && github.event_name == 'pull_request'
        uses: ./.lgtm-ci-tooling/.github/actions/generate-coverage-comment
        with:
          coverage-file: rust-coverage.lcov
          format: lcov
          threshold-lines: "0"
          threshold-branches: "0"
          threshold-functions: "0"

      - name: Write Rust coverage PR comment artifact
        if: steps.generate-rust-comment.outcome == 'success'
        shell: bash
        env:
          COMMENT_BODY: ${{ steps.generate-rust-comment.outputs.comment-body }}
          COMMENT_TITLE: ${{ inputs.rust-comment-title }}
          COMMENT_OUTPUT: rust-coverage-pr-comment.txt
        run: >-
          bash .lgtm-ci-tooling/scripts/ci/testing/rust/prepare-coverage-comment.sh

      - name: Upload Rust coverage PR comment artifact
        if: >-
          steps.generate-rust-comment.outcome == 'success' &&
          github.event.pull_request.head.repo.fork == false
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rust-coverage-pr-comment
          path: rust-coverage-pr-comment.txt

      - name: Fail if Rust coverage failed
        if: env.RUST_COVERAGE_EXIT_CODE != '0'
        shell: bash
        env:
          COVERAGE_NAME: Rust
        run: >-
          bash .lgtm-ci-tooling/scripts/ci/testing/rust/fail-on-coverage.sh

  rust-coverage-pr-comment:
    name: 💬 Rust coverage PR comment
    runs-on: ${{ inputs.runner-image }}
    needs: rust-coverage
    if: >-
      always() &&
      inputs.post-pr-comment &&
      github.event_name == 'pull_request' &&
      needs.rust-coverage.outputs.pr_comment_ready == 'true'
    permissions:
      contents: read
      pull-requests: write
    timeout-minutes: 5

    steps:
      - name: Checkout lgtm-ci tooling
        # yamllint disable-line rule:line-length
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: ${{ inputs.tooling-ref != '' && inputs.tooling-ref || github.workflow_sha }}
          sparse-checkout: |
            .github/actions/
            scripts/ci/
          sparse-checkout-cone-mode: true
          persist-credentials: false

      - name: Harden runner
        uses: ./.lgtm-ci-tooling/.github/actions/harden-runner
        with:
          egress-policy: ${{ inputs.egress-policy }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}

      - name: Download Rust coverage PR comment artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: rust-coverage-pr-comment

      - name: Comment PR with Rust coverage
        uses: ./.lgtm-ci-tooling/.github/actions/post-pr-comment
        with:
          file: rust-coverage-pr-comment.txt
          marker: ${{ inputs.rust-comment-marker }}

  web-coverage:
    name: ${{ inputs.job-name-web-coverage }}
    runs-on: ${{ inputs.runner-image }}
    timeout-minutes: 30
    if: >-
      inputs.enable-web-coverage &&
      (
        !inputs.draft-pr-skip ||
        github.event_name != 'pull_request' ||
        github.event.pull_request.draft == false
      )
    permissions:
      contents: read
    outputs:
      pr_comment_ready: ${{ steps.generate-web-comment.outcome == 'success' }}
    concurrency:
      group: rust-workspace-web-coverage-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout lgtm-ci tooling
        # yamllint disable-line rule:line-length
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: ${{ inputs.tooling-ref != '' && inputs.tooling-ref || github.workflow_sha }}
          sparse-checkout: |
            .github/actions/
            scripts/ci/
          sparse-checkout-cone-mode: true
          persist-credentials: false

      - name: Harden runner
        uses: ./.lgtm-ci-tooling/.github/actions/harden-runner
        with:
          egress-policy: ${{ inputs.egress-policy }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup web coverage tools
        if: inputs.package-manager == 'bun'
        shell: bash
        run: >-
          bash "${{
            inputs.web-setup-script != '' && inputs.web-setup-script ||
            '.lgtm-ci-tooling/scripts/ci/testing/rust/setup-web-coverage.sh'
          }}"

      - name: Run web coverage
        id: web-coverage
        shell: bash
        env:
          WEB_WORKING_DIRECTORY: ${{ inputs.web-working-directory }}
        run: >-
          bash "${{
            inputs.web-coverage-script != '' && inputs.web-coverage-script ||
            '.lgtm-ci-tooling/scripts/ci/testing/rust/run-web-coverage.sh'
          }}"
        continue-on-error: true

      - name: Generate web coverage PR comment
        id: generate-web-comment
        if: always() && github.event_name == 'pull_request'
        uses: ./.lgtm-ci-tooling/.github/actions/generate-coverage-comment
        with:
          coverage-file: >-
            ${{ inputs.web-working-directory }}/coverage/coverage-summary.json
          format: istanbul
          threshold-lines: "0"
          threshold-branches: "0"
          threshold-functions: "0"

      - name: Write web coverage PR comment artifact
        if: steps.generate-web-comment.outcome == 'success'
        shell: bash
        env:
          COMMENT_BODY: ${{ steps.generate-web-comment.outputs.comment-body }}
          COMMENT_TITLE: ${{ inputs.web-comment-title }}
          COMMENT_OUTPUT: web-coverage-pr-comment.txt
        run: >-
          bash .lgtm-ci-tooling/scripts/ci/testing/rust/prepare-coverage-comment.sh

      - name: Upload web coverage PR comment artifact
        if: >-
          steps.generate-web-comment.outcome == 'success' &&
          github.event.pull_request.head.repo.fork == false
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: web-coverage-pr-comment
          path: web-coverage-pr-comment.txt

      - name: Fail if web coverage failed
        if: env.WEB_COVERAGE_EXIT_CODE != '0'
        shell: bash
        env:
          COVERAGE_NAME: Web
        run: >-
          bash .lgtm-ci-tooling/scripts/ci/testing/rust/fail-on-coverage.sh

  web-coverage-pr-comment:
    name: 💬 Web coverage PR comment
    runs-on: ${{ inputs.runner-image }}
    needs: web-coverage
    if: >-
      inputs.enable-web-coverage &&
      always() &&
      inputs.post-pr-comment &&
      github.event_name == 'pull_request' &&
      needs.web-coverage.outputs.pr_comment_ready == 'true'
    permissions:
      contents: read
      pull-requests: write
    timeout-minutes: 5

    steps:
      - name: Checkout lgtm-ci tooling
        # yamllint disable-line rule:line-length
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: ${{ inputs.tooling-ref != '' && inputs.tooling-ref || github.workflow_sha }}
          sparse-checkout: |
            .github/actions/
            scripts/ci/
          sparse-checkout-cone-mode: true
          persist-credentials: false

      - name: Harden runner
        uses: ./.lgtm-ci-tooling/.github/actions/harden-runner
        with:
          egress-policy: ${{ inputs.egress-policy }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}

      - name: Download web coverage PR comment artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: web-coverage-pr-comment

      - name: Comment PR with web coverage
        uses: ./.lgtm-ci-tooling/.github/actions/post-pr-comment
        with:
          file: web-coverage-pr-comment.txt
          marker: ${{ inputs.web-comment-marker }}
