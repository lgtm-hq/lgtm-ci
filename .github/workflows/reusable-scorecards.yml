---
name: Reusable OpenSSF Scorecard

on:
  workflow_call:
    inputs:
      results-format:
        description: >-
          Scorecard output format (default sarif). When overriding to a non-sarif
          format, also set results-file to a matching path (e.g. results.json).
        required: false
        type: string
        default: "sarif"
      publish-results:
        description: "Publish scorecard results"
        required: false
        type: boolean
        default: true
      upload-sarif:
        description: "Upload SARIF to GitHub Security tab"
        required: false
        type: boolean
        default: true
      results-file:
        description: >-
          Scorecard results output path. Defaults to "results.sarif"; callers
          using a non-sarif results-format should override this to match their
          chosen format (e.g. "results.json").
        required: false
        type: string
        default: "results.sarif"

      egress-policy:
        description: "harden-runner egress policy (audit or block)"
        required: false
        type: string
        default: "block"
      allowed-endpoints:
        description: "Allowed endpoints when egress-policy is block"
        required: false
        type: string
        default: >
          github.com:443
          api.github.com:443
          codeload.github.com:443
          objects.githubusercontent.com:443
          raw.githubusercontent.com:443
          pipelines.actions.githubusercontent.com:443
          gcr.io:443
          api.osv.dev:443
          api.scorecard.dev:443
          api.securityscorecards.dev:443
      job-name:
        description: "GitHub check name for OpenSSF Scorecard"
        required: false
        type: string
        default: "OpenSSF Scorecard"

      timeout-minutes:
        description: "Job timeout in minutes"
        required: false
        type: number
        default: 30

jobs:
  scorecards:
    name: ${{ inputs.job-name }}
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: read
      security-events: write
      id-token: write

    steps:
      - name: Harden runner
        if: runner.os == 'Linux' || runner.environment == 'self-hosted'
        # Pinned to SHA for supply chain security
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: ${{ inputs.egress-policy }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}
      # No local composite steps here: ossf/scorecard-action's publish path
      # only allows checkout, upload-artifact, upload-sarif, scorecard-action,
      # and harden-runner in the calling job — any other step fails publish
      # with "job has unallowed step" (#518). Egress therefore uses the static
      # allowed-endpoints default directly (no preset resolution).
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          repo_token: ${{ github.token }}
          results_format: ${{ inputs.results-format }}
          results_file: ${{ inputs.results-file }}
          publish_results: ${{ inputs.publish-results }}
      - name: Upload SARIF
        if: inputs.upload-sarif && inputs.results-format == 'sarif'
        uses: github/codeql-action/upload-sarif@e0647621c2984b5ed2f768cb892365bf2a616ad1 # v4.37.2
        with:
          sarif_file: ${{ inputs.results-file }}
