---
name: Reusable OpenSSF Scorecard

on:
  workflow_call:
    inputs:
      results-format:
        description: >-
          Scorecard output format (default sarif). When overriding to a non-sarif
          format, also set results-file to a matching path (e.g. results.json).
        required: false
        type: string
        default: "sarif"
      publish-results:
        description: "Publish scorecard results"
        required: false
        type: boolean
        default: true
      upload-sarif:
        description: "Upload SARIF to GitHub Security tab"
        required: false
        type: boolean
        default: true
      results-file:
        description: >-
          Scorecard results output path. Defaults to "results.sarif"; callers
          using a non-sarif results-format should override this to match their
          chosen format (e.g. "results.json").
        required: false
        type: string
        default: "results.sarif"

      tooling-ref:
        description: >-
          Optional — pins egress composites only (no scripts/ci checkout).
          Defaults to caller workflow SHA.
        required: false
        type: string
        default: ""

      egress-policy:
        description: "harden-runner egress policy (audit or block)"
        required: false
        type: string
        default: "block"
      allowed-endpoints:
        description: "Allowed endpoints when egress-policy is block"
        required: false
        type: string
        default: >
          github.com:443
          api.github.com:443
          codeload.github.com:443
          objects.githubusercontent.com:443
          raw.githubusercontent.com:443
          pipelines.actions.githubusercontent.com:443
          gcr.io:443
          api.osv.dev:443
          api.scorecard.dev:443
          api.securityscorecards.dev:443
      allowed-endpoints-mode:
        description: >-
          replace: non-empty allowed-endpoints overrides egress-preset; append:
          merges preset with allowed-endpoints (deduped, first-seen wins)
        required: false
        type: string
        default: "replace"

      egress-preset:
        description: >-
          Named allowlist when allowed-endpoints is empty and egress-policy is
          block (github-minimal, github-pages, github-tooling, docker, playwright, pypi,
          rubygems, npm-publish, quality, sbom, scorecard)
        required: false
        type: string
        default: "scorecard"
      job-name:
        description: "GitHub check name for OpenSSF Scorecard"
        required: false
        type: string
        default: "OpenSSF Scorecard"

      timeout-minutes:
        description: "Job timeout in minutes"
        required: false
        type: number
        default: 30

jobs:
  scorecards:
    name: ${{ inputs.job-name }}
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: read
      security-events: write
      id-token: write

    steps:
      - name: Harden runner
        # Pinned to SHA for supply chain security
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: ${{ inputs.egress-policy }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Checkout lgtm-ci tooling
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: ${{ inputs.tooling-ref != '' && inputs.tooling-ref || github.workflow_sha }}
          sparse-checkout: |
            .github/actions/checkout-and-harden
          sparse-checkout-cone-mode: true
          persist-credentials: false
      - name: Checkout and harden
        id: egress
        uses: ./.lgtm-ci-tooling/.github/actions/checkout-and-harden
        with:
          tooling-ref: ${{ inputs.tooling-ref }}
          egress-policy: ${{ inputs.egress-policy }}
          egress-preset: ${{ inputs.egress-preset }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}
          allowed-endpoints-mode: ${{ inputs.allowed-endpoints-mode }}
      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          repo_token: ${{ github.token }}
          results_format: ${{ inputs.results-format }}
          results_file: ${{ inputs.results-file }}
          publish_results: ${{ inputs.publish-results }}
      - name: Upload SARIF
        if: inputs.upload-sarif && inputs.results-format == 'sarif'
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: ${{ inputs.results-file }}
