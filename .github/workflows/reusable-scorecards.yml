---
name: Reusable OpenSSF Scorecard

on:
  workflow_call:
    inputs:
      results-format:
        description: "Scorecard output format"
        required: false
        type: string
        default: "sarif"
      publish-results:
        description: "Publish scorecard results"
        required: false
        type: boolean
        default: true
      upload-sarif:
        description: "Upload SARIF to GitHub Security tab"
        required: false
        type: boolean
        default: true

jobs:
  scorecards:
    name: OpenSSF Scorecard
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      id-token: write

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_format: ${{ inputs.results-format }}
          publish_results: ${{ inputs.publish-results }}

      - name: Upload SARIF
        if: inputs.upload-sarif && inputs.results-format == 'sarif'
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
        with:
          sarif_file: results.sarif
