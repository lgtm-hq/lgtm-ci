---
name: Reusable OpenSSF Scorecard

on:
  workflow_call:
    inputs:
      results-format:
        description: >-
          Scorecard output format (default sarif). When overriding to a non-sarif
          format, also set results-file to a matching path (e.g. results.json).
        required: false
        type: string
        default: "sarif"
      publish-results:
        description: "Publish scorecard results"
        required: false
        type: boolean
        default: true
      upload-sarif:
        description: "Upload SARIF to GitHub Security tab"
        required: false
        type: boolean
        default: true
      results-file:
        description: >-
          Scorecard results output path. Defaults to "results.sarif"; callers
          using a non-sarif results-format should override this to match their
          chosen format (e.g. "results.json").
        required: false
        type: string
        default: "results.sarif"

      tooling-ref:
        description: >-
          Optional — pins egress composites only (no scripts/ci checkout).
          Defaults to caller workflow SHA.
        required: false
        type: string
        default: ""

      egress-policy:
        description: "harden-runner egress policy (audit or block)"
        required: false
        type: string
        default: "block"
      allowed-endpoints:
        description: "Allowed endpoints when egress-policy is block"
        required: false
        type: string
        default: ""

      allowed-endpoints-mode:
        description: >-
          replace: non-empty allowed-endpoints overrides egress-preset; append:
          merges preset with allowed-endpoints (deduped, first-seen wins)
        required: false
        type: string
        default: "replace"

      egress-preset:
        description: >-
          Named allowlist when allowed-endpoints is empty and egress-policy is
          block (github-minimal, github-pages, github-tooling, docker, playwright, pypi,
          rubygems, npm-publish, quality, sbom, scorecard)
        required: false
        type: string
        default: "scorecard"
      job-name:
        description: "GitHub check name for OpenSSF Scorecard"
        required: false
        type: string
        default: "OpenSSF Scorecard"

jobs:
  scorecards:
    name: ${{ inputs.job-name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Checkout lgtm-ci tooling
        # yamllint disable-line rule:line-length
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: ${{ inputs.tooling-ref != '' && inputs.tooling-ref || github.workflow_sha }}
          sparse-checkout: |
            .github/actions/harden-runner
            .github/actions/resolve-egress-allowlist
          sparse-checkout-cone-mode: true
          persist-credentials: false

      - name: Resolve egress allowlist
        id: egress
        uses: ./.lgtm-ci-tooling/.github/actions/resolve-egress-allowlist
        with:
          egress-policy: ${{ inputs.egress-policy }}
          egress-preset: ${{ inputs.egress-preset }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}
          allowed-endpoints-mode: ${{ inputs.allowed-endpoints-mode }}
      - name: Harden runner
        # yamllint disable-line rule:line-length
        uses: ./.lgtm-ci-tooling/.github/actions/harden-runner
        with:
          egress-policy: ${{ inputs.egress-policy }}
          allowed-endpoints: ${{ steps.egress.outputs['allowed-endpoints'] }}

      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          repo_token: ${{ github.token }}
          results_format: ${{ inputs.results-format }}
          results_file: ${{ inputs.results-file }}
          publish_results: ${{ inputs.publish-results }}

      - name: Upload SARIF
        if: inputs.upload-sarif && inputs.results-format == 'sarif'
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: ${{ inputs.results-file }}
