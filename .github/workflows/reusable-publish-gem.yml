---
name: Reusable RubyGems Publishing Workflow

on:
  workflow_call:
    inputs:
      ruby-version:
        description: "Ruby version"
        required: false
        type: string
        default: "3.3"
      gemspec:
        description: "Path to gemspec file (auto-detected if not specified)"
        required: false
        type: string
        default: ""
      dry-run:
        description: "Build only, do not publish"
        required: false
        type: boolean
        default: false
      working-directory:
        description: "Working directory containing the gem"
        required: false
        type: string
        default: "."
      tooling-ref:
        description: "Git ref to use when checking out lgtm-ci tooling scripts"
        required: false
        type: string
        default: ""
      egress-policy:
        description: "harden-runner egress policy (audit or block)"
        required: false
        type: string
        default: "audit"
      allowed-endpoints:
        description: "Allowed endpoints when egress-policy is block"
        required: false
        type: string
        default: ""

    outputs:
      published:
        description: "Whether the gem was published"
        value: ${{ jobs.publish.outputs.published }}
      version:
        description: "Published gem version"
        value: ${{ jobs.publish.outputs.version }}
      gem-name:
        description: "Published gem name"
        value: ${{ jobs.publish.outputs.gem-name }}
      gem-file:
        description: "Path to the built gem file"
        value: ${{ jobs.publish.outputs.gem-file }}

jobs:
  publish:
    name: Publish to RubyGems
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    outputs:
      published: ${{ steps.gem.outputs.published || 'false' }}
      version: ${{ steps.gem.outputs.version }}
      gem-name: ${{ steps.gem.outputs.gem-name }}
      gem-file: ${{ steps.gem.outputs.gem-file }}

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: ${{ inputs.egress-policy }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Checkout lgtm-ci tooling
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: ${{ inputs.tooling-ref != '' && inputs.tooling-ref || github.workflow_sha }}
          sparse-checkout: |
            .github/actions/
            scripts/ci/
          persist-credentials: false
      - name: Setup Ruby
        uses: ./.lgtm-ci-tooling/.github/actions/setup-ruby
        with:
          ruby-version: ${{ inputs.ruby-version }}
          working-directory: ${{ inputs.working-directory }}

      - name: Configure RubyGems OIDC credentials
        if: inputs.dry-run == false
        uses: rubygems/configure-rubygems-credentials@762a4b77c3300434bb57c7ce80b20e36231927aa # v2.0.0

      - name: Publish to RubyGems
        id: gem
        uses: ./.lgtm-ci-tooling/.github/actions/publish-gem
        with:
          gemspec: ${{ inputs.gemspec }}
          dry-run: ${{ inputs.dry-run }}
          working-directory: ${{ inputs.working-directory }}
