---
name: Reusable RubyGems Publishing Workflow

on:
  workflow_call:
    inputs:
      ruby-version:
        description: "Ruby version"
        required: false
        type: string
        default: "3.3"
      gemspec:
        description: "Path to gemspec file (auto-detected if not specified)"
        required: false
        type: string
        default: ""
      dry-run:
        description: "Build only, do not publish"
        required: false
        type: boolean
        default: false
      working-directory:
        description: "Working directory containing the gem"
        required: false
        type: string
        default: "."
      tooling-ref:
        description: "Git ref to use when checking out lgtm-ci tooling scripts"
        required: false
        type: string
        default: ""
      egress-policy:
        description: "harden-runner egress policy (audit or block)"
        required: false
        type: string
        default: "block"
      allowed-endpoints:
        description: "Allowed endpoints when egress-policy is block"
        required: false
        type: string
        default: ""

      allowed-endpoints-mode:
        description: >-
          replace: non-empty allowed-endpoints overrides egress-preset; append:
          merges preset with allowed-endpoints (deduped, first-seen wins)
        required: false
        type: string
        default: "replace"

      egress-preset:
        description: >-
          Named allowlist when allowed-endpoints is empty and egress-policy is
          block (github-minimal, github-pages, github-tooling, docker, playwright, pypi,
          rubygems, npm-publish, quality, sbom, scorecard)
        required: false
        type: string
        default: "rubygems"
      job-name:
        description: "GitHub check name for the publish job"
        required: false
        type: string
        default: "Publish to RubyGems"

    outputs:
      published:
        description: "Whether the gem was published"
        value: ${{ jobs.publish.outputs.published }}
      version:
        description: "Published gem version"
        value: ${{ jobs.publish.outputs.version }}
      gem-name:
        description: "Published gem name"
        value: ${{ jobs.publish.outputs.gem-name }}
      gem-file:
        description: "Path to the built gem file"
        value: ${{ jobs.publish.outputs.gem-file }}

jobs:
  publish:
    name: ${{ inputs.job-name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    outputs:
      published: ${{ steps.gem.outputs.published || 'false' }}
      version: ${{ steps.gem.outputs.version }}
      gem-name: ${{ steps.gem.outputs.gem-name }}
      gem-file: ${{ steps.gem.outputs.gem-file }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Checkout lgtm-ci tooling
        # yamllint disable-line rule:line-length
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: ${{ inputs.tooling-ref != '' && inputs.tooling-ref || github.workflow_sha }}
          sparse-checkout: |
            .github/actions/
            scripts/ci/
          sparse-checkout-cone-mode: true
          persist-credentials: false

      - name: Resolve egress allowlist
        id: egress
        uses: ./.lgtm-ci-tooling/.github/actions/resolve-egress-allowlist
        with:
          egress-policy: ${{ inputs.egress-policy }}
          egress-preset: ${{ inputs.egress-preset }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}
          allowed-endpoints-mode: ${{ inputs.allowed-endpoints-mode }}
      - name: Harden runner
        # yamllint disable-line rule:line-length
        uses: ./.lgtm-ci-tooling/.github/actions/harden-runner
        with:
          egress-policy: ${{ inputs.egress-policy }}
          allowed-endpoints: ${{ steps.egress.outputs['allowed-endpoints'] }}

      - name: Setup Ruby
        uses: ./.lgtm-ci-tooling/.github/actions/setup-ruby
        with:
          ruby-version: ${{ inputs.ruby-version }}
          working-directory: ${{ inputs.working-directory }}

      - name: Configure RubyGems OIDC credentials
        if: inputs.dry-run == false
        uses: rubygems/configure-rubygems-credentials@762a4b77c3300434bb57c7ce80b20e36231927aa # v2.0.0

      - name: Publish to RubyGems
        id: gem
        uses: ./.lgtm-ci-tooling/.github/actions/publish-gem
        with:
          gemspec: ${{ inputs.gemspec }}
          dry-run: ${{ inputs.dry-run }}
          working-directory: ${{ inputs.working-directory }}
