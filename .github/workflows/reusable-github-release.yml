---
name: Reusable GitHub Release Workflow

on:
  workflow_call:
    inputs:
      artifact-name:
        description: "Artifact to download and attach to the release"
        required: false
        type: string
        default: "python-dist"
      artifact-path:
        description: "Directory to extract the artifact into"
        required: false
        type: string
        default: "dist"
      tag-name:
        description: "Release tag (defaults to github.ref_name)"
        required: false
        type: string
        default: ""
      release-name:
        description: "Release title (defaults to tag name)"
        required: false
        type: string
        default: ""
      generate-release-notes:
        description: "Use GitHub auto-generated release notes"
        required: false
        type: boolean
        default: true
      files:
        description: >-
          Newline-separated asset globs attached to the release.
          Defaults to "{artifact-path}/*" when empty.
        required: false
        type: string
        default: ""
      draft:
        description: "Create as draft release"
        required: false
        type: boolean
        default: false
      prerelease:
        description: "Mark as prerelease"
        required: false
        type: boolean
        default: false
      egress-policy:
        description: "harden-runner egress policy (audit or block)"
        required: false
        type: string
        default: "block"
      allowed-endpoints:
        description: "Allowed endpoints when egress-policy is block"
        required: false
        type: string
        default: >
          github.com:443
          api.github.com:443
          codeload.github.com:443
          objects.githubusercontent.com:443
          raw.githubusercontent.com:443
          uploads.github.com:443
          pipelines.actions.githubusercontent.com:443
      allowed-endpoints-mode:
        description: >-
          replace: non-empty allowed-endpoints overrides egress-preset; append:
          merges preset with allowed-endpoints (deduped, first-seen wins)
        required: false
        type: string
        default: "replace"

      egress-preset:
        description: >-
          Named allowlist when allowed-endpoints is empty and egress-policy is
          block (github-minimal, github-pages, github-tooling, docker, playwright, pypi,
          rubygems, npm-publish, quality, sbom, scorecard)
        required: false
        type: string
        default: "github-tooling"
      tooling-ref:
        description: "Git ref to use when checking out lgtm-ci tooling scripts"
        required: false
        type: string
        default: ""
      job-name:
        description: "GitHub check name for the release job"
        required: false
        type: string
        default: "Create GitHub Release"
      runner-image:
        description: "GitHub-hosted runner image label"
        required: false
        type: string
        default: "ubuntu-24.04"
      timeout-minutes:
        description: "Job timeout in minutes"
        required: false
        type: number
        default: 15

    outputs:
      release-url:
        description: "URL of the created GitHub release"
        value: ${{ jobs.release.outputs.release-url }}
      release-id:
        description: "ID of the created GitHub release"
        value: ${{ jobs.release.outputs.release-id }}

jobs:
  release:
    name: ${{ inputs.job-name }}
    runs-on: ${{ inputs.runner-image }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: write # create GitHub releases and upload release assets

    outputs:
      release-url: ${{ steps.gh-release.outputs.release-url }}
      release-id: ${{ steps.gh-release.outputs.release-id }}

    steps:
      - name: Harden runner
        if: runner.os == 'Linux' || runner.environment == 'self-hosted'
        # Pinned to SHA for supply chain security
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: ${{ inputs.egress-policy }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}
      - name: Checkout repository
        # Pinned to SHA for supply chain security
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Checkout lgtm-ci tooling
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: ${{ inputs.tooling-ref != '' && inputs.tooling-ref || github.workflow_sha }}
          sparse-checkout: |
            .github/actions/checkout-and-harden
          sparse-checkout-cone-mode: true
          persist-credentials: false
      - name: Checkout and harden
        id: egress
        uses: ./.lgtm-ci-tooling/.github/actions/checkout-and-harden
        with:
          tooling-ref: ${{ inputs.tooling-ref }}
          egress-policy: ${{ inputs.egress-policy }}
          egress-preset: ${{ inputs.egress-preset }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}
          allowed-endpoints-mode: ${{ inputs.allowed-endpoints-mode }}
          sparse-checkout-extra: |
            scripts/ci/
      - name: Download release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ inputs.artifact-path }}
      - name: Verify release assets exist
        shell: bash
        env:
          FILES: >-
            ${{ inputs.files != '' && inputs.files ||
            format('{0}/*', inputs.artifact-path) }}
          ARTIFACT_PATH: ${{ inputs.artifact-path }}
        run: >-
          .lgtm-ci-tooling/scripts/ci/release/verify-release-assets.sh
      - name: Create GitHub Release
        id: gh-release
        shell: bash
        env:
          TAG: >-
            ${{ inputs.tag-name != '' && inputs.tag-name || github.ref_name }}
          TITLE: >-
            ${{ inputs.release-name != '' && inputs.release-name ||
            (inputs.tag-name != '' && inputs.tag-name || github.ref_name) }}
          GENERATE_NOTES: ${{ inputs.generate-release-notes }}
          DRAFT: ${{ inputs.draft }}
          PRERELEASE: ${{ inputs.prerelease }}
          FILE_PATTERNS: >-
            ${{ inputs.files != '' && inputs.files ||
            format('{0}/*', inputs.artifact-path) }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: >-
          .lgtm-ci-tooling/scripts/ci/release/create-github-release.sh
