# SPDX-License-Identifier: MIT
---
name: Maintenance - Renovate Dependencies
# Automated dependency updates using Renovate bot. Runs daily to check for
# outdated dependencies and creates PRs with updates.

"on":
  schedule:
    # Run daily at 22:00 UTC
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  renovate:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: write
      issues: write
      pull-requests: write
    concurrency:
      group: renovate-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve egress allowlist
        id: egress
        uses: ./.github/actions/resolve-egress-allowlist
        with:
          egress-policy: block
          allowed-endpoints-mode: replace
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            ghcr.io:443
            pkg-containers.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            objects.githubusercontent.com:443
            pypi.org:443
            files.pythonhosted.org:443

      - name: Harden Runner
        uses: ./.github/actions/harden-runner
        with:
          egress-policy: block
          allowed-endpoints: ${{ steps.egress.outputs['allowed-endpoints'] }}

      - name: Self-hosted Renovate
        # yamllint disable-line rule:line-length
        uses: renovatebot/github-action@b50d2ba2bd928235abdcc14d06dfafc217f1c565 # v46.1.18
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          configurationFile: renovate.json
        env:
          LOG_LEVEL: ${{ github.event_name == 'workflow_dispatch' && 'debug' || 'info' }}
