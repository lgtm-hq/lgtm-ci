# SPDX-License-Identifier: MIT
---
name: Maintenance - Renovate Dependencies
# Automated dependency updates using Renovate bot. Runs daily to check for
# outdated dependencies and creates PRs with updates.

"on":
  schedule:
    # Run daily at 22:00 UTC
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  renovate:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: write
      issues: write
      pull-requests: write
    concurrency:
      group: renovate-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Harden Runner
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            ghcr.io:443
            pkg-containers.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            objects.githubusercontent.com:443
            pypi.org:443
            files.pythonhosted.org:443

      - name: Checkout
        # yamllint disable-line rule:line-length
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Self-hosted Renovate
        # yamllint disable-line rule:line-length
        uses: renovatebot/github-action@79dc0ba74dc3de28db0a7aeb1d0b95d5bf5fde2a # v46.1.13
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          configurationFile: renovate.json
        env:
          LOG_LEVEL: ${{ github.event_name == 'workflow_dispatch' && 'debug' || 'info' }}
