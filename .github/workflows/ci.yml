---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: read

jobs:
  quality:
    uses: ./.github/workflows/reusable-quality.yml
    with:
      tooling-ref: ${{ github.sha }}
    permissions:
      contents: read
      packages: read
      pull-requests: write

  shell-tests:
    name: Shell Library Tests
    uses: ./.github/workflows/reusable-test-shell.yml
    permissions:
      contents: read
      pull-requests: write
    with:
      test-path: tests/bats
      coverage: true
      coverage-threshold: 84
      upload-coverage: true
      tooling-ref: ${{ github.sha }}
