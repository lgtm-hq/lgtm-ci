---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: read

jobs:
  quality:
    name: Lintro Quality Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      # Pinned digest — keep in sync with pyproject.toml lintro pin / reusable-quality.yml
      # yamllint disable-line rule:line-length
      LINTRO_IMAGE: ghcr.io/lgtm-hq/py-lintro@sha256:f93473dea60ac4d28540e9e15c1d47267c2cfc3cc291beef6d4563d14a60e2f0
    outputs:
      exit-code: ${{ steps.lintro.outputs.exit-code }}

    steps:
      - name: Checkout repository
        # Pinned to SHA for supply chain security
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Run lintro quality checks
        id: lintro
        shell: bash
        env:
          STEP: check
          FAIL_ON_ERROR: "true"
        run: bash scripts/ci/quality/run-lintro-docker.sh

      - name: Upload linting report
        if: always()
        # Pinned to SHA for supply chain security
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: linting-report
          path: |
            .lintro/
            chk-output.txt
          retention-days: 7
          if-no-files-found: ignore

  comment-lint:
    name: PR Lint Comment
    runs-on: ubuntu-latest
    needs: quality
    if: always() && github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Harden Runner
        # Pinned to SHA for supply chain security
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout repository
        # Pinned to SHA for supply chain security
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download linting report
        id: download
        # Pinned to SHA for supply chain security
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        continue-on-error: true
        with:
          name: linting-report
          path: .

      - name: Generate PR comment
        if: steps.download.outcome == 'success'
        shell: bash
        env:
          LINTRO_OUTPUT: chk-output.txt
          LINTRO_EXIT_CODE: ${{ needs.quality.outputs.exit-code }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
        run: bash scripts/ci/actions/generate-lintro-comment.sh > pr-comment.md

      - name: Post PR comment
        if: steps.download.outcome == 'success'
        uses: ./.github/actions/post-pr-comment
        with:
          file: pr-comment.md
          marker: lintro-report

  shell-tests:
    name: Shell Library Tests
    uses: ./.github/workflows/reusable-test-shell.yml
    permissions:
      contents: read
      pull-requests: write
    with:
      test-path: tests/bats
      coverage: true
      coverage-threshold: 84
      upload-coverage: true
      is-pr: ${{ github.event_name == 'pull_request' }}
