---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: read

jobs:
  quality:
    uses: ./.github/workflows/reusable-quality-lint.yml
    with:
      tooling-ref: ${{ github.sha }}
    permissions:
      contents: read
      packages: read

  publish-quality-summary:
    needs: quality
    if: >-
      !cancelled()
      && github.event_name == 'pull_request'
      && github.event.pull_request.head.repo.fork == false
    uses: ./.github/workflows/reusable-publish-quality-summary.yml
    with:
      exit-code: ${{ needs.quality.outputs.exit-code }}
      tooling-ref: ${{ github.sha }}
    permissions:
      contents: read
      pull-requests: write

  shell-tests:
    name: Shell Library Tests
    uses: ./.github/workflows/reusable-test-shell.yml
    permissions:
      contents: read
      pull-requests: write
    with:
      test-path: tests/bats
      coverage: true
      coverage-threshold: 84
      upload-coverage: true
      tooling-ref: ${{ github.sha }}
