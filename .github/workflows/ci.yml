---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Lintro Quality Checks
    runs-on: ubuntu-latest
    container:
      # Pinned to digest for supply chain security (sha-<commit> tag keeps it from GC)
      # yamllint disable-line rule:line-length
      image: ghcr.io/lgtm-hq/py-lintro@sha256:6b6ee149e4daa0f17447b4c1c481e949277eb7a28453c5cb819dd95119ba42dc
      # Run as root to avoid permission issues with GitHub Actions file commands
      options: --user 0
    outputs:
      exit-code: ${{ steps.lintro.outputs.exit-code }}

    steps:
      - name: Checkout repository
        # Pinned to SHA for supply chain security
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Add lintro to PATH
        shell: bash
        run: echo "/app/.venv/bin" >> "$GITHUB_PATH"

      - name: Run lintro quality checks
        id: lintro
        shell: bash
        run: |
          # Use pipefail to capture lintro exit code through the pipe
          # tee failures are intentionally ignored (PIPESTATUS[0] captures lintro)
          set -o pipefail
          set +e
          lintro chk 2>&1 | tee chk-output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          echo "exit-code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          exit "$EXIT_CODE"

      - name: Upload linting report
        if: always()
        # Pinned to SHA for supply chain security
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: linting-report
          path: |
            .lintro/
            chk-output.txt
          retention-days: 7
          if-no-files-found: ignore

  comment-lint:
    name: PR Lint Comment
    runs-on: ubuntu-latest
    needs: quality
    if: always() && github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Harden Runner
        # Pinned to SHA for supply chain security
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout repository
        # Pinned to SHA for supply chain security
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download linting report
        id: download
        # Pinned to SHA for supply chain security
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        continue-on-error: true
        with:
          name: linting-report
          path: .

      - name: Generate PR comment
        if: steps.download.outcome == 'success'
        shell: bash
        env:
          LINTRO_OUTPUT: chk-output.txt
          LINTRO_EXIT_CODE: ${{ needs.quality.outputs.exit-code }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
        run: bash scripts/ci/actions/generate-lintro-comment.sh > pr-comment.md

      - name: Post PR comment
        if: steps.download.outcome == 'success'
        uses: ./.github/actions/post-pr-comment
        with:
          file: pr-comment.md
          marker: lintro-report

  shell-tests:
    name: Shell Library Tests
    uses: ./.github/workflows/reusable-test-shell.yml
    permissions:
      contents: read
      pull-requests: write
    with:
      test-path: tests/bats
      coverage: true
      coverage-threshold: 84
      upload-coverage: true
      is-pr: ${{ github.event_name == 'pull_request' }}
