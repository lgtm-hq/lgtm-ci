---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Lintro Quality Checks
    runs-on: ubuntu-latest
    container:
      # Pinned to SHA for supply chain security
      image: ghcr.io/lgtm-hq/py-lintro@sha256:1be4acd3590a0dd9c672699866f22aaca73b9612a134d30c60441bc4ad89a206
      # Run as root to avoid permission issues with GitHub Actions file commands
      options: --user 0
    outputs:
      exit-code: ${{ steps.lintro.outputs.exit-code }}

    steps:
      - name: Checkout repository
        # Pinned to SHA for supply chain security
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Add lintro to PATH
        shell: bash
        run: echo "/app/.venv/bin" >> "$GITHUB_PATH"

      - name: Run lintro quality checks
        id: lintro
        shell: bash
        run: |
          # Use pipefail to capture lintro exit code through the pipe
          # tee failures are intentionally ignored (PIPESTATUS[0] captures lintro)
          set -o pipefail
          set +e
          lintro chk 2>&1 | tee chk-output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          echo "exit-code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          exit "$EXIT_CODE"

      - name: Upload linting report
        if: always()
        # Pinned to SHA for supply chain security
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: linting-report
          path: |
            .lintro/
            chk-output.txt
          retention-days: 7
          if-no-files-found: ignore

  comment-lint:
    name: PR Lint Comment
    runs-on: ubuntu-latest
    needs: quality
    if: always() && github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Harden Runner
        # Pinned to SHA for supply chain security
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0 # v2.12.0
        with:
          egress-policy: audit

      - name: Checkout repository
        # Pinned to SHA for supply chain security
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Download linting report
        id: download
        # Pinned to SHA for supply chain security
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        continue-on-error: true
        with:
          name: linting-report
          path: .

      - name: Generate PR comment
        if: steps.download.outcome == 'success'
        shell: bash
        env:
          LINTRO_OUTPUT: chk-output.txt
          LINTRO_EXIT_CODE: ${{ needs.quality.outputs.exit-code }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
        run: bash scripts/ci/actions/generate-lintro-comment.sh > pr-comment.md

      - name: Post PR comment
        if: steps.download.outcome == 'success'
        uses: ./.github/actions/post-pr-comment
        with:
          file: pr-comment.md
          marker: lintro-report

  shell-tests:
    name: Shell Library Tests
    uses: ./.github/workflows/reusable-test-shell.yml
    permissions:
      contents: read
      pull-requests: write
    with:
      test-path: tests/bats
      coverage: true
      coverage-threshold: 84
      upload-coverage: true
      is-pr: ${{ github.event_name == 'pull_request' }}
