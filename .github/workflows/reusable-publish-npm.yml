---
name: Reusable npm Publishing Workflow

on:
  workflow_call:
    inputs:
      node-version:
        description: >-
          Node.js version for publish (default 24). Trusted publishing needs
          npm ≥ 11.5.1; Node 24 ships a compatible npm. Do not self-upgrade
          npm with `npm install -g npm`.
        required: false
        type: string
        default: "24"
      dist-tag:
        description: "npm dist-tag (latest, beta, next, etc.)"
        required: false
        type: string
        default: "latest"
      provenance:
        description: >-
          Pass --provenance on publish (explicit intent). Under OIDC trusted
          publishing provenance is also automatic.
        required: false
        type: boolean
        default: true
      access:
        description: "Package access level (public, restricted)"
        required: false
        type: string
        default: "public"
      dry-run:
        description: "Build and pack only, do not publish"
        required: false
        type: boolean
        default: false
      working-directory:
        description: "Working directory containing the package"
        required: false
        type: string
        default: "."
      tooling-ref:
        description: "Git ref to use when checking out lgtm-ci tooling scripts"
        required: false
        type: string
        default: ""
      egress-policy:
        description: "harden-runner egress policy (audit or block)"
        required: false
        type: string
        default: "block"
      allowed-endpoints:
        description: "Allowed endpoints when egress-policy is block"
        required: false
        type: string
        default: ""

      allowed-endpoints-mode:
        description: >-
          replace: non-empty allowed-endpoints overrides egress-preset; append:
          merges preset with allowed-endpoints (deduped, first-seen wins)
        required: false
        type: string
        default: "replace"

      egress-preset:
        description: >-
          Named allowlist when allowed-endpoints is empty and egress-policy is
          block (github-minimal, github-pages, github-tooling, docker, playwright, pypi,
          rubygems, npm-publish, quality, sbom, scorecard)
        required: false
        type: string
        default: "npm-publish"
      job-name:
        description: "GitHub check name for the publish job"
        required: false
        type: string
        default: "Publish to npm"

      timeout-minutes:
        description: "Job timeout in minutes"
        required: false
        type: number
        default: 15

    secrets:
      npm-token:
        description: >-
          Optional legacy npm token (NODE_AUTH_TOKEN). Omit for OIDC trusted
          publishing (preferred).
        required: false

    outputs:
      published:
        description: "Whether the package was published"
        value: ${{ jobs.publish.outputs.published }}
      version:
        description: "Published package version"
        value: ${{ jobs.publish.outputs.version }}
      package-name:
        description: "Published package name"
        value: ${{ jobs.publish.outputs.package-name }}
      tarball:
        description: "Path to the built tarball"
        value: ${{ jobs.publish.outputs.tarball }}

jobs:
  publish:
    name: ${{ inputs.job-name }}
    # CRITICAL: Must use GitHub-hosted runner for provenance attestation
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: read
      id-token: write
      attestations: write

    outputs:
      published: ${{ steps.npm.outputs.published || 'false' }}
      version: ${{ steps.npm.outputs.version }}
      package-name: ${{ steps.npm.outputs.package-name }}
      tarball: ${{ steps.npm.outputs.tarball }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Checkout lgtm-ci tooling
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: ${{ inputs.tooling-ref != '' && inputs.tooling-ref || github.workflow_sha }}
          sparse-checkout: |
            .github/actions/checkout-and-harden
          sparse-checkout-cone-mode: true
          persist-credentials: false

      - name: Checkout and harden
        id: egress
        uses: ./.lgtm-ci-tooling/.github/actions/checkout-and-harden
        with:
          tooling-ref: ${{ inputs.tooling-ref }}
          egress-policy: ${{ inputs.egress-policy }}
          egress-preset: ${{ inputs.egress-preset }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}
          allowed-endpoints-mode: ${{ inputs.allowed-endpoints-mode }}
          sparse-checkout-extra: |
            .github/actions/
            scripts/ci/

      - name: Set up Node.js
        # Node 24 ships npm ≥ 11.5.1 (required for OIDC trusted publishing).
        # Do not run `npm install -g npm`: in-place self-upgrade corrupts the
        # toolcache and breaks `npm publish --provenance` (missing sigstore).
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ inputs.node-version }}
          registry-url: https://registry.npmjs.org

      - name: Publish to npm
        id: npm
        uses: ./.lgtm-ci-tooling/.github/actions/publish-npm
        with:
          dist-tag: ${{ inputs.dist-tag }}
          provenance: ${{ inputs.provenance }}
          access: ${{ inputs.access }}
          dry-run: ${{ inputs.dry-run }}
          working-directory: ${{ inputs.working-directory }}
          npm-token: ${{ secrets.npm-token }}

      - name: Attest build provenance
        if: inputs.dry-run == false && inputs.provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: >-
            ${{ inputs.working-directory }}/${{ steps.npm.outputs.tarball }}
