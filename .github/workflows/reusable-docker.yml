---
name: Reusable Docker Build and Push

on:
  workflow_call:
    inputs:
      context:
        description: "Build context path"
        required: false
        type: string
        default: "."
      file:
        description: "Path to Dockerfile"
        required: false
        type: string
        default: "Dockerfile"
      platforms:
        description: "Target platforms (comma-separated)"
        required: false
        type: string
        default: "linux/amd64,linux/arm64"
      registry:
        description: "Container registry URL"
        required: false
        type: string
        default: "ghcr.io"
      image-name:
        description: "Image name (default: github.repository)"
        required: false
        type: string
        default: ""
      tags:
        description: "Additional tags (comma-separated)"
        required: false
        type: string
        default: ""
      version:
        description: "Version for semver tags"
        required: false
        type: string
        default: ""
      push:
        description: "Push image to registry"
        required: false
        type: boolean
        default: false
      provenance:
        description: "Generate provenance attestation"
        required: false
        type: boolean
        default: true
      sbom:
        description: "Generate SBOM attestation"
        required: false
        type: boolean
        default: true
      scan:
        description: "Run vulnerability scan"
        required: false
        type: boolean
        default: false
      build-args:
        description: "Build arguments (comma-separated key=value)"
        required: false
        type: string
        default: ""

    outputs:
      tags:
        description: "Generated image tags"
        value: ${{ jobs.build.outputs.tags }}
      digest:
        description: "Image digest"
        value: ${{ jobs.build.outputs.digest }}

    secrets:
      DOCKERHUB_USERNAME:
        required: false
        description: "Docker Hub username (for docker.io registry)"
      DOCKERHUB_TOKEN:
        required: false
        description: "Docker Hub token (for docker.io registry)"

jobs:
  build:
    name: Build and Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    outputs:
      tags: ${{ steps.build.outputs.tags }}
      digest: ${{ steps.metadata.outputs.digest }}

    steps:
      - name: Harden runner
        # Pinned to SHA for supply chain security
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Checkout repository
        # Pinned to SHA for supply chain security
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Setup QEMU
        # Pinned to SHA for supply chain security
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Setup Docker Buildx
        # Pinned to SHA for supply chain security
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Login to GHCR
        if: inputs.push && inputs.registry == 'ghcr.io'
        # Pinned to SHA for supply chain security
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: inputs.push && inputs.registry == 'docker.io'
        # Pinned to SHA for supply chain security
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Parse additional tags
        id: extra-tags
        if: inputs.tags != ''
        shell: bash
        env:
          STEP: parse-tags
          INPUT_TAGS: ${{ inputs.tags }}
        run: ./scripts/ci/actions/build-docker.sh

      - name: Extract metadata
        id: meta
        # Pinned to SHA for supply chain security
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: |
            ${{ inputs.registry }}/${{ inputs.image-name || github.repository }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}},value=${{ inputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ inputs.version }}
            type=semver,pattern={{major}},value=${{ inputs.version }}
            type=raw,value=latest,enable=${{ inputs.version != '' }}
            ${{ steps.extra-tags.outputs.tags }}

      - name: Build and push
        id: build
        # Pinned to SHA for supply chain security
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.file }}
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ inputs.build-args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: ${{ inputs.provenance }}
          sbom: ${{ inputs.sbom }}

      - name: Extract digest
        id: metadata
        if: inputs.push
        shell: bash
        run: |
          echo "digest=${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT"

      - name: Generate artifact attestation
        if: inputs.push && inputs.provenance
        # Pinned to SHA for supply chain security
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-name: ${{ inputs.registry }}/${{ inputs.image-name || github.repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  scan:
    name: Vulnerability Scan
    needs: build
    if: inputs.scan && inputs.push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Run Trivy vulnerability scanner
        # Pinned to SHA for supply chain security
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref:
            ${{ inputs.registry }}/${{ inputs.image-name || github.repository }}@${{
            needs.build.outputs.digest }}
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"

      - name: Upload Trivy scan results
        # Pinned to SHA for supply chain security
        uses: github/codeql-action/upload-sarif@5c8a8a642e79153f5d047b10ec1cba1d1cc65699 # v3.35.1
        with:
          sarif_file: "trivy-results.sarif"
