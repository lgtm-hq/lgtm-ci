---
name: Reusable Docker Build and Push

# Caller repos only need to pin this workflow; all shared shell scripts are
# resolved from lgtm-ci via a cross-repo checkout (same pattern as
# reusable-release-auto-tag.yml).  No vendored scripts/ci tree is required
# in the caller repository.

on:
  workflow_call:
    inputs:
      context:
        description: "Build context path"
        required: false
        type: string
        default: "."
      file:
        description: "Path to Dockerfile"
        required: false
        type: string
        default: "Dockerfile"
      platforms:
        description: "Target platforms (comma-separated)"
        required: false
        type: string
        default: "linux/amd64,linux/arm64"
      registry:
        description: "Container registry URL"
        required: false
        type: string
        default: "ghcr.io"
      image-name:
        description: "Image name (default: github.repository)"
        required: false
        type: string
        default: ""
      tags:
        description: "Additional tags (comma-separated)"
        required: false
        type: string
        default: ""
      version:
        description: "Version for semver tags"
        required: false
        type: string
        default: ""
      push:
        description: "Push image to registry"
        required: false
        type: boolean
        default: false
      provenance:
        description: "Generate provenance attestation"
        required: false
        type: boolean
        default: true
      sbom:
        description: "Generate SBOM attestation"
        required: false
        type: boolean
        default: true
      scan:
        description: "Run vulnerability scan"
        required: false
        type: boolean
        default: false
      build-args:
        description: "Build arguments (comma-separated key=value)"
        required: false
        type: string
        default: ""
      target:
        description: "Docker build target stage (e.g. 'full', 'base')"
        required: false
        type: string
        default: ""
      runner-map:
        description: >-
          JSON object mapping platform to runner label.
          Platforms not in the map default to ubuntu-24.04 with QEMU.
          Example: {"linux/arm64":"ubuntu-24.04-arm"}
        required: false
        type: string
        default: "{}"
      smoke-test:
        description: >-
          Shorthand command + args to run inside each per-platform staging
          image. Executed as `docker run --rm --platform <p> <image> <smoke-test>`.
          Good for trivial checks like `--version`. Word-split; values with
          spaces or shell metacharacters need `smoke-test-script` instead.
          Mutually exclusive with `smoke-test-script`. Skipped when both empty.
          Only applies to the split per-platform path (multi-arch push).
        required: false
        type: string
        default: ""
      smoke-test-script:
        description: >-
          Path (relative to checkout root) to a caller-owned script. Executed
          on the runner with env `IMAGE`, `PLATFORM`, `REGISTRY`. The script
          owns the `docker run` invocation — full control over flags, env,
          network, tmpfs, etc. Preferred over `smoke-test` for anything
          beyond a bare command. Mutually exclusive with `smoke-test`.
          Any failing platform blocks the entire manifest merge.
        required: false
        type: string
        default: ""
      validate-on-pr:
        description: >-
          When true AND push is false, use the split per-platform path (native
          runners) without pushing staging images. Enables full Dockerfile
          validation on PRs without QEMU overhead.
        required: false
        type: boolean
        default: false
      scan-exit-code:
        description: >-
          Exit code for Trivy when findings match severity filter. Set to "1"
          to fail the workflow on CRITICAL/HIGH CVEs. Set to "0" for
          advisory-only SARIF upload.
        required: false
        type: string
        default: "0"
      cache-registry-ref:
        description: >-
          Registry reference for cache fallback (e.g. ghcr.io/org/repo:cache).
          When set, adds type=registry as a secondary cache-from source and
          writes to it on push events. GHA cache remains primary. Per-platform
          scope is appended automatically (-amd64, -arm64).
        required: false
        type: string
        default: ""
      cosign-sign:
        description: >-
          Sign the final image manifest with Sigstore Cosign (keyless OIDC).
          Requires id-token: write permission in caller. Only runs when push
          is true and a digest is available.
        required: false
        type: boolean
        default: false
      no-cache:
        description: >-
          Disable build cache entirely. Use for release builds to ensure fully
          reproducible images. When true, cache-from and cache-to are omitted.
        required: false
        type: boolean
        default: false
      tooling-ref:
        # yamllint disable-line rule:line-length
        description: "Git ref for lgtm-ci tooling checkout. Defaults to the reusable workflow commit."
        required: false
        type: string
        default: ""

      egress-policy:
        description: "harden-runner egress policy (audit or block)"
        required: false
        type: string
        default: "block"
      allowed-endpoints:
        description: "Allowed endpoints when egress-policy is block"
        required: false
        type: string
        default: ""

      egress-preset:
        description: >-
          Named allowlist when allowed-endpoints is empty and egress-policy is
          block (github-minimal, github-pages, github-tooling, docker, playwright, pypi,
          rubygems, npm-publish, quality, sbom, scorecard)
        required: false
        type: string
        default: "docker"

    outputs:
      tags:
        description: "Generated image tags"
        value: ${{ jobs.build.outputs.tags || jobs.merge.outputs.tags }}
      digest:
        description: "Image digest"
        value: ${{ jobs.build.outputs.digest || jobs.merge.outputs.digest }}

    secrets:
      DOCKERHUB_USERNAME:
        required: false
        description: "Docker Hub username (for docker.io registry)"
      DOCKERHUB_TOKEN:
        required: false
        description: "Docker Hub token (for docker.io registry)"

jobs:
  # Classify platforms and determine build strategy.
  # Outputs use-split=true and a per-platform matrix when push or validate-on-pr
  # is enabled and two or more platforms are requested; otherwise use-split=false.
  classify:
    name: Classify Platforms
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      use-split: ${{ steps.classify.outputs.use-split }}
      matrix: ${{ steps.classify.outputs.matrix }}
      tooling-ref: ${{ steps.tooling.outputs.ref }}
      tooling-repository: ${{ steps.tooling.outputs.repository }}

    steps:
      - name: Checkout repository
        # Pinned to SHA for supply chain security
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Harden runner
        # yamllint disable-line rule:line-length
        uses: ./.github/actions/harden-runner
        with:
          egress-policy: ${{ inputs.egress-policy }}
          egress-preset: ${{ inputs.egress-preset }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}
      - name: Resolve tooling ref
        id: tooling
        shell: bash
        env:
          TOOLING_REF: ${{ inputs.tooling-ref }}
          JOB_CONTEXT: ${{ toJson(job) }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys

          try:
              job_context = json.loads(os.environ["JOB_CONTEXT"])
              workflow_sha = job_context["workflow_sha"]
              workflow_repository = job_context["workflow_repository"]
              github_output = os.environ["GITHUB_OUTPUT"]
          except KeyError as exc:
              print(f"Missing required workflow context key: {exc}", file=sys.stderr)
              sys.exit(1)
          except json.JSONDecodeError as exc:
              print(f"Invalid JOB_CONTEXT JSON: {exc}", file=sys.stderr)
              sys.exit(1)

          tooling_ref = os.environ.get("TOOLING_REF", "")
          ref = tooling_ref if tooling_ref else workflow_sha

          with open(github_output, "a", encoding="utf-8") as output:
              output.write(f"ref={ref}\n")
              output.write(f"repository={workflow_repository}\n")
          PY

      - name: Checkout lgtm-ci tooling
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ steps.tooling.outputs.repository }}
          path: .lgtm-ci-tooling
          ref: ${{ steps.tooling.outputs.ref }}
          sparse-checkout: scripts/ci/
          sparse-checkout-cone-mode: true
          persist-credentials: false

      - name: Classify platforms
        id: classify
        shell: bash
        env:
          STEP: classify
          PLATFORMS: ${{ inputs.platforms }}
          PUSH: ${{ inputs.push }}
          VALIDATE_ON_PR: ${{ inputs.validate-on-pr }}
          RUNNER_MAP: ${{ inputs.runner-map }}
          SMOKE_TEST: ${{ inputs.smoke-test }}
          SMOKE_TEST_SCRIPT: ${{ inputs.smoke-test-script }}
        run: .lgtm-ci-tooling/scripts/ci/actions/build-docker.sh

  # Single-platform builds, or multi-platform when push is disabled (QEMU fallback)
  build:
    name: Build and Push
    needs: classify
    if: ${{ needs.classify.outputs.use-split == 'false' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      security-events: write

    outputs:
      tags: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.metadata.outputs.digest }}

    steps:
      - name: Checkout repository
        # Pinned to SHA for supply chain security
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Harden runner
        # yamllint disable-line rule:line-length
        uses: ./.github/actions/harden-runner
        with:
          egress-policy: ${{ inputs.egress-policy }}
          egress-preset: ${{ inputs.egress-preset }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}
      - name: Checkout lgtm-ci tooling
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ needs.classify.outputs.tooling-repository }}
          path: .lgtm-ci-tooling
          ref: ${{ needs.classify.outputs.tooling-ref }}
          sparse-checkout: scripts/ci/
          sparse-checkout-cone-mode: true
          persist-credentials: false

      - name: Setup QEMU
        # Pinned to SHA for supply chain security
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Setup Docker Buildx
        # Pinned to SHA for supply chain security
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Validate registry
        if: inputs.push
        shell: bash
        env:
          STEP: validate
          REGISTRY: ${{ inputs.registry }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: .lgtm-ci-tooling/scripts/ci/actions/docker-login.sh

      - name: Login to GHCR
        if: inputs.push && inputs.registry == 'ghcr.io'
        # Pinned to SHA for supply chain security
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Login to Docker Hub
        if: inputs.push && inputs.registry == 'docker.io'
        # Pinned to SHA for supply chain security
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Parse additional tags
        id: extra-tags
        if: inputs.tags != ''
        shell: bash
        env:
          STEP: parse-tags
          INPUT_TAGS: ${{ inputs.tags }}
        run: .lgtm-ci-tooling/scripts/ci/actions/build-docker.sh

      - name: Extract metadata
        id: meta
        # Pinned to SHA for supply chain security
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: |
            ${{ inputs.registry }}/${{ inputs.image-name || github.repository }}
          # yamllint disable rule:line-length
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}},value=${{ inputs.version }},enable=${{ inputs.version != '' }}
            type=semver,pattern={{major}}.{{minor}},value=${{ inputs.version }},enable=${{ inputs.version != '' }}
            type=semver,pattern={{major}},value=${{ inputs.version }},enable=${{ inputs.version != '' }}
            type=raw,value=latest,enable=${{ inputs.version != '' }}
            ${{ steps.extra-tags.outputs.tags }}
          # yamllint enable rule:line-length

      - name: Build and push
        id: build
        # Pinned to SHA for supply chain security
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.file }}
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.push }}
          load: ${{ inputs.push == false && (inputs.validate-on-pr || inputs.scan) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ inputs.build-args }}
          target: ${{ inputs.target }}
          # yamllint disable rule:line-length
          cache-from: |
            ${{ inputs.no-cache == false && 'type=gha' || '' }}
            ${{ inputs.no-cache == false && inputs.cache-registry-ref != '' && format('type=registry,ref={0}', inputs.cache-registry-ref) || '' }}
          cache-to: |
            ${{ inputs.no-cache == false && 'type=gha,mode=max' || '' }}
            ${{ inputs.no-cache == false && inputs.cache-registry-ref != '' && inputs.push && format('type=registry,ref={0},mode=max', inputs.cache-registry-ref) || '' }}
          # yamllint enable rule:line-length
          provenance: ${{ inputs.provenance && inputs.push }}
          sbom: ${{ inputs.sbom && inputs.push }}

      - name: Extract digest
        id: metadata
        if: inputs.push || inputs.validate-on-pr
        shell: bash
        env:
          STEP: set-output-digest
          DIGEST: ${{ steps.build.outputs.digest }}
        run: .lgtm-ci-tooling/scripts/ci/actions/build-docker.sh

      - name: Resolve local image for scan
        if: inputs.scan && inputs.push == false
        id: local-scan-image
        shell: bash
        env:
          STEP: resolve-local-scan-image
          TAGS: ${{ steps.meta.outputs.tags }}
        run: .lgtm-ci-tooling/scripts/ci/actions/build-docker.sh

      - name: Run Trivy vulnerability scanner
        if: inputs.scan && inputs.push == false
        # Pinned to SHA for supply chain security
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.local-scan-image.outputs.ref }}
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: ${{ inputs.scan-exit-code }}

      - name: Upload Trivy scan results
        if: always() && inputs.scan && inputs.push == false
        # Pinned to SHA for supply chain security
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          sarif_file: "trivy-results.sarif"

      - name: Generate artifact attestation
        if: inputs.push && inputs.provenance
        # Pinned to SHA for supply chain security
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ inputs.registry }}/${{ inputs.image-name || github.repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Install Cosign
        if: inputs.push && inputs.cosign-sign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image
        if: inputs.push && inputs.cosign-sign
        shell: bash
        env:
          STEP: sign-image
          DIGEST: ${{ steps.build.outputs.digest }}
          REGISTRY: ${{ inputs.registry }}
          IMAGE_NAME: ${{ inputs.image-name || github.repository }}
        run: .lgtm-ci-tooling/scripts/ci/actions/build-docker.sh

      - name: Build summary
        if: always()
        shell: bash
        env:
          STEP: summary
          REGISTRY: ${{ inputs.registry }}
          IMAGE_NAME: ${{ inputs.image-name || github.repository }}
          TAGS: ${{ steps.meta.outputs.tags }}
          PLATFORMS: ${{ inputs.platforms }}
          PUSH: ${{ inputs.push }}
          DIGEST: ${{ steps.metadata.outputs.digest || '' }}
          COSIGN_SIGNED: ${{ inputs.cosign-sign && inputs.push }}
          SCAN_ENABLED: ${{ inputs.scan }}
        run: .lgtm-ci-tooling/scripts/ci/actions/build-docker.sh

  # Per-platform native build leg (multi-arch split path).
  # One matrix entry per platform; runner and QEMU config resolved by classify.
  build-per-platform:
    name: Docker build per platform
    needs: classify
    if: ${{ needs.classify.outputs.use-split == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.classify.outputs.matrix) }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - name: Checkout repository
        # Pinned to SHA for supply chain security
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Harden runner
        # yamllint disable-line rule:line-length
        uses: ./.github/actions/harden-runner
        with:
          egress-policy: ${{ inputs.egress-policy }}
          egress-preset: ${{ inputs.egress-preset }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}
      - name: Checkout lgtm-ci tooling
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ needs.classify.outputs.tooling-repository }}
          path: .lgtm-ci-tooling
          ref: ${{ needs.classify.outputs.tooling-ref }}
          sparse-checkout: scripts/ci/
          sparse-checkout-cone-mode: true
          persist-credentials: false

      - name: Setup QEMU
        if: ${{ matrix.qemu }}
        # Pinned to SHA for supply chain security
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Setup Docker Buildx
        # Pinned to SHA for supply chain security
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Validate registry
        if: inputs.push
        shell: bash
        env:
          STEP: validate
          REGISTRY: ${{ inputs.registry }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: .lgtm-ci-tooling/scripts/ci/actions/docker-login.sh

      - name: Login to GHCR
        if: inputs.push && inputs.registry == 'ghcr.io'
        # Pinned to SHA for supply chain security
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Login to Docker Hub
        if: inputs.push && inputs.registry == 'docker.io'
        # Pinned to SHA for supply chain security
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        # Pinned to SHA for supply chain security
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: |
            ${{ inputs.registry }}/${{ inputs.image-name || github.repository }}
          # yamllint disable rule:line-length
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}},value=${{ inputs.version }},enable=${{ inputs.version != '' }}
            type=semver,pattern={{major}}.{{minor}},value=${{ inputs.version }},enable=${{ inputs.version != '' }}
            type=semver,pattern={{major}},value=${{ inputs.version }},enable=${{ inputs.version != '' }}
            type=raw,value=latest,enable=${{ inputs.version != '' }}
          # yamllint enable rule:line-length

      - name: Build and push (${{ matrix.platform }})
        id: build
        # Pinned to SHA for supply chain security
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.file }}
          platforms: ${{ matrix.platform }}
          push: ${{ inputs.push }}
          load: ${{ inputs.push == false && (inputs.validate-on-pr || inputs.scan) }}
          # yamllint disable rule:line-length
          tags: >-
            ${{ inputs.push
              && format('{0}/{1}:build-{2}-{3}', inputs.registry, inputs.image-name || github.repository, github.run_id, matrix.slug)
              || format('{0}/{1}:validate-{2}', inputs.registry, inputs.image-name || github.repository, matrix.slug) }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ inputs.build-args }}
          target: ${{ inputs.target }}
          cache-from: |
            ${{ inputs.no-cache == false && format('type=gha,scope={0}', matrix.slug) || '' }}
            ${{ inputs.no-cache == false && inputs.cache-registry-ref != '' && format('type=registry,ref={0}-{1}', inputs.cache-registry-ref, matrix.slug) || '' }}
          cache-to: |
            ${{ inputs.no-cache == false && format('type=gha,mode=max,scope={0}', matrix.slug) || '' }}
            ${{ inputs.no-cache == false && inputs.cache-registry-ref != '' && inputs.push && format('type=registry,ref={0}-{1},mode=max', inputs.cache-registry-ref, matrix.slug) || '' }}
          # yamllint enable rule:line-length
          provenance: false
          sbom: ${{ inputs.sbom && inputs.push }}

      - name: Record staging digest
        shell: bash
        env:
          STEP: record-digest
          DIGEST: ${{ steps.build.outputs.digest }}
          DIGEST_FILE: ${{ runner.temp }}/staging-digest/digest.txt
        run: .lgtm-ci-tooling/scripts/ci/actions/build-docker.sh

      - name: Smoke test (${{ matrix.platform }})
        if: >-
          inputs.validate-on-pr && inputs.push == false &&
          (inputs.smoke-test != '' || inputs.smoke-test-script != '')
        shell: bash
        env:
          STEP: smoke-test-local
          REGISTRY: ${{ inputs.registry }}
          IMAGE: >-
            ${{ inputs.registry }}/${{ inputs.image-name || github.repository }}:validate-${{
            matrix.slug }}
          PLATFORM: ${{ matrix.platform }}
          SMOKE_TEST: ${{ inputs.smoke-test }}
          SMOKE_TEST_SCRIPT: ${{ inputs.smoke-test-script }}
        run: .lgtm-ci-tooling/scripts/ci/actions/build-docker.sh

      - name: Run Trivy vulnerability scanner (${{ matrix.platform }})
        if: inputs.scan && inputs.push == false
        # Pinned to SHA for supply chain security
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: >-
            ${{ inputs.registry }}/${{ inputs.image-name || github.repository }}:validate-${{
            matrix.slug }}
          format: "sarif"
          output: "trivy-results-${{ matrix.slug }}.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: ${{ inputs.scan-exit-code }}

      - name: Upload Trivy scan results (${{ matrix.platform }})
        if: always() && inputs.scan && inputs.push == false
        # Pinned to SHA for supply chain security
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          sarif_file: "trivy-results-${{ matrix.slug }}.sarif"
          category: "trivy-${{ matrix.slug }}"

      - name: Upload staging digest
        if: inputs.push
        # Pinned to SHA for supply chain security
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: staging-digest-${{ matrix.slug }}
          path: ${{ runner.temp }}/staging-digest/digest.txt
          if-no-files-found: error
          retention-days: 1

  # Optional per-platform smoke test gate (push path only).
  # Runs against each staging image on its native runner before manifest
  # merge. PR validation smoke tests and Trivy scans run inline in
  # build-per-platform because locally-loaded images are not available
  # across job boundaries.
  # Two modes:
  #   - smoke-test (shorthand): `docker run --rm --platform <p> <image> <cmd>`
  #   - smoke-test-script: caller-owned script with env IMAGE/PLATFORM/REGISTRY
  verify-per-platform:
    name: Docker verify per platform
    needs: [classify, build-per-platform]
    if: >-
      needs.classify.outputs.use-split == 'true' &&
      inputs.push &&
      (inputs.smoke-test != '' || inputs.smoke-test-script != '')
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.classify.outputs.matrix) }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository (for smoke-test-script)
        # Pinned to SHA for supply chain security
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Harden runner
        # yamllint disable-line rule:line-length
        uses: ./.github/actions/harden-runner
        with:
          egress-policy: ${{ inputs.egress-policy }}
          egress-preset: ${{ inputs.egress-preset }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}
      - name: Checkout lgtm-ci tooling
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ needs.classify.outputs.tooling-repository }}
          path: .lgtm-ci-tooling
          ref: ${{ needs.classify.outputs.tooling-ref }}
          sparse-checkout: scripts/ci/
          sparse-checkout-cone-mode: true
          persist-credentials: false

      - name: Setup QEMU
        if: ${{ matrix.qemu }}
        # Pinned to SHA for supply chain security
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Validate registry
        if: inputs.push
        shell: bash
        env:
          STEP: validate
          REGISTRY: ${{ inputs.registry }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: .lgtm-ci-tooling/scripts/ci/actions/docker-login.sh

      - name: Login to GHCR
        if: inputs.push && inputs.registry == 'ghcr.io'
        # Pinned to SHA for supply chain security
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Login to Docker Hub
        if: inputs.push && inputs.registry == 'docker.io'
        # Pinned to SHA for supply chain security
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Download staging digest
        if: inputs.push
        # Pinned to SHA for supply chain security
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: staging-digest-${{ matrix.slug }}
          path: ${{ runner.temp }}/staging-digest

      - name: Smoke test (${{ matrix.platform }})
        shell: bash
        env:
          STEP: smoke-test
          REGISTRY: ${{ inputs.registry }}
          IMAGE_NAME: ${{ inputs.image-name || github.repository }}
          DIGEST_FILE: ${{ runner.temp }}/staging-digest/digest.txt
          PLATFORM: ${{ matrix.platform }}
          SMOKE_TEST: ${{ inputs.smoke-test }}
          SMOKE_TEST_SCRIPT: ${{ inputs.smoke-test-script }}
        run: .lgtm-ci-tooling/scripts/ci/actions/build-docker.sh

  # Assemble multi-arch manifest from per-platform staging images
  merge:
    name: Merge Manifests
    needs: [classify, build-per-platform, verify-per-platform]
    if: >-
      always() &&
      inputs.push &&
      needs.classify.outputs.use-split == 'true' &&
      needs.build-per-platform.result == 'success' &&
      (needs.verify-per-platform.result == 'success' ||
       needs.verify-per-platform.result == 'skipped')
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    outputs:
      tags: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.metadata.outputs.digest }}

    steps:
      - name: Checkout repository
        # Pinned to SHA for supply chain security
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Harden runner
        # yamllint disable-line rule:line-length
        uses: ./.github/actions/harden-runner
        with:
          egress-policy: ${{ inputs.egress-policy }}
          egress-preset: ${{ inputs.egress-preset }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}
      - name: Checkout lgtm-ci tooling
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ needs.classify.outputs.tooling-repository }}
          path: .lgtm-ci-tooling
          ref: ${{ needs.classify.outputs.tooling-ref }}
          sparse-checkout: scripts/ci/
          sparse-checkout-cone-mode: true
          persist-credentials: false

      - name: Setup Docker Buildx
        # Pinned to SHA for supply chain security
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Validate registry
        shell: bash
        env:
          STEP: validate
          REGISTRY: ${{ inputs.registry }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: .lgtm-ci-tooling/scripts/ci/actions/docker-login.sh

      - name: Login to GHCR
        if: inputs.registry == 'ghcr.io'
        # Pinned to SHA for supply chain security
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Login to Docker Hub
        if: inputs.registry == 'docker.io'
        # Pinned to SHA for supply chain security
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Parse additional tags
        id: extra-tags
        if: inputs.tags != ''
        shell: bash
        env:
          STEP: parse-tags
          INPUT_TAGS: ${{ inputs.tags }}
        run: .lgtm-ci-tooling/scripts/ci/actions/build-docker.sh

      - name: Extract metadata
        id: meta
        # Pinned to SHA for supply chain security
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: |
            ${{ inputs.registry }}/${{ inputs.image-name || github.repository }}
          # yamllint disable rule:line-length
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}},value=${{ inputs.version }},enable=${{ inputs.version != '' }}
            type=semver,pattern={{major}}.{{minor}},value=${{ inputs.version }},enable=${{ inputs.version != '' }}
            type=semver,pattern={{major}},value=${{ inputs.version }},enable=${{ inputs.version != '' }}
            type=raw,value=latest,enable=${{ inputs.version != '' }}
            ${{ steps.extra-tags.outputs.tags }}
          # yamllint enable rule:line-length

      - name: Create multi-arch manifest
        shell: bash
        env:
          STEP: merge-manifests
          MATRIX: ${{ needs.classify.outputs.matrix }}
          REGISTRY: ${{ inputs.registry }}
          IMAGE_NAME: ${{ inputs.image-name || github.repository }}
          RUN_ID: ${{ github.run_id }}
          TARGET_TAGS: ${{ steps.meta.outputs.tags }}
        run: .lgtm-ci-tooling/scripts/ci/actions/build-docker.sh

      - name: Extract digest
        id: metadata
        shell: bash
        env:
          STEP: metadata
          BUILT_TAGS: ${{ steps.meta.outputs.tags }}
        run: .lgtm-ci-tooling/scripts/ci/actions/build-docker.sh

      - name: Generate artifact attestation
        if: inputs.provenance
        # Pinned to SHA for supply chain security
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ inputs.registry }}/${{ inputs.image-name || github.repository }}
          subject-digest: ${{ steps.metadata.outputs.digest }}
          push-to-registry: true

      - name: Install Cosign
        if: inputs.cosign-sign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image
        if: inputs.cosign-sign
        shell: bash
        env:
          STEP: sign-image
          DIGEST: ${{ steps.metadata.outputs.digest }}
          REGISTRY: ${{ inputs.registry }}
          IMAGE_NAME: ${{ inputs.image-name || github.repository }}
        run: .lgtm-ci-tooling/scripts/ci/actions/build-docker.sh

      - name: Delete staging manifests
        if: always() && inputs.registry == 'ghcr.io'
        shell: bash
        env:
          STEP: cleanup-staging
          GH_TOKEN: ${{ github.token }}
          IMAGE_NAME: ${{ inputs.image-name || github.repository }}
          RUN_ID: ${{ github.run_id }}
          MATRIX: ${{ needs.classify.outputs.matrix }}
        run: .lgtm-ci-tooling/scripts/ci/actions/build-docker.sh

      - name: Build summary
        if: always()
        shell: bash
        env:
          STEP: summary
          REGISTRY: ${{ inputs.registry }}
          IMAGE_NAME: ${{ inputs.image-name || github.repository }}
          TAGS: ${{ steps.meta.outputs.tags }}
          PLATFORMS: ${{ inputs.platforms }}
          PUSH: ${{ inputs.push }}
          DIGEST: ${{ steps.metadata.outputs.digest || '' }}
          COSIGN_SIGNED: ${{ inputs.cosign-sign && inputs.push }}
          SCAN_ENABLED: ${{ inputs.scan }}
          MATRIX: ${{ needs.classify.outputs.matrix }}
        run: .lgtm-ci-tooling/scripts/ci/actions/build-docker.sh

  summary-validate:
    name: Validation Summary
    needs: [classify, build-per-platform, verify-per-platform]
    if: >-
      always() &&
      needs.classify.outputs.use-split == 'true' &&
      inputs.validate-on-pr &&
      inputs.push == false
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        # Pinned to SHA for supply chain security
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Harden runner
        # yamllint disable-line rule:line-length
        uses: ./.github/actions/harden-runner
        with:
          egress-policy: ${{ inputs.egress-policy }}
          egress-preset: ${{ inputs.egress-preset }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}

      - name: Checkout lgtm-ci tooling
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ needs.classify.outputs.tooling-repository }}
          path: .lgtm-ci-tooling
          ref: ${{ needs.classify.outputs.tooling-ref }}
          sparse-checkout: scripts/ci/
          sparse-checkout-cone-mode: true
          persist-credentials: false

      - name: Build summary
        if: always()
        shell: bash
        env:
          STEP: summary
          REGISTRY: ${{ inputs.registry }}
          IMAGE_NAME: ${{ inputs.image-name || github.repository }}
          PLATFORMS: ${{ inputs.platforms }}
          PUSH: ${{ inputs.push }}
          SCAN_ENABLED: ${{ inputs.scan }}
          VALIDATE_ON_PR: true
          MATRIX: ${{ needs.classify.outputs.matrix }}
        run: .lgtm-ci-tooling/scripts/ci/actions/build-docker.sh

  scan:
    name: Vulnerability Scan
    needs: [classify, build, merge]
    if: >-
      always() &&
      inputs.scan &&
      inputs.push &&
      (
        (needs.classify.outputs.use-split == 'false' && needs.build.result == 'success') ||
        (needs.classify.outputs.use-split == 'true' && needs.merge.result == 'success')
      )
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions/harden-runner
          sparse-checkout-cone-mode: true
          persist-credentials: false

      - name: Harden runner
        uses: ./.github/actions/harden-runner
        with:
          egress-policy: ${{ inputs.egress-policy }}
          egress-preset: ${{ inputs.egress-preset }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}

      - name: Run Trivy vulnerability scanner
        # Pinned to SHA for supply chain security
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: >-
            ${{ inputs.registry }}/${{ inputs.image-name || github.repository }}@${{
            needs.build.outputs.digest || needs.merge.outputs.digest }}
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: ${{ inputs.scan-exit-code }}

      - name: Upload Trivy scan results
        # Pinned to SHA for supply chain security
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          sarif_file: "trivy-results.sarif"
