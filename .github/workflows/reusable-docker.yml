---
name: Reusable Docker Build and Push

# Thin orchestrator kept for backwards compatibility (#381). The classify job
# resolves the build strategy, then delegates to the focused reusables:
#   - reusable-docker-build.yml          (use-split=false: single-platform or
#                                         QEMU multi-platform build+scan)
#   - reusable-docker-multiplatform.yml  (use-split=true: runner-map matrix,
#                                         manifest merge, signing)
# Consumers may keep calling this workflow unchanged, or migrate to the
# focused reusables directly — see docs/workflow-contract.md (runner-map
# section) for the migration path. reusable-docker-smoke-test.yml is a
# standalone image-validation reusable and is not called from here.
#
# Caller repos only need to pin this workflow; all shared shell scripts are
# resolved from lgtm-ci via a cross-repo checkout (same pattern as
# reusable-release-auto-tag.yml). No vendored scripts/ci tree is required
# in the caller repository.

on:
  workflow_call:
    inputs:
      context:
        description: "Build context path"
        required: false
        type: string
        default: "."
      file:
        description: "Path to Dockerfile"
        required: false
        type: string
        default: "Dockerfile"
      platforms:
        description: "Target platforms (comma-separated)"
        required: false
        type: string
        default: "linux/amd64,linux/arm64"
      registry:
        description: "Container registry URL"
        required: false
        type: string
        default: "ghcr.io"
      image-name:
        description: "Image name (default: github.repository)"
        required: false
        type: string
        default: ""
      tags:
        description: "Additional tags (comma-separated)"
        required: false
        type: string
        default: ""
      version:
        description: "Version for semver tags"
        required: false
        type: string
        default: ""
      source-ref:
        description: >-
          Git ref to check out for the build context (app source), independent
          of tooling-ref. Empty uses the triggering ref. Set for historical
          backfills (e.g. build an old tag's source from a main dispatch).
        required: false
        type: string
        default: ""
      tag-latest:
        description: >-
          Also apply the 'latest' tag when version is set. Set false for
          historical backfills so republishing an old version does not move
          'latest' backward.
        required: false
        type: boolean
        default: true
      exact-tags:
        description: >-
          Publish ONLY the pinned version tag (and its immutable by-digest
          sha), suppressing major/minor/latest/branch/sha-<ref> floating tags.
          For historical backfills so republishing an old version never drags
          shared floating tags backward.
        required: false
        type: boolean
        default: false
      push:
        description: "Push image to registry"
        required: false
        type: boolean
        default: false
      provenance:
        description: "Generate provenance attestation"
        required: false
        type: boolean
        default: true
      sbom:
        description: "Generate SBOM attestation"
        required: false
        type: boolean
        default: true
      scan:
        description: "Run vulnerability scan"
        required: false
        type: boolean
        default: false
      build-args:
        description: "Build arguments (comma-separated key=value)"
        required: false
        type: string
        default: ""
      target:
        description: "Docker build target stage (e.g. 'full', 'base')"
        required: false
        type: string
        default: ""
      runner-map:
        description: >-
          JSON object mapping platform to runner label.
          Platforms not in the map default to ubuntu-24.04 with QEMU.
          Example: {"linux/arm64":"ubuntu-24.04-arm"}
        required: false
        type: string
        default: "{}"
      smoke-test:
        description: >-
          Shorthand command + args to run inside each per-platform staging
          image. Executed as `docker run --rm --platform <p> <image> <smoke-test>`.
          Good for trivial checks like `--version`. Word-split; values with
          spaces or shell metacharacters need `smoke-test-script` instead.
          Mutually exclusive with `smoke-test-script`. Skipped when both empty.
          Only applies to the split per-platform path (multi-arch push).
        required: false
        type: string
        default: ""
      smoke-test-script:
        description: >-
          Path (relative to checkout root) to a caller-owned script. Executed
          on the runner with env `IMAGE`, `PLATFORM`, `REGISTRY`. The script
          owns the `docker run` invocation — full control over flags, env,
          network, tmpfs, etc. Preferred over `smoke-test` for anything
          beyond a bare command. Mutually exclusive with `smoke-test`.
          Any failing platform blocks the entire manifest merge.
        required: false
        type: string
        default: ""
      health-check-cmd:
        description: >-
          Optional command run on the runner against the published localhost
          port before publish, e.g. `curl -f http://127.0.0.1:8080/health`.
          Starts a detached container, waits for `health-check-port`, runs the
          command on the runner (not inside the image), then tears down. Requires
          `health-check-port`. When set with `push: true`, publish is gated on
          success. Skipped when empty (preserves current behavior).
        required: false
        type: string
        default: ""
      health-check-port:
        description: >-
          Container port to publish on 127.0.0.1 and wait for before running
          `health-check-cmd` on the runner. Required when `health-check-cmd`
          is set.
        required: false
        type: string
        default: ""
      health-check-timeout:
        description: >-
          Max wait time for `health-check-port` to accept connections before
          running `health-check-cmd` (e.g. 30s).
        required: false
        type: string
        default: "30s"
      validate-on-pr:
        description: >-
          When true AND push is false, use the split per-platform path (native
          runners) without pushing staging images. Enables full Dockerfile
          validation on PRs without QEMU overhead.
        required: false
        type: boolean
        default: false
      scan-exit-code:
        description: >-
          Exit code for Trivy when findings match severity filter. Set to "1"
          to fail the workflow on CRITICAL/HIGH CVEs. Set to "0" for
          advisory-only SARIF upload.
        required: false
        type: string
        default: "0"
      cache-registry-ref:
        description: >-
          Registry reference for cache fallback (e.g. ghcr.io/org/repo:cache).
          When set, adds type=registry as a secondary cache-from source and
          writes to it on push events. GHA cache remains primary. Per-platform
          scope is appended automatically (-amd64, -arm64).
        required: false
        type: string
        default: ""
      cosign-sign:
        description: >-
          Sign the final image manifest with Sigstore Cosign (keyless OIDC).
          Requires id-token: write permission in caller. Only runs when push
          is true and a digest is available.
        required: false
        type: boolean
        default: false
      no-cache:
        description: >-
          Disable build cache entirely. Use for release builds to ensure fully
          reproducible images. When true, cache-from and cache-to are omitted.
        required: false
        type: boolean
        default: false
      tooling-ref:
        # yamllint disable-line rule:line-length
        description: "Git ref for lgtm-ci tooling checkout. Defaults to the reusable workflow commit."
        required: false
        type: string
        default: ""

      egress-policy:
        description: "harden-runner egress policy (audit or block)"
        required: false
        type: string
        default: "block"
      allowed-endpoints:
        description: "Allowed endpoints when egress-policy is block"
        required: false
        type: string
        default: |
          github.com:443
          api.github.com:443
          codeload.github.com:443
          objects.githubusercontent.com:443
          raw.githubusercontent.com:443
          release-assets.githubusercontent.com:443
          github-releases.githubusercontent.com:443
          pipelines.actions.githubusercontent.com:443
          ghcr.io:443
          pkg-containers.githubusercontent.com:443
          docker.io:443
          registry-1.docker.io:443
          auth.docker.io:443
          production.cloudflare.docker.com:443
          production.cloudfront.docker.com:443
      allowed-endpoints-mode:
        description: >-
          replace: non-empty allowed-endpoints overrides egress-preset; append:
          merges preset with allowed-endpoints (deduped, first-seen wins)
        required: false
        type: string
        default: "replace"

      egress-preset:
        description: >-
          Named allowlist when allowed-endpoints is empty and egress-policy is
          block (github-minimal, github-pages, github-tooling, docker, playwright, pypi,
          rubygems, npm-publish, quality, sbom, scorecard)
        required: false
        type: string
        default: "docker"

      timeout-minutes:
        description: "Job timeout in minutes"
        required: false
        type: number
        default: 60

    outputs:
      tags:
        description: "Generated image tags"
        value: ${{ jobs.build.outputs.tags || jobs.multiplatform.outputs.tags }}
      digest:
        description: "Image digest"
        value: ${{ jobs.build.outputs.digest || jobs.multiplatform.outputs.digest }}

    secrets:
      DOCKERHUB_USERNAME:
        required: false
        description: "Docker Hub username (for docker.io registry)"
      DOCKERHUB_TOKEN:
        required: false
        description: "Docker Hub token (for docker.io registry)"

jobs:
  # Classify platforms and determine build strategy.
  # Outputs use-split=true and a per-platform matrix when push or validate-on-pr
  # is enabled and two or more platforms are requested; otherwise use-split=false.
  classify:
    name: Classify Platforms
    runs-on: ubuntu-24.04
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: read
    outputs:
      use-split: ${{ steps.classify.outputs.use-split }}
      matrix: ${{ steps.classify.outputs.matrix }}

    steps:
      - name: Harden runner
        # Pinned to SHA for supply chain security
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: ${{ inputs.egress-policy }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}
      - name: Checkout repository
        # Pinned to SHA for supply chain security
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # source-ref = build-context (app source); tooling-ref stays separate
          ref: ${{ inputs.source-ref != '' && inputs.source-ref || github.sha }}
          persist-credentials: false
      - name: Checkout lgtm-ci tooling
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: ${{ inputs.tooling-ref != '' && inputs.tooling-ref || github.workflow_sha }}
          sparse-checkout: |
            .github/actions/checkout-and-harden
          sparse-checkout-cone-mode: true
          persist-credentials: false
      - name: Checkout and harden
        id: egress
        uses: ./.lgtm-ci-tooling/.github/actions/checkout-and-harden
        with:
          tooling-ref: ${{ inputs.tooling-ref }}
          egress-policy: ${{ inputs.egress-policy }}
          egress-preset: ${{ inputs.egress-preset }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}
          allowed-endpoints-mode: ${{ inputs.allowed-endpoints-mode }}
          sparse-checkout-extra: |
            scripts/ci/
      - name: Classify platforms
        id: classify
        shell: bash
        env:
          STEP: classify
          PLATFORMS: ${{ inputs.platforms }}
          PUSH: ${{ inputs.push }}
          VALIDATE_ON_PR: ${{ inputs.validate-on-pr }}
          RUNNER_MAP: ${{ inputs.runner-map }}
          SMOKE_TEST: ${{ inputs.smoke-test }}
          SMOKE_TEST_SCRIPT: ${{ inputs.smoke-test-script }}
          HEALTH_CHECK_CMD: ${{ inputs.health-check-cmd }}
          HEALTH_CHECK_PORT: ${{ inputs.health-check-port }}
          HEALTH_CHECK_TIMEOUT: ${{ inputs.health-check-timeout }}
        run: .lgtm-ci-tooling/scripts/ci/actions/build-docker.sh
  # Single-platform builds, or multi-platform when push is disabled (QEMU
  # fallback). Delegated to the focused build reusable.
  build:
    name: Docker build
    needs: classify
    if: ${{ needs.classify.outputs.use-split == 'false' }}
    uses: ./.github/workflows/reusable-docker-build.yml
    with:
      context: ${{ inputs.context }}
      file: ${{ inputs.file }}
      platforms: ${{ inputs.platforms }}
      registry: ${{ inputs.registry }}
      image-name: ${{ inputs.image-name }}
      tags: ${{ inputs.tags }}
      version: ${{ inputs.version }}
      source-ref: ${{ inputs.source-ref }}
      tag-latest: ${{ inputs.tag-latest }}
      exact-tags: ${{ inputs.exact-tags }}
      push: ${{ inputs.push }}
      provenance: ${{ inputs.provenance }}
      sbom: ${{ inputs.sbom }}
      scan: ${{ inputs.scan }}
      build-args: ${{ inputs.build-args }}
      target: ${{ inputs.target }}
      health-check-cmd: ${{ inputs.health-check-cmd }}
      health-check-port: ${{ inputs.health-check-port }}
      health-check-timeout: ${{ inputs.health-check-timeout }}
      validate-on-pr: ${{ inputs.validate-on-pr }}
      scan-exit-code: ${{ inputs.scan-exit-code }}
      cache-registry-ref: ${{ inputs.cache-registry-ref }}
      cosign-sign: ${{ inputs.cosign-sign }}
      no-cache: ${{ inputs.no-cache }}
      tooling-ref: ${{ inputs.tooling-ref }}
      egress-policy: ${{ inputs.egress-policy }}
      allowed-endpoints: ${{ inputs.allowed-endpoints }}
      allowed-endpoints-mode: ${{ inputs.allowed-endpoints-mode }}
      egress-preset: ${{ inputs.egress-preset }}
      timeout-minutes: ${{ inputs.timeout-minutes }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  # Split per-platform path: runner-map matrix builds, optional smoke-test and
  # health-check gates, manifest merge + verification, provenance, signing.
  multiplatform:
    name: Docker multi-platform
    needs: classify
    if: ${{ needs.classify.outputs.use-split == 'true' }}
    uses: ./.github/workflows/reusable-docker-multiplatform.yml
    with:
      matrix: ${{ needs.classify.outputs.matrix }}
      context: ${{ inputs.context }}
      file: ${{ inputs.file }}
      platforms: ${{ inputs.platforms }}
      registry: ${{ inputs.registry }}
      image-name: ${{ inputs.image-name }}
      tags: ${{ inputs.tags }}
      version: ${{ inputs.version }}
      source-ref: ${{ inputs.source-ref }}
      tag-latest: ${{ inputs.tag-latest }}
      exact-tags: ${{ inputs.exact-tags }}
      push: ${{ inputs.push }}
      provenance: ${{ inputs.provenance }}
      sbom: ${{ inputs.sbom }}
      scan: ${{ inputs.scan }}
      build-args: ${{ inputs.build-args }}
      target: ${{ inputs.target }}
      smoke-test: ${{ inputs.smoke-test }}
      smoke-test-script: ${{ inputs.smoke-test-script }}
      health-check-cmd: ${{ inputs.health-check-cmd }}
      health-check-port: ${{ inputs.health-check-port }}
      health-check-timeout: ${{ inputs.health-check-timeout }}
      validate-on-pr: ${{ inputs.validate-on-pr }}
      scan-exit-code: ${{ inputs.scan-exit-code }}
      cache-registry-ref: ${{ inputs.cache-registry-ref }}
      cosign-sign: ${{ inputs.cosign-sign }}
      no-cache: ${{ inputs.no-cache }}
      tooling-ref: ${{ inputs.tooling-ref }}
      egress-policy: ${{ inputs.egress-policy }}
      allowed-endpoints: ${{ inputs.allowed-endpoints }}
      allowed-endpoints-mode: ${{ inputs.allowed-endpoints-mode }}
      egress-preset: ${{ inputs.egress-preset }}
      timeout-minutes: ${{ inputs.timeout-minutes }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
