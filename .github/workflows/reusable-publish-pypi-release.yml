---
name: Reusable PyPI Release Publishing Workflow

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version for building"
        required: false
        type: string
        default: "3.12"
      validate:
        description: "Run twine check before publishing"
        required: false
        type: boolean
        default: true
      test-pypi:
        description: "Publish to TestPyPI instead of PyPI"
        required: false
        type: boolean
        default: false
      verify-tag-version:
        description: "Verify git tag matches pyproject.toml version"
        required: false
        type: boolean
        default: true
      ensure-tag-on-default-branch:
        description: "Verify tagged commit is on the default branch"
        required: false
        type: boolean
        default: true
      default-branch:
        description: "Default branch name for tag-on-default-branch check"
        required: false
        type: string
        default: "main"
      working-directory:
        description: "Working directory containing the package"
        required: false
        type: string
        default: "."
      artifact-name:
        description: "Name of the uploaded Python distribution artifact"
        required: false
        type: string
        default: "python-dist"
      artifact-retention-days:
        description: "Days to retain the distribution artifact"
        required: false
        type: number
        default: 7
      tooling-ref:
        description: "Git ref to use when checking out lgtm-ci tooling scripts"
        required: false
        type: string
        default: ""
      egress-policy:
        description: "harden-runner egress policy (audit or block)"
        required: false
        type: string
        default: "audit"
      allowed-endpoints:
        description: "Allowed endpoints when egress-policy is block"
        required: false
        type: string
        default: ""
      build-job-name:
        description: "GitHub check name for the build job"
        required: false
        type: string
        default: "Build Python distribution"
      publish-job-name:
        description: "GitHub check name for the publish job"
        required: false
        type: string
        default: "Upload to PyPI"
      runner-image:
        description: "GitHub-hosted runner image label"
        required: false
        type: string
        default: "ubuntu-latest"
      timeout-minutes:
        description: "Job timeout in minutes"
        required: false
        type: number
        default: 15

    outputs:
      published:
        description: "Whether the package was published"
        value: ${{ jobs.publish.outputs.published }}
      version:
        description: "Published package version"
        value: ${{ jobs.publish.outputs.version }}
      package-name:
        description: "Published package name"
        value: ${{ jobs.publish.outputs.package-name }}

jobs:
  build-artifacts:
    name: ${{ inputs.build-job-name }}
    runs-on: ${{ inputs.runner-image }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: read

    outputs:
      version: ${{ steps.pypi.outputs.version }}
      package-name: ${{ steps.pypi.outputs.package-name }}

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: ${{ inputs.egress-policy }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Checkout lgtm-ci tooling
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: ${{ inputs.tooling-ref != '' && inputs.tooling-ref || github.workflow_sha }}
          sparse-checkout: |
            .github/actions/
            scripts/ci/
          sparse-checkout-cone-mode: true
          persist-credentials: false

      - name: Setup Python
        uses: ./.lgtm-ci-tooling/.github/actions/setup-python
        with:
          python-version: ${{ inputs.python-version }}
          working-directory: ${{ inputs.working-directory }}
          install-dependencies: "false"

      - name: Build Python distribution
        id: pypi
        uses: ./.lgtm-ci-tooling/.github/actions/publish-pypi
        with:
          validate: ${{ inputs.validate }}
          dry-run: true
          verify-tag-version: ${{ inputs.verify-tag-version }}
          ensure-tag-on-default-branch: ${{ inputs.ensure-tag-on-default-branch }}
          default-branch: ${{ inputs.default-branch }}
          working-directory: ${{ inputs.working-directory }}

      - name: Upload Python distribution
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ inputs.working-directory }}/dist/
          retention-days: ${{ inputs.artifact-retention-days }}
          if-no-files-found: error

  publish:
    name: ${{ inputs.publish-job-name }}
    needs: build-artifacts
    runs-on: ${{ inputs.runner-image }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: read
      id-token: write
      attestations: write

    outputs:
      published: ${{ steps.set-published.outputs.published }}
      version: ${{ needs.build-artifacts.outputs.version }}
      package-name: ${{ needs.build-artifacts.outputs.package-name }}

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: ${{ inputs.egress-policy }}
          allowed-endpoints: ${{ inputs.allowed-endpoints }}

      - name: Checkout lgtm-ci tooling
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: ${{ inputs.tooling-ref != '' && inputs.tooling-ref || github.workflow_sha }}
          sparse-checkout: |
            .github/actions/
            scripts/ci/
          sparse-checkout-cone-mode: true
          persist-credentials: false

      - name: Download Python distribution
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ inputs.working-directory }}/dist

      - name: Validate distribution
        if: inputs.validate
        shell: bash
        env:
          STEP: validate-dist
          WORKING_DIRECTORY: ${{ inputs.working-directory }}
        run: bash .lgtm-ci-tooling/scripts/ci/actions/publish-pypi.sh

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          repository-url: >-
            ${{ inputs.test-pypi == true && 'https://test.pypi.org/legacy/' ||
            'https://upload.pypi.org/legacy/' }}
          packages-dir: ${{ inputs.working-directory }}/dist/

      - name: Set publish output
        id: set-published
        shell: bash
        run: echo "published=true" >> "$GITHUB_OUTPUT"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ${{ inputs.working-directory }}/dist/*
