# SPDX-License-Identifier: MIT
---
name: PR - Semantic Title

'on':
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]
  merge_group:

permissions: {}

concurrency:
  group: semantic-pr-title-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  semantic-title:
    uses: ./.github/workflows/reusable-semantic-pr-title.yml
    with:
      tooling-ref: ${{ github.sha }}
      egress-preset: github-minimal
    permissions:
      contents: read
      # reusable posts/clears marker-based failure comments on the pull request
      pull-requests: write
