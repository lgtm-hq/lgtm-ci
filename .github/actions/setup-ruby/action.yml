---
name: "Setup Ruby"
description: "Setup Ruby with bundler and gem caching"
author: "lgtm-hq"

inputs:
  ruby-version:
    description: 'Ruby version to install (e.g., "3.2", "3.3")'
    required: false
    default: "3.3"
  bundler-version:
    description: 'Bundler version to install (e.g., "2.5.0", "latest")'
    required: false
    default: "latest"
  cache:
    description: "Enable gem caching"
    required: false
    default: "true"
  cache-dependency-path:
    description: "Path to Gemfile.lock for cache key (supports glob)"
    required: false
    default: |
      **/Gemfile.lock
      **/gems.locked
  working-directory:
    description: "Working directory for bundle commands"
    required: false
    default: "."
  install-dependencies:
    description: "Run bundle install to install dependencies"
    required: false
    default: "true"

outputs:
  ruby-version:
    description: "Installed Ruby version"
    value: ${{ steps.ruby-version.outputs.version }}
  bundler-version:
    description: "Installed Bundler version"
    value: ${{ steps.bundler-version.outputs.version }}
  cache-hit:
    description: "Whether the cache was hit"
    value: ${{ steps.cache.outputs.cache-hit || 'false' }}

runs:
  using: "composite"
  steps:
    - name: Resolve scripts directory
      shell: bash
      run: |
        echo "SCRIPTS_DIR=${GITHUB_ACTION_PATH//\\//}/../../../scripts" \
          >> "$GITHUB_ENV"

    - name: Setup Ruby
      # Pinned to SHA for supply chain security
      uses: ruby/setup-ruby@0cb964fd540e0a24c900370abf38a33466142735 # v1.305.0
      with:
        ruby-version: ${{ inputs.ruby-version }}
        bundler: ${{ inputs.bundler-version }}
        bundler-cache: false

    - name: Get Ruby version
      id: ruby-version
      shell: bash
      env:
        STEP: ruby-version
      run: $SCRIPTS_DIR/ci/actions/setup-ruby.sh

    - name: Get Bundler version
      id: bundler-version
      shell: bash
      env:
        STEP: bundler-version
      run: $SCRIPTS_DIR/ci/actions/setup-ruby.sh

    - name: Configure bundler
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        STEP: bundle-config
      run: $SCRIPTS_DIR/ci/actions/setup-ruby.sh

    - name: Cache gem dependencies
      if: inputs.cache == 'true'
      id: cache
      # Pinned to SHA for supply chain security
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          ${{ inputs.working-directory }}/vendor/bundle
          ~/.bundle
        # Cache key uses resolved ruby version for proper invalidation
        # yamllint disable-line rule:line-length
        key: gems-${{ runner.os }}-${{ steps.ruby-version.outputs.version }}-${{
          hashFiles(inputs.cache-dependency-path) }}
        restore-keys: |
          gems-${{ runner.os }}-${{ steps.ruby-version.outputs.version }}-
          gems-${{ runner.os }}-

    - name: Install dependencies
      if: inputs.install-dependencies == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        STEP: deps
      run: $SCRIPTS_DIR/ci/actions/setup-ruby.sh

branding:
  icon: "package"
  color: "red"
