---
name: "Generate SBOM"
description: "Generate Software Bill of Materials (SBOM) using Syft"
author: "lgtm-hq"

inputs:
  target:
    description: "Target to generate SBOM for (directory, image, file)"
    required: false
    default: "."
  target-type:
    description: "Type of target: dir, image, file"
    required: false
    default: "dir"
  format:
    description: "SBOM output format: cyclonedx-json, spdx-json"
    required: false
    default: "cyclonedx-json"
  output-file:
    description: "Output file path (default: sbom.json)"
    required: false
    default: "sbom.json"
  upload-artifact:
    description: "Upload SBOM as artifact"
    required: false
    default: "true"
  artifact-name:
    description: "Name for the uploaded artifact"
    required: false
    default: "sbom"

outputs:
  sbom-file:
    description: >-
      Path to the generated SBOM file. Returns the value of inputs.output-file (defaults
      to 'sbom.json' if not specified). Note: anchore/sbom-action does not expose
      auto-generated filenames, so this output relies on the explicit output-file input.
    value: ${{ inputs.output-file }}
  sbom-format:
    description: "Format of the generated SBOM"
    value: ${{ inputs.format }}

runs:
  using: "composite"
  steps:
    - name: Resolve scripts directory
      shell: bash
      run: |
        echo "SCRIPTS_DIR=${GITHUB_ACTION_PATH//\\//}/../../../scripts" \
          >> "$GITHUB_ENV"

    - name: Generate SBOM
      id: generate
      # Pinned to SHA for supply chain security
      uses: anchore/sbom-action@55dc4ee22412511ee8c3e6b81fb5b279dd5567c5 # v0.17.9
      with:
        path: ${{ inputs.target-type == 'dir' && inputs.target || '' }}
        image: ${{ inputs.target-type == 'image' && inputs.target || '' }}
        file: ${{ inputs.target-type == 'file' && inputs.target || '' }}
        format: ${{ inputs.format }}
        output-file: ${{ inputs.output-file }}
        upload-artifact: ${{ inputs.upload-artifact }}
        artifact-name: ${{ inputs.artifact-name }}

    - name: Generate summary
      if: inputs.output-file != ''
      shell: bash
      env:
        STEP: summary
        SBOM_FILE: ${{ inputs.output-file }}
        FORMAT: ${{ inputs.format }}
      run: $SCRIPTS_DIR/ci/actions/generate-sbom.sh

branding:
  icon: "package"
  color: "blue"
