---
name: "Harden Runner (retired)"
description: >-
  RETIRED (#412/#420). Do not use this local composite. GitHub skips pre/post
  hooks for workspace-local actions, so nesting step-security/harden-runner
  here left egress enforcement inert. Invoke
  step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920
  (v2.20.0) as a direct workflow step after resolve-egress-allowlist (or after
  checkout-and-harden). This directory still ships resolve-egress-endpoints.sh
  and lib/ for the sibling resolve-egress-allowlist composite.
author: "lgtm-hq"

runs:
  using: "composite"
  steps:
    - name: Refuse retired local harden-runner composite
      shell: bash
      run: |
        echo "::error::Local .github/actions/harden-runner is retired (#412/#420)."
        echo "Invoke step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0"
        echo "as a direct workflow step after resolve-egress-allowlist / checkout-and-harden."
        exit 1

branding:
  icon: "shield"
  color: "red"
