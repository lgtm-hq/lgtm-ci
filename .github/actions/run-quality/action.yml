---
name: "Lintro Quality Checks"
description: "Run lintro via full ghcr.io/lgtm-hq/py-lintro image (all bundled tools)"
author: "lgtm-hq"

inputs:
  lintro-image:
    description: "Pinned ghcr.io/lgtm-hq/py-lintro image (digest strongly recommended)"
    required: true
    default: "ghcr.io/lgtm-hq/py-lintro@sha256:81361acce37ff331ea1a39a47e3342b79f301f3d547f65d5152170d1d2ea038a"
  tools:
    description: "Comma-separated list of lintro tools to run (empty = all)"
    required: false
    default: ""
  mode:
    description: "Mode: check (lint only) or format (auto-fix)"
    required: false
    default: "check"
  fail-on-error:
    description: "Fail if linting errors found"
    required: false
    default: "true"
  working-directory:
    description: "Working directory for linting"
    required: false
    default: "."

outputs:
  exit-code:
    description: "Exit code from lintro"
    value: ${{ steps.lint.outputs.exit-code }}
  status:
    description: "Status: passed or failed"
    value: ${{ steps.lint.outputs.status }}

runs:
  using: "composite"
  steps:
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}

    - name: Run lintro quality checks
      id: lint
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        STEP: ${{ inputs.mode }}
        TOOLS: ${{ inputs.tools }}
        FAIL_ON_ERROR: ${{ inputs.fail-on-error }}
        LINTRO_IMAGE: ${{ inputs.lintro-image }}
      run: bash "$GITHUB_ACTION_PATH/../../../scripts/ci/quality/run-lintro-docker.sh"

branding:
  icon: "check-circle"
  color: "green"
