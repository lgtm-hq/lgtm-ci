---
name: "Setup Node.js"
description: "Setup Node.js with bun package manager and caching"
author: "lgtm-hq"

inputs:
  node-version:
    description: 'Node.js version to install (e.g., "20", "22", "lts/*")'
    required: false
    default: "22"
  bun-version:
    description: 'Bun version to install (e.g., "1.1.0", "latest")'
    required: false
    default: "latest"
  cache:
    description: "Enable bun cache"
    required: false
    default: "true"
  cache-dependency-path:
    description: "Path to lockfile for cache key"
    required: false
    default: "**/bun.lockb"
  working-directory:
    description: "Working directory for bun commands"
    required: false
    default: "."
  install-dependencies:
    description: "Run bun install to install dependencies"
    required: false
    default: "true"
  frozen-lockfile:
    description: "Use --frozen-lockfile for installs (recommended for CI)"
    required: false
    default: "true"

outputs:
  node-version:
    description: "Installed Node.js version"
    value: ${{ steps.node-version.outputs.version }}
  bun-version:
    description: "Installed bun version"
    value: ${{ steps.bun-version.outputs.version }}
  cache-hit:
    description: "Whether the cache was hit"
    value: ${{ steps.cache.outputs.cache-hit }}

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      # Pinned to SHA for supply chain security - line exceeds 80 but under 120 limit
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ inputs.node-version }}

    - name: Get Node.js version
      id: node-version
      shell: bash
      env:
        STEP: node-version
      run: bash "$GITHUB_ACTION_PATH/../../../scripts/ci/actions/setup-node.sh"

    - name: Setup Bun
      # Pinned to SHA for supply chain security - line exceeds 80 but under 120 limit
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      with:
        bun-version: ${{ inputs.bun-version }}

    - name: Get Bun version
      id: bun-version
      shell: bash
      env:
        STEP: bun-version
      run: bash "$GITHUB_ACTION_PATH/../../../scripts/ci/actions/setup-node.sh"

    - name: Get bun cache directory
      id: bun-cache
      if: inputs.cache == 'true'
      shell: bash
      env:
        STEP: bun-cache
      run: bash "$GITHUB_ACTION_PATH/../../../scripts/ci/actions/setup-node.sh"

    - name: Cache bun dependencies
      if: inputs.cache == 'true'
      id: cache
      # Pinned to SHA for supply chain security - line exceeds 80 but under 120 limit
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: |
          ${{ steps.bun-cache.outputs.dir }}
          ${{ inputs.working-directory }}/node_modules
        # Cache key must include all version vars for proper invalidation
        # yamllint disable-line rule:line-length
        key:
          bun-${{ runner.os }}-${{ inputs.node-version }}-${{ inputs.bun-version }}-${{
          hashFiles(inputs.cache-dependency-path) }}
        # Restore keys: hierarchical fallbacks - line exceeds 80 but under 120 limit
        restore-keys: |
          bun-${{ runner.os }}-${{ inputs.node-version }}-${{ inputs.bun-version }}-
          bun-${{ runner.os }}-${{ inputs.node-version }}-
          bun-${{ runner.os }}-

    - name: Install dependencies
      if: inputs.install-dependencies == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        STEP: deps
        FROZEN_LOCKFILE: ${{ inputs['frozen-lockfile'] }}
      run: bash "$GITHUB_ACTION_PATH/../../../scripts/ci/actions/setup-node.sh"

branding:
  icon: "package"
  color: "green"
