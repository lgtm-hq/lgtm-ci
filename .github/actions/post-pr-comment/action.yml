---
name: "Post PR Comment"
description: "Post or update a comment on a pull request with marker-based identification"
author: "lgtm-hq"

inputs:
  file:
    description:
      "Path to file containing comment body (takes precedence over 'body' if both
      provided)"
    required: false
    default: ""
  body:
    description: >-
      Comment body content (used only if 'file' is not provided; if neither is set,
      behavior depends on 'delete-on-empty')
    required: false
    default: ""
  marker:
    description: "Unique marker for comment identification"
    required: true
  mode:
    description: "Comment mode: upsert (default), create, or update"
    required: false
    default: "upsert"
  delete-on-empty:
    description: "Delete existing comment if body is empty"
    required: false
    default: "false"
  pr-number:
    description: "Pull request number (auto-detected if not provided)"
    required: false
    default: ""

outputs:
  comment-id:
    description: "ID of the created or updated comment"
    value: ${{ steps.post.outputs.comment-id }}
  comment-url:
    description: "URL of the created or updated comment"
    value: ${{ steps.post.outputs.comment-url }}
  action-taken:
    description: "Action taken: created, updated, deleted, or skipped"
    value: ${{ steps.post.outputs.action-taken }}

runs:
  using: "composite"
  steps:
    - name: Resolve scripts directory
      shell: bash
      run: |
        echo "SCRIPTS_DIR=${GITHUB_ACTION_PATH//\\//}/../../../scripts" \
          >> "$GITHUB_ENV"

    - name: Detect PR number
      id: pr
      shell: bash
      env:
        STEP: pr-number
        GH_TOKEN: ${{ github.token }}
        GITHUB_TOKEN: ${{ github.token }}
        INPUT_PR_NUMBER: ${{ inputs.pr-number }}
        EVENT_NAME: ${{ github.event_name }}
        EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
        EVENT_ISSUE_NUMBER: ${{ github.event.issue.number }}
      run: $SCRIPTS_DIR/ci/actions/post-pr-comment.sh

    - name: Read comment from file
      id: read
      if: inputs.file != ''
      shell: bash
      env:
        STEP: read-file
        COMMENT_FILE: ${{ inputs.file }}
      run: $SCRIPTS_DIR/ci/actions/post-pr-comment.sh

    - name: Post comment
      id: post
      shell: bash
      env:
        STEP: post
        GH_TOKEN: ${{ github.token }}
        GITHUB_TOKEN: ${{ github.token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        PR_NUMBER: ${{ steps.pr.outputs.number }}
        MARKER: ${{ inputs.marker }}
        MODE: ${{ inputs.mode }}
        DELETE_ON_EMPTY: ${{ inputs.delete-on-empty }}
        FILE_PROVIDED: ${{ steps.read.outputs.file_provided }}
        BODY_FROM_FILE: ${{ steps.read.outputs.body }}
        BODY_FROM_INPUT: ${{ inputs.body }}
      run: $SCRIPTS_DIR/ci/actions/post-pr-comment.sh

branding:
  icon: "message-square"
  color: "blue"
