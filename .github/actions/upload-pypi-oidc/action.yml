---
name: "Upload Python distribution to PyPI (OIDC)"
description: >-
  Download a workflow artifact, optionally validate with twine, upload to PyPI or
  TestPyPI via OIDC, and optionally attest provenance (best-effort). Run only
  from a job in the caller
  repository workflow (not from a cross-repo reusable workflow) with
  environment and id-token: write set on that job.
author: "lgtm-hq"
inputs:
  artifact-name:
    description: "Workflow artifact containing dist/"
    required: false
    default: "python-dist"
  working-directory:
    description: "Directory where dist/ is downloaded"
    required: false
    default: "."
  validate:
    description: "Run twine check before uploading"
    required: false
    default: "true"
  test-pypi:
    description: "Upload to TestPyPI instead of PyPI"
    required: false
    default: "false"
  python-version:
    description: "Python version for twine validation (setup-python)"
    required: false
    default: "3.12"
  tooling-ref:
    description: >-
      lgtm-ci ref for setup-python (defaults to the ref of this action)
    required: false
    default: ""

outputs:
  published:
    description: "Whether the package was uploaded"
    value: ${{ steps.set-published.outputs.published }}

runs:
  using: "composite"
  steps:
    - name: Checkout lgtm-ci tooling
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        repository: lgtm-hq/lgtm-ci
        path: .lgtm-ci-tooling
        ref: ${{ inputs.tooling-ref != '' && inputs.tooling-ref || github.action_ref }}
        sparse-checkout: |
          .github/actions/
          scripts/ci/
        sparse-checkout-cone-mode: true
        persist-credentials: false

    - name: Resolve scripts directory
      shell: bash
      run: echo "SCRIPTS_DIR=${GITHUB_WORKSPACE}/.lgtm-ci-tooling/scripts" >> "$GITHUB_ENV"

    - name: Download Python distribution
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ inputs.working-directory }}/dist

    - name: Setup Python
      uses: ./.lgtm-ci-tooling/.github/actions/setup-python
      with:
        python-version: ${{ inputs.python-version }}
        working-directory: ${{ inputs.working-directory }}
        install-dependencies: "false"

    - name: Validate distribution
      if: inputs.validate == 'true'
      shell: bash
      env:
        STEP: validate-dist
        WORKING_DIRECTORY: ${{ inputs.working-directory }}
      run: "$SCRIPTS_DIR/ci/actions/python-dist.sh"

    - name: Upload to PyPI
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
      with:
        repository-url: >-
          ${{ inputs.test-pypi == 'true' && 'https://test.pypi.org/legacy/' ||
          'https://upload.pypi.org/legacy/' }}
        packages-dir: ${{ inputs.working-directory }}/dist/

    - name: Attest build provenance
      continue-on-error: true
      uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
      with:
        subject-path: ${{ inputs.working-directory }}/dist/*

    - name: Set published output
      id: set-published
      shell: bash
      env:
        STEP: set-published
        WORKING_DIRECTORY: ${{ inputs.working-directory }}
      run: "$SCRIPTS_DIR/ci/actions/python-dist.sh"

branding:
  icon: "upload-cloud"
  color: "blue"
