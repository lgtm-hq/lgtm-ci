---
name: "Upload Python distribution to PyPI (OIDC)"
description: >-
  DEPRECATED — use prepare-pypi-upload plus caller-level
  pypa/gh-action-pypi-publish. Nesting pypa inside this composite breaks OIDC
  upload because GitHub resolves github.action_repository to lgtm-hq/lgtm-ci.
  See docs/python-release-publish.md.
author: "lgtm-hq"
inputs:
  artifact-name:
    description: "Workflow artifact containing dist/ (ignored — action is deprecated)"
    required: false
    default: "python-dist"
  working-directory:
    description: "Directory where dist/ is downloaded (ignored — action is deprecated)"
    required: false
    default: "."
  validate:
    description: "Ignored — action is deprecated"
    required: false
    default: "true"
  test-pypi:
    description: "Ignored — action is deprecated"
    required: false
    default: "false"
  python-version:
    description: "Ignored — action is deprecated"
    required: false
    default: "3.12"
  tooling-ref:
    description: "Ignored — action is deprecated"
    required: false
    default: ""

outputs:
  published:
    description: "Deprecated — always false; migrate to prepare-pypi-upload"
    value: "false"

runs:
  using: "composite"
  steps:
    - name: Deprecated — migrate to prepare-pypi-upload
      shell: bash
      run: |
        cat <<'EOF' >&2
        upload-pypi-oidc is deprecated and no longer uploads to PyPI.

        Use prepare-pypi-upload in the caller workflow, then invoke
        pypa/gh-action-pypi-publish as a top-level workflow step.

        See docs/python-release-publish.md and examples/publish-python-release.yml
        EOF
        echo "::error::upload-pypi-oidc is deprecated — use prepare-pypi-upload" \
          "+ pypa/gh-action-pypi-publish at workflow level" \
          "(see docs/python-release-publish.md)"
        exit 1

branding:
  icon: "upload-cloud"
  color: "blue"
