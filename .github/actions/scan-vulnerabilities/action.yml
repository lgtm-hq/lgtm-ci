---
name: "Scan Vulnerabilities"
description: "Scan for vulnerabilities using Grype"
author: "lgtm-hq"

inputs:
  target:
    description: "Target to scan (SBOM file, image, directory)"
    required: true
  target-type:
    description: "Type of target: sbom, image, dir"
    required: false
    default: "sbom"
  sbom-file:
    description: "Path to SBOM file (alternative to target when target-type is sbom)"
    required: false
    default: ""
  fail-on:
    description: "Severity threshold to fail on: critical, high, medium, low, none"
    required: false
    default: ""
  output-format:
    description: "Output format: json, table"
    required: false
    default: "json"
  upload-sarif:
    description: "Upload SARIF report to GitHub Security tab"
    required: false
    default: "false"

outputs:
  vulnerabilities-found:
    description: "Whether any vulnerabilities were found"
    value: ${{ steps.counts.outputs.vulnerabilities-found }}
  critical-count:
    description: "Number of critical vulnerabilities"
    value: ${{ steps.counts.outputs.critical-count }}
  high-count:
    description: "Number of high-severity vulnerabilities"
    value: ${{ steps.counts.outputs.high-count }}
  medium-count:
    description: "Number of medium-severity vulnerabilities"
    value: ${{ steps.counts.outputs.medium-count }}
  low-count:
    description: "Number of low-severity vulnerabilities"
    value: ${{ steps.counts.outputs.low-count }}
  sarif-file:
    description: "Path to SARIF report file"
    value: ${{ steps.sarif.outputs.sarif-file }}

runs:
  using: "composite"
  steps:
    - name: Resolve scripts directory
      shell: bash
      run: |
        SCRIPTS_DIR="$(cd "${GITHUB_ACTION_PATH}/../../../scripts" && pwd)"
        echo "SCRIPTS_DIR=${SCRIPTS_DIR}" >> "$GITHUB_ENV"

    - name: Determine scan target
      id: target
      shell: bash
      env:
        STEP: resolve-target
        TARGET: ${{ inputs.target }}
        TARGET_TYPE: ${{ inputs.target-type }}
        SBOM_FILE: ${{ inputs.sbom-file }}
      run: $SCRIPTS_DIR/ci/actions/scan-vulnerabilities.sh

    - name: Scan for vulnerabilities
      id: scan
      # Pinned to SHA for supply chain security
      uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
      with:
        path: ${{ inputs.target-type == 'dir' && steps.target.outputs.path || '' }}
        image: ${{ inputs.target-type == 'image' && steps.target.outputs.path || '' }}
        sbom: ${{ inputs.target-type == 'sbom' && steps.target.outputs.path || '' }}
        fail-build: ${{ inputs.fail-on != '' && inputs.fail-on != 'none' }}
        severity-cutoff:
          ${{ inputs.fail-on != '' && inputs.fail-on != 'none' && inputs.fail-on ||
          'negligible' }}
        output-format: ${{ inputs.output-format }}

    - name: Parse vulnerability counts
      id: counts
      if: inputs.output-format == 'json'
      shell: bash
      env:
        STEP: counts
        RESULTS_FILE: ${{ steps.scan.outputs.json }}
      run: $SCRIPTS_DIR/ci/actions/scan-vulnerabilities.sh

    - name: Generate SARIF report
      id: sarif
      if: inputs.upload-sarif == 'true'
      shell: bash
      env:
        STEP: sarif
        TARGET: ${{ steps.target.outputs.path }}
        TARGET_TYPE: ${{ inputs.target-type }}
      run: $SCRIPTS_DIR/ci/actions/scan-vulnerabilities.sh

    - name: Upload SARIF to GitHub Security
      if: inputs.upload-sarif == 'true' && steps.sarif.outputs.sarif-file != ''
      # Pinned to SHA for supply chain security
      uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
      with:
        sarif_file: ${{ steps.sarif.outputs.sarif-file }}
        category: "vulnerability-scan"

    - name: Generate summary
      if: inputs.output-format == 'json'
      shell: bash
      env:
        STEP: summary
        RESULTS_FILE: ${{ steps.scan.outputs.json }}
        CRITICAL_COUNT: ${{ steps.counts.outputs.critical-count }}
        HIGH_COUNT: ${{ steps.counts.outputs.high-count }}
        MEDIUM_COUNT: ${{ steps.counts.outputs.medium-count }}
        LOW_COUNT: ${{ steps.counts.outputs.low-count }}
      run: $SCRIPTS_DIR/ci/actions/scan-vulnerabilities.sh

branding:
  icon: "shield"
  color: "red"
