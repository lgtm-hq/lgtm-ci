---
name: "Notify Discord"
description: >-
  Send a Discord notification via webhook. Builds an embed payload with
  status-based colors and auto-injected workflow context (repository,
  run URL, ref, actor). Delivery uses curl with retry and backoff on
  transient failures; dry-run prints the payload instead.
author: "lgtm-hq"

inputs:
  webhook-url:
    description: "Discord webhook URL (store as a secret)"
    required: true
  status:
    description: "Notification status: success | failure | cancelled"
    required: false
    default: "success"
  title:
    description: "Notification title"
    required: true
  message:
    description: "Notification body (becomes the embed description)"
    required: false
    default: ""
  fields:
    description: >-
      Additional fields as a newline-separated KEY=VALUE (or simple YAML
      KEY: VALUE) list, rendered as inline embed fields.
    required: false
    default: ""
  dry-run:
    description: "Print the payload instead of POSTing it"
    required: false
    default: "false"

outputs:
  delivered:
    description: "Whether the notification was delivered (false in dry-run)"
    value: ${{ steps.notify.outputs.delivered }}

runs:
  using: "composite"
  steps:
    - name: Send Discord notification
      id: notify
      shell: bash
      env:
        WEBHOOK_URL: ${{ inputs.webhook-url }}
        STATUS: ${{ inputs.status }}
        TITLE: ${{ inputs.title }}
        MESSAGE: ${{ inputs.message }}
        FIELDS: ${{ inputs.fields }}
        DRY_RUN: ${{ inputs.dry-run }}
      run: bash "$GITHUB_ACTION_PATH/../../../scripts/ci/actions/notify-discord.sh"

branding:
  icon: "message-circle"
  color: "blue"
