---
name: "Publish Test Results"
description: "Publish test results and coverage to GitHub Pages"
author: "lgtm-hq"

inputs:
  results-path:
    description: "Path to test results directory or file"
    required: false
    default: ""
  coverage-path:
    description: "Path to coverage report directory or file"
    required: false
    default: ""
  badge-path:
    description: "Path to badge files"
    required: false
    default: ""
  target-dir:
    description: "Subdirectory under the Pages site root"
    required: false
    default: "."
  merge-existing-site:
    description: >-
      When true, merge existing live site content (or base-site-path) before
      uploading so parallel Model A publishers retain sibling target-dir trees
    required: false
    default: "false"
  base-site-path:
    description: >-
      Optional local directory tree to use as the existing site instead of
      mirroring the public GitHub Pages URL
    required: false
    default: ""
  working-directory:
    description: "Working directory"
    required: false
    default: "."

outputs:
  pages-url:
    description: "GitHub Pages URL"
    value: ${{ steps.pages-url.outputs.pages-url }}

runs:
  using: "composite"
  steps:
    - name: Prepare files
      id: prepare
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        STEP: prepare
        RESULTS_PATH: ${{ inputs.results-path }}
        COVERAGE_PATH: ${{ inputs.coverage-path }}
        BADGE_PATH: ${{ inputs.badge-path }}
        TARGET_DIR: ${{ inputs.target-dir }}
        MERGE_EXISTING_SITE: ${{ inputs.merge-existing-site }}
        BASE_SITE_PATH: ${{ inputs.base-site-path }}
      run: bash "$GITHUB_ACTION_PATH/../../../scripts/ci/actions/publish-test-results.sh"

    - name: Configure GitHub Pages
      uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

    - name: Delete stale Pages artifacts from prior run attempts
      # Self-heal `gh run rerun --failed`: remove any same-run github-pages
      # artifact so deploy-pages sees exactly one at deploy time (#415).
      shell: bash
      env:
        ARTIFACT_NAME: github-pages
        GH_TOKEN: ${{ github.token }}
      run: bash "$GITHUB_ACTION_PATH/../../../scripts/ci/actions/delete-run-pages-artifacts.sh"

    - name: Upload GitHub Pages artifact
      uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
      with:
        path: ${{ steps.prepare.outputs.staging-dir }}

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

    - name: Get Pages URL
      id: pages-url
      shell: bash
      env:
        STEP: pages-url
        TARGET_DIR: ${{ inputs.target-dir }}
        BASE_PAGE_URL: ${{ steps.deployment.outputs.page_url }}
      run: bash "$GITHUB_ACTION_PATH/../../../scripts/ci/actions/publish-test-results.sh"

    - name: Generate summary
      shell: bash
      env:
        STEP: summary
        PAGES_URL: ${{ steps.pages-url.outputs.pages-url }}
      run: bash "$GITHUB_ACTION_PATH/../../../scripts/ci/actions/publish-test-results.sh"

branding:
  icon: "upload-cloud"
  color: "blue"
